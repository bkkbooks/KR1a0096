body:
  text: 周易辨録卷三明楊爵撰艮下兑上咸亨利貞取女吉咸之義則感也兊柔在上艮剛在下與地天為泰之義相類是二氣感應以相與也又艮以篤實感而兑以和說應又艮以少男下於兊之少女皆有感應之義而卦以咸名者應由於感而感可以統乎應也感則應有亨通之理然必利於正不正則感之者非以道矣君臣朋友以義相與皆正也推類而觀之凡巨細之舉必廓然而大公物來而順應皆正也取女之道萬化之原所由始於感之所係為尤重婚禮備而貞女行感以正也如是則吉天地感而萬物化生天地之感之正也聖人感人心而天下和平聖人之感之正也天地非有心於感也至理之流行而已聖人非有心於感也順至理而已故曰天地無心以成化聖人有心而無為盈天地間皆感也感則有應應又所以為感天地萬物之情之可見者感以正也如寒暑往來動息榮悴之類何莫非正乎凡動止語默皆感之義也感之道二正邪而已出乎此則入乎彼是非得失治亂安危皆由於此水在山下出而為澤則在其上亦感應相與之義也心虛則無物廣大無外之體全矣應酬萬變此其本也用之以受人則尤為切至而非智者不能用也咸以人身取象咸之時皆欲感人者也初六以隂居下在感之時為咸其拇之象感之者可謂下而微矣以其斗筲朴􅈪之質本自無正大光明之作用矣人品之卑下舉動之瑣細是咸卦中之賤丈夫也以此感人人將漠然無所有矣初六為咸其拇拇之上為腓六二當其處為咸其腓矣拇與腓皆所以行而易失之輕動者也初尚微小凶或可免二之輕動則顯而大矣故感即有凶二有中正之德又艮體有能止之義故又勉之以居則吉居謂安所遇也安其所遇非不動也乃動所當動而不妄動也既有中正能止之德曷又咸其腓而有失乎咸之時皆欲感人以求所欲也富貴利達之迷人或剛立者所不免而況於隂柔者乎堅其志趨審擇所為而必以正乃守身之常道而聖賢之感人不外此矣是所謂居吉者也拇上為腓腓上為股九三當其處為咸其股之象股隨足而動者足動則股動足止則股止股之動止一由於足咸其股則不能自處其身而所執者惟有隨人而已人之相與有當隨者有當止者以道則隨非道則止臣之於君子之於父朋友之交皆宜如此守之以有終剛不至於失巳失人矣若九三者事君則諂佞容悅長君之惡事父則阿意曲從陷親於不義交友則亦便佞茍合虛文虛貌而無相規相益之實心焉以是而往可吝之甚也九三剛正艮體何以有此失乎以其不中而居止之極不中則多過止極則不止矣況當咸之時而又以感人為心故不善變而至此極焉三本陽剛有才者也用其才以為善則善無不至用其才以為惡故惡亦無不至矣可戒哉貞者至極之善人心本然之理千聖感物之常道也堯舜禹湯文武之所以盡君道者此也臯䕫稷契伊尹萊朱周召之所以盡臣道者此也孔子之所以繼往聖開來學者亦此也非九四之所有也九四以陽居隂已失其貞而有悔矣所尚者憧憧往來之敝習也聖人以其當心之處為咸之主故以人心所具之常理啓之欲其反身而誠以盡感物之道也言能貞則吉而悔可亡若循其故習憧憧往來而蔽於私則但其朋類從爾矣安能有感必通而得人心之應乎六二之居亦欲其勉乎此也憧憧往來間以私昵而昧以公理乃黯昧邪小之心度故象言其未光大也脢背肉與心相背心能裁處萬變脢則不動之物咸其脢則感之以無能為也五雖陽爻然體本兊柔尚和說而少剛立不能以道自强者也又無忠賢夾輔以成德業故安於庸懦而自謂治道至此可矣如漢元帝唐文宗之類元凶閹宦竊其大柄不能尊賢任能奮然興起而所尚者區區之節儉耳王鳯秉政為國大蠧則九四以陽居隂之不正者也王章以剛直而死獄中九三過剛不中者似之谷永貢禹之徒知有權臣而不知有天子皆瑣尾之匹夫而為初與二之類也引君當道使志於仁而大有為誰其人哉五至此而不悟豪傑之士知有潛身逺害而已矣既不能有為而茍於幸安則亦賴先哲以保其成業耳不至於妄動招災而致悔矣咸以人身取象上六則輔頰舌之處也又兌為口舌故取此義以柔說而居咸之極則感人以言而無其實儀秦之流是也詩曰巧言如簧顔之厚矣上六有焉巽下震上恆亨無咎利貞利有攸往恆久也有常則可久矣震剛在上巽柔在下剛柔各得其所雷迅則風烈為雷風相與又先天圖雷與風對亦一義也巽而動動不以巽非可久之道也卦之六爻剛柔相應此四者皆理之常而可久者也故卦名恆人之所信所守久而不變則為有恆固可以致亨而無咎矣然必利於貞乃為久於其道不正則所恆者邪妄之小術而非道也固有恆而不貞者未有貞而不恆者也如楊墨之徒自守其術至於死而不變豈不有恆而謂貞則未也豈久於其道者乎天地之道固恆久不已之道也人之恆久而有未貞焉則與天地之道不相似也利有攸往終則有始者此事之有終而彼事又有始也事變無窮而所以應之之道亦無窮一恆久之理得而自足以周萬變之應由其所恆者一於道也所恆者一於道則無不可為之時亦無不可為之事而利有攸往矣日月得天得其恆久不已之理也故能久照四時之變化亦得其恆久不已之理也故能久成聖人與天地恆久之理吻合而為一者也故久於其道而天下化成天地恆久之理消息盈虛有常而已觀所謂恆之義則天地萬物之情可見矣天地萬物之情恆之理足以盡之而無餘矣萬物之形形色色愈出愈新亦得天地恆久之理也所謂天下無性外之物而性無不在者也雷風有恆之象君子立不易方則恆在我矣方者其所當行之道也隨其所遇道無不在君子立之而不以死生患難易其節則體恆之義也初六與九四為正應四震體陽性上而不下無意於初初在下為交與之始未可深求乃巽順而必欲入之深以常理求之之象也守此始求之深以為可常而不知變則凶而無所利矣漢文既疏於賈生矣誼以何為痛哭流涕而言之切犯於此爻之戒矣長沙之行幾不能容矣何所利哉九二以陽居隂不得其正則有悔矣當恆之時處下卦之中所恆者中道也中者無過不及之至理也守此至理久而不失至於死而後已則其悔可亡矣凡進身不正而能使作用合於至道造次顛沛而不少變則可以蓋前愆焉其九二悔亡之義也九三當恆之時過剛不中是不能常守其德也剛而不中則流於剛惡任意使氣無所不至於聖賢忠信義理之心胸作用相去逺矣無所往而不失則無所往而不取羞其身至此不能容矣德者人心固有之善也三豈獨無此善乎但不能恆以守之耳使能反而求之以其剛正之根本而用之為善則何所不至哉九四當恆之時以陽居隂為非其位固能久矣然所久者非其道也是見其偏而未見其全流於私小而逺於大中至正者也以修己則不能畜內聖之德以治人則不能成外王之化安得禽乎管仲得君如彼其専也行乎國政如彼其久也功烈如彼其卑也管仲死桓公薨天下不復宗齊由仲之所久者非其道也六五以柔中之德而應九二之剛中可謂恆其德而守其正矣然此乃婦人之道也婦人無非無儀維酒食是議有閨門之修無境外之志從一而終焉者也故婦人如此則吉夫子則因時順理隨事處宜如五之恆其德貞凶之道也聖人以六五處丈夫之位而從婦人之道故發此義顔子禹稷憂樂不同而同於道曽子子思逺害死難而易地則皆然非禮之禮非義之義固不屑矣此惟可與權者能之德未至而强欲為是小人之猖狂自恣假聖賢之言以遂其私者也上六以隂柔之質居恆之極震之終震終則過於動恆極則反變而為不恆矣故為振恆之象以不常之心而過於動是小人之率意而妄為者也何能免於凶乎故象言其大無功大無功則凶即至矣若以君子處之則恆之上為恆之終震之極為過人之動而善莫大焉恆九三所久者非其德也非其德則肆意妄作而無所不至矣故象言其無所容也九四所久者非其位也非其位則牽制徇從而不能進於有為矣故象言安得禽也九三在三畫巽卦為非中而居恆卦亦非中故以所守之德言九四在三畫震卦為得正而居恆卦則非正故以所處之位言要之九三始終以非道自處者也九四為富貴所動而不能盡行其所學也外堯舜禹湯文武周公孔子之道而自以為道則九三之謂也欲以道濟天下而有枉尺直尋之意則九四之謂也四近於五位之所在則治亂安危繫之天下而義固自重於三矣如魏相假許史以進則位之所得非其正矣宣帝少恩相不能濟之以寬仁之道而治止於雜霸則田無禽也孔孟非不欲行道以濟世也然待價而沽不見諸侯以枉已者不可以正人也恆六爻各有所恆初六以浚為恆九二以中為恆九三以非德為恆九四以茍得其位為恆六五以不知變通為恆上六以侮智躁動為恆惟九二善餘皆惡之類也艮下乾上遁亨小利貞遁亨身遁而道亨也九五當位下有六二之應自淺見者觀之謂時尚可以有為見幾之君子則知其决不可以有為但當奉身而退於義乃為當耳故於斯時而遁謂之與時行也與時行則能以身殉道而未嘗不亨也當是時小事可以利貞大事則不利於貞矣蓋小人之勢浸長而九五之當尊位者又與之為應則權柄已在其掌握而君子不能伸其志矣故小事利於貞則小有救濟而已若進君子退小人振經國之要務端治化之本原則難乎其措手且將一敗塗地而國勢遂至於不可為矣小事利貞大事不利於貞君子豈能以小小之補塞者而茍容其身乎此所以知有遁而遁之可以得亨也姤一隂生則君子尚有處小人之道而可以回造化至於二隂生則但有遁而已蓋勢不得以不遁義不可以不遁也遁之時義可謂大矣非卓然之君子不能與於此也若孔子之去魯遲遲去齊接淅而行乃仁之至義之盡也宋子哀不立危亂之邦而春秋美之亦庶幾乎遁而亨也天下有山亦遁之象謂去之逺也君子之逺小人未嘗形諸聲色以絶之但引身而去則判乎其不相及矣何其嚴哉初六處卦之下為遁而在後尾之象也隂柔之才不能察之於微而致之以决至是而始遁則小人動心矣豈非危之道乎遁既在後而不可遁則勿用有攸往潛晦其德以免災害俟其可遁之機而徐處之亦或一道也非終於不遁而已也聖人言勿用有攸往欲人之善處而免害也毫釐有差則為與世浮沈之小人矣六二當遁之時有中順之德自謂於是時而必遁則所處得中而合於順時之應矣二之所執者此理也其執之之固而人不能以言間之可謂知及之仁能守之矣皎皎白駒在彼空谷生芻一束其人如玉終不以爾公爾侯之言易其心此爻似之九三剛而不中下比二隂與相親昵又艮體為止勇退之節非其所長當遁之時有所係於心而不能即遁之象也三之有疾何疾也或戀戀於富貴之榮寵而不欲去乎惴惴於小人之氣焰而不敢去乎有一於此皆足為害心之疾危厲之道也然是道也惟用之以畜臣妾則吉臣妾微賤者不必其賢而可畜矣天下之治亂係庶官之賢否豈於小人而可以昵近乎九三以畜臣妾之道而用之以畜庶官焉聖人所以斥賤之也九四與初六居相應之位四陽剛乾體上而不下絶初而不與之應有好遁之象焉人見其絶小人逺利寵而决於必遁以為好遁而不知四非好遁者也有所沮撓道不行而勢不得以不遁是君子之能事也小人之汲汲於求而戀戀不能去安能與于此九五當遁之時與六二居相應之位二之應非尊仰其道德之可以益世也特怵惕其責任尚可以有為而曲意以順承之耳五心知其如此以其勢之方盛未已而時不可以不遁於斯時而去之在巳既不失進退之道足以正其志又渾厚其迹而小人莫測其所以遁焉是可謂處之甚善遁之嘉美正而吉矣上九以剛陽居卦之上在事之外剛陽既有能遁之節在事之外又無小人相與以係纍之為肥遁之象肥者寬裕自得之意言超然逺遁而人莫之疑邈乎其不可近矣天子不得臣諸侯不得友免於是非之議利害之交無往而不利矣乾下震上大壯利貞大謂陽君子之類也大壯謂大者壯也以一卦之體言則四陽盛長而過中為大壯以二卦之德言則乾之德為剛震之德為動剛以動也剛以動亦為壯盛之勢也以其壯而形諸作用則利於正正則為君子為以義理用事者也不正則為小人為以血氣用事者也正則為王道不正則為霸術矣文武一怒而安天下之民大壯之正者也齊桓晉文威制諸夏亦可謂壯矣然假之而已非正也如言君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯皆大壯之正也若暴虎馮河死而無悔失其正矣大者本所以為正正為大者所有之道非假於外求也特以不察而自失其正者有之天地之情正大而已生長收藏與時消息皆正大之道也此大壯之不可不利於正也正則盡人道以合乎天道矣聖人先天而天弗違後天而奉天時盡其正大之作用而已矣一失其正則與天地不相似而非率性之道也雷在天上有大壯之象非禮弗履則真能用其壯矣顔子之非禮勿視聽言動是也然必至明能察其幾然後能以至健而致其决也知之不明則非禮之禮非義之義安能自擇趾在下而進壯於動者也初九陽剛當大壯之時固欲用其壯者也然位次最下以壯進動而欲大有所為則壯于趾之象也以是而行則凶可信有矣凡人臣之疏逺未信者欲勇於去君側之惡以天下事自任則動取窮極一蹶而仆此壯趾征凶之義也九二以陽居隂本非正也然所處得中則上應六五當大壯之時而承之以有為者率不失乎天下之至理是能以義理用事者也如此則以九居二者未為不可適見其為得正而吉矣凡居其位而能盡其所當為之事則其位為所宜居而為正矣居其位而不能盡其所當為之事則其位為非所宜居而為不正矣九二貞吉聖人言簡而義精矣九三過剛不中當大壯之時在小人則為用壯焉狼瞫馳秦師而死是也在君子則為用罔焉君子固以義理用事者然或有忘其深逺之慮而忽於禍機之防者矣張柬之謂武三思如几上肉而不足畏者是也以是為正道而守之則亦危矣如羝羊觸藩而羸困其角則智竭力窮人得而制之矣五王以禍自及而唐之宗社幾於危亡則用壯用罔所致也九四當大壯之時以陽居隂為不得其正是用壯而不以道者也聖人以其陽剛之才可以有為又時當大壯則易於振奮故勉其能貞則吉而以陽居隂之悔可以亡之貞者天下之達道也慎修而有得焉則為聖哲之作用矣何吉之不可致何悔之不能亡乎至是則裁處百為隨感而應視天下之事皆有可乘之幾伸縮變通之妙用在我而不窮矣藩决不羸之象也其才德足以任天下之至重焉壯於大輿之輹之象也至是則為體用全備之事業矣聖人之教九四亦不得中行而與狂狷之意也卦之體似兊有羊象焉故九三六五上六皆取其義羊則內剛外柔而喜觸者也六五以柔居剛而得其中所持者平易之道也剛壯則或過於激烈而有抵觸之失平易則不能抵觸為喪羊於易矣他卦以柔居五者或為過於柔大壯之時則為得中矣況自四以下皆為五所用諸爻之剛即五之剛也衆賢以剛德同奮而明作有功人主以柔中而制之而惇大成裕則何悔之有如光武之時寇恂賈復皆以剛壯用事者也世祖以柔道制之或息其忿爭或戒其黷武卒皆得其用而成中興之業此喪羊于易無悔之義也上六處壯之終動之極其過動用壯之餘習則固在也故觸藩而不能退然壯之終則將失其壯動已極則動或不能繼而有止矣況其質本柔弱故不能遂其進也由其用壯過動而失之輕易也亦何所利哉若能反其所為艱以處之則得吉大抵天下之事莫不成於難而敗於易以為難則可以無難處之事以為易則憂即至矣艱之一言乃聖人示人以存誠之基本而轉災為祥之機也九三剛而得正君子之類也應上六上六居壯之極則用壯以制君子之小人當小人用壯以制君子謀隱交合而君子者其勢固不能以自全矣故密其機慎其動猶懼不能免禍九三過剛不中則任氣自裁而視之蔑如也是當小人用壯之時而君子如九三者則用罔也象曰小人用壯君子罔也非有小人用壯而猶不可用罔況小人用壯君子所當深慮也而顧可以用罔乎坤下離上晉康侯用錫馬蕃庶晝日三接晉進而上也世道之升於隆平道德之躋於髙明人臣之以事覲君皆此義也日出地上有其時矣順而麗乎大明有其德矣柔進而上行有其事矣康侯安國之侯也當此之時德備功成而進謁於君是以有錫馬蕃庶晝日三接之寵賚也有其時而無其德有其德而無其事皆不足以與此詩曰君子來朝何錫與之雖無與之輅車乘馬又何與之𤣥衮及黼其錫馬蕃庶晝日三接之謂乎周襄王賜晉文公大輅戎輅之服出入三覲有類此義而文公不足以當康侯也明出地上明進而上有晉之象自昭明德日非不明也掩於地下則不明出於地上則明矣德非不明也蔽以巳私則不明克去其私則明矣自昭明德克已復禮之學也取明出地上之象日有上達則亦晉之義也當晉之時居下者孰不欲進而用世以行其志乎初六之所應者九四也九四不中不正居上之下是蔽賢之小人也安能汲引草茅之士盡其以人事君之道乎故初六進而為其摧折欲進而不能也但當隱居求志獨行其正以待善為人信時可進而進之則吉矣如不為人所信而終不能進亦當處以寬裕則無咎若急迫求進則為欲所動而咎多矣蓋初處最下既無官守又無言責可進可退其機在我固綽綽然有餘裕矣初之才德非能如此聖人但以出處之常道教之而欲其知所以自處也六二當晉之時上無應與欲進而愁如也非以區區榮遇之未遂而憂世之誠心不能已也二雖中正然隂柔之質恐其於廢斥之際不能堅志於正道而終不變故言若能自處以正終始不移則吉而受兹介福于王母矣王母祖母謂六五以隂居尊之象也有離明得中之德離明則知賢之不可不用得中則任賢有常而不以小人間之賢如六二則自當見用於世而受大福矣六三以隂居陽不中不正本有悔也然居下之上處順之極居下之上有時事之責任者也處順之極則能以順處天下之事者也凡賢才在下而欲上進如二與初之類者已必與之同升而盡其以人事君之道一念為國之誠心衆皆信之而樂為之用則三之志亦可以行於上矣如此則其初之所悔者至是亦可以亡矣九四以陽居隂不中不正處上之下位近於六五當晉之時是患得患失之小人履髙位竊大柄以自私者也必隂窺潛探伺君心之所欲而蠱惑之以保其榮寵鼫鼠之象也是所謂逢君之惡者也以其竊據者為已所當得而固守之則危矣小人誤人之國以基深禍而至於亡已亦安能獨保其富貴哉六五以隂居陽非其正宜有悔矣然有離明之德以處尊位而下皆順從則悔可以亡矣失得勿恤則存王道之大要而不屑於霸者功利之小術也如蕭何勸髙帝養民致賢收用巴蜀此計失得之私心也文王則誠心養民以盡君道而已失得所不恤也如是而往則吉而無不利聖人以六五明察而不足於君道故欲其逺功利之小術而尊帝王之大道也上九晉其角以剛處上角之象也以剛處上已之私邑或有不服者則當伐之下卦為坤有邑之象六三居下之上與上為應而間於九四有不臣服之象上九剛明非柔暗又離為甲兵有征伐之象必舉大衆動征伐而後臣順則厲而吉伐所當伐而非窮兵也故無咎兵凶器不得已而後用之者也以此征伐為正而不知修德以綏服之則吝之道也聖人抑揚豫奪之微意欲上之人以德為化民之本而兵不可以輕用也離下坤上明夷利艱貞明而見傷展轉困迫去死一間耳處之之道利艱貞心存戒懼若未嘗戒懼視其窘辱若固有之而心若樂受者也時事得失心如未嘗有知語言動作此心默默以操運用之準繩而外若愚人焉剛忿以重其困殞穫而喪其心則失之逺矣離之象為日坤之象為地日之明為地掩明而見傷之象也內文明則所以察乎處難之理者至矣外柔順則所以由於處難之道者盡矣微用其周身之智委曲於安土之誠文王所以蒙大難之道也故曰文王以之利艱貞晦其明而未顯見於外心固未嘗晦也心晦則志不得為正矣遭家大難而處之以此道者箕子也故曰箕子以之然自衆人視之則其明若晦而無所謂明矣自知微之君子觀之則已光輝發越而為明之至矣君子蒞衆固有當用晦之時亦有當用晦之事用晦若其心有未明者然要其所以而論之乃其至明也人之邪正有未可以盡知者事之是非有未可以盡辨者非不能知非不能辨也知之辨之為非宜也在智者默識之耳如世祖平王郎不省吏民交通之詞此用晦也如此則反側子之心安河此安而天下遂安矣非光武之明見萬里不能如此處之也初九當明夷之初傷之尚淺為于飛垂其翼之象垂其翼尚可以飛君子雖有所傷尚可以行之但不能盡遂其所志耳始焉不能盡遂其志終則至於反其所為又甚則殺之矣君子于行三日不食行之速而不暇食所以避殺身之禍也當是時則富貴寵利為喪生之鴆毒矣君子所以潔身而急逺之也愚昧淺見之匹夫安知此義反以去為無故而議其所處之非矣君子之所為衆人固不識也明夷乃上六之隂暗傷下五爻之君子也初九去之甚逺陽剛有勇退之德故能超然逺去六二與上六相去雖尚逺比於初九則有間矣故當明夷之時傷其左股焉股所以行者也傷其股則不能行矣股之用右為切左為緩傷其左股則傷之未切雖不能行而尚可去二之救其所傷又有壯馬則得吉矣二有柔順中正之德為離之主見幾之明應幾之圖皆所優為順處而有則者也用此德以處之而免於傷則以壯馬拯之而獲吉之義也二之獲吉有餘裕矣有德故也九三剛而得正居下之上有天吏之責者也正與上六為應為其所傷則順天應人伐而去之明夷于南狩得其大首之象此湯武之事也此事間不容髮一日之間天命未絶則為君臣當日命絶則為獨夫此不可疾之義也有湯武之仁遇桀紂之暴則可不然是未免於篡弒之罪此不可貞之義也上六為大首則六四正當其腹之處古者尚右以右為尊六四柔而得正以其柔而同體則為腹心以其持正而行則非所尊右而入于左腹矣四雖獲明夷之心而視其所右者則猶有間故于出門庭終得去矣此已陷暗中而僅得出之之象可謂百死中得一生矣象取門庭者以五在其上當其至暗至切之傷在其門庭之內而不能出矣四猶有可出之道焉六五為箕子之明夷箕子之傷可謂切矣箕子之處可謂盡矣貴戚之卿義同休戚去之則不可救之則不能處之之道貞而已於人事則咎之以己於大運則歸之於天自靖其志獻于先王此箕子之貞不息之明而後人之所當法也上六傷絶君子委用細邪下失人心上違天意此不明其德而至於晦也非無德也自不能明耳初登于天所處者照臨四國之位也後入于地則有死亡而已矣人君失道求為匹夫而不可得安有肆惡已極而能保其身乎上六之惡雖已極矣若能瞿然省悟翻然遷改則有自怨自艾之太甲明德復全而為萬世之瞻仰也離下巽上家人利女貞卦名家人取一家中人之義也必利女貞閨門風化之原女貞則家可齊家齊則國治而天下平舉而措之耳隱微之際所係甚大六二以柔得中正女正位乎內也九五以剛得中正男正位乎外也男女正合於天地之道故為天地之大義也自二五各有其德又以德相應而言則謂之男女自二五各盡其道又以道齊家而言則謂之父母以卦之六爻言上九以陽居上有父之象初九以陽居下為子之象九五居上之中為兄之象九三居下之上為弟之象五三又為夫之象二四又為婦之象四配五冢婦也二配三衆婦也父子兄弟夫婦各盡其道則家道正矣家道正而天下不定者未之有也火家之所用以炊爨者也風化自此而出亦有家人之象言有物則順理而言又不徒言而必行之也行有恆則要之以有終而不變也此修身之要也家固國與天下之本而身又為家之本也立家之初習尚未定心志未變訓之以正則正感之以邪則邪如影響之出形聲斷乎其不易矣初九陽剛得正當有家之始是能間之者也間之之道何如內外之分長幼之節宗法之嚴恩禮之周曲盡其道又能謹身教以率勵之則家可齊而悔可亡矣六二以柔順中正之德上應九五承之以有終而已無自遂焉婦人無遂事有之則為婦乘夫舍閨門之修而與境外之事矣在中而主饋食之事所謂精五飯幕酒漿事舅姑縫衣裳皆婦人之職也守此以為正則吉否則淫蠧之惡生而家之所以敗也婦無公事休其蠶職與此正相反焉詩人所以深刺之也九三雖剛而得正然過於剛者也在家人中為嗃嗃然治家嚴厲之象比於仁讓之化不言而信不怒而威者則有間矣過於嚴則人情或有所不堪者焉致悔而有厲矣三之心則欲防其惡而同歸於善焉威之者乃所以愛之也若婦子嘻嘻然至於失家之節則由處之過於柔而人無所畏憚也安能相與羣居而不亂乎故終吝爻無嘻嘻之象聖人舉其與嗃嗃之相反者以戒之也隂主以利養萬物而使遂其生者也六四居隂得正處上之下其位與才皆可致富故為富家而大吉矣四之能富其家不過生之者衆食之者寡為之者疾用之者舒四者而已外此無所謂致富之道也小人剝民奉君務聚斂以充府庫者無以藉口九五王假有家假至也以是道而理其家為至其家也五之道何道也已以陽剛中正刑其家而為男正位乎外六二以柔順中正助之而為女正位乎內此皆五所有之道也以是道而齊家者得天地之大義也勿憂而吉可得矣言九五之道而有及於六二何也妻道無成而代有終六二之道即九五之道也二固不得而専之矣故象言交相愛則二在中矣上九以剛陽之德居上而處終居上則有尊於一家之象處終則能要之以有終也為一家之尊用剛陽之道以治其家而要之以有終則人見其有孚威如而不可犯也有孚威如猶言信哉其威如也如語辭凡與與如也恂恂如也皆此人視之以為然也上九非有意於作威也知有反己自治而已反己自治則持身不茍動作威儀自然有則儼然人望而畏之矣如此則終吉終吉言吉可以有終也吉之有終由德之有終也其正大服人之氣象宛乎可見矣兊下離上睽小事吉睽乖異也火則動而上澤則動而下動輒相反言無往而不相異也二女同居而其志不同行不同居而不同行固其所也同居矣而志不同行見其乖戾之甚也卦之名睽以此睽之時小事可以得吉而大事不可為以時方甚難而卦之才德又不足以濟睽也濟一時之睽非有剛明之德者不足以任其事說而麗乎明比於其德剛健而文明者則不同矣柔進上行得中而應乎剛比於應乎天而時行者則不同矣以此才德用之於內外安靜之時則無不可以有為者若內叛外抗動相乖戾非此才此德所能辦也如周室東遷之後內則王室乖離外則諸侯背叛當此之時非有上聖之才不能為也晉睿宗委任王導君臣同心而僅足以保江左謝安桓沖劉裕檀道濟之輩終不能平一中原則小事吉之義也天地異位暌也然天道下濟地道上升以成化育之功其事同也男女異質睽也然男以女為室女以男為家而交相願焉則其志通也萬物之形象有萬其不同也然以類相聚於不同之中而各有同焉則其事類也天地萬物之形皆有自然之睽睽之相與則皆有自然之道聖王之治天下使各正於自然之道而已此則睽之時用也盈天地間滿眼皆暌之象亦滿眼皆睽之時用也在默而識之君子之相與則同而異同而異不害其為同乃所以為大同也同而異則為公君子相與之道也同而不異則為私小人相與之道也初九居下無應宜有悔者也然當睽之時志在有為或以才德相與而即為所應者亦有之故初九之與九四雖皆陽剛而亦相應焉則初之悔可以亡之而為喪馬勿逐自得之象馬人所乘以行者也初之遇四則可資之以行其道矣然必見惡人則可以無咎時之睽率以惡人致之而使至於睽也或權柄在其掌握者亦有之豪傑之士欲起而救之不一見焉則有山林獨善而已矣往而見之藉其力以有為而處以善處之道則伸縮運用轉移變化之機操之在我而可以有濟矣如孔子欲討陳恆則往見三子三子者非所謂惡人者乎使當時能用孔子之言則聖人作用之微權因是得以舉行變春秋之衰晚以復文武成康之盛治亦未可知也然初九之道德亦必有大過人者而可以見惡人故聖人與其見之觀九四目之為元夫則亦不世出之才也非初九之類而欲見之剛則必取禍柔則必取辱矣下此則又為鞠躬權門之匹夫而不足道者也九二上應六五五離性躁而過察上而不下易於猜忌者也二剛中而說體有遇主于巷之象巷取委曲之義言委曲以行其志而不失臣道之正也程子所謂至誠以感動之盡力以扶持之明理義以致其知杜蔽惑以誠其意者也如此則無咎矣大抵睽之時溫厚明辨者志或可伸而剛直自遂者率皆見忤而速禍矣孟子於齊王即其好勇好貨之類而引之使歸於王道亦遇主于巷之義也六三見輿曳輿三也三隂爻自坤而來坤為大輿三亦可以取輿之象矣曳為二所曳也牛謂四離畜牝牛則四可以取牛象矣三居二陽之間處位不當二陽皆以非道而相求焉上九六三之正應當睽之時猜狠方甚三往應之不惟拒絶而且有髠劓之傷未有以正相求而終不相得者暌之極亦可合焉故無初有終九四當睽之時下無應與則睽孤矣得初九之陽與之同德相應而且相信焉則為遇元夫交孚矣其初以孤立處不得正之陽當睽時而居上之下又有時事之責任者不亦危乎既而得人共濟相與有為可以行其志矣故無咎六五以隂居陽本有悔然為離之主所處得中則可以亡其悔矣厥宗謂九二六五賴其輔弼以成治則二為五所宗依者也五有明中之德能聽於二而行其道故二之道得行於五而易合焉為厥宗噬膚之象五能如此則君道得而可以濟睽矣以是而往何咎之有上九疑六三而不與之應為睽孤六三處不得正而居二陽之間其迹固可疑矣上以剛居明極睽極之時明極則過察而多疑睽極則猜甚而難合故有見豕負塗載鬼一車張弧欲射之象然睽巳極矣時極則當變事久則自明故又有後說之弧匪寇婚媾之象惟往遇雨則隂陽相合應六三以成濟睽之功則吉上九以剛明之才又當可濟之時處之以道則可以成功矣艮下坎上蹇利西南不利東北利見大人貞吉循平易不行險見大人尚貞正不特處蹇當然治平之世亦宜如此但卦有此象義故聖人繫以此辭彖贊其時用之大此道理即時中也即堯𫝊之舜舜𫝊之禹湯文武周公孔子也聖人因卦象義以發胸中之理耳卦之象義即胸中所具之理也見險而止謂之仁亦可也謂之義與禮亦可也然曰知矣哉以知之明而守之固於知為切知對愚而言險在前而不見與見之不能止迷於欲而妄動昏愚之流也反身修德處蹇之時固當如此而待時以濟蹇亦必本於此不能反身修德安有西南不東北見大人貞之作用乎往蹇來譽初六可謂能諒其時與巳之才矣六二居其位而有應足以行其志矣不能濟蹇者才弱也故聖人許其忠節而惜其不能成功耳若以聖人處此則朞月而巳可也六二謹厚君子也撥亂世而反之正非其事也九三剛正之才迫近於險而憂方甚大所應所喜又隂柔之才而逺出巳下者也安能有濟故聖人但言其為人所喜與而未許其成功諸葛孔明似之六四居隂得正才不足以濟蹇連於九三之實得處之之道也厄於時勢之難而未見有成功之機子家子於魯昭公有類此爻而子家無可連之人耳九五之蹇非一身之蹇也四海九州之塗炭皆巳之責也故謂之大蹇有位有德故諸賢合力以應而樂為之用惜皆中才而不足以稱任使已又在險中故至此尚不能成功耳上六之才不及九三六二而成功反過之者以處將濟之時知九五可以有為而能從也聖人於蹇之卦爻至此始以吉與之信乎處世之有難易而知幾之君子可尚也坎下震上解利西南無所往其來復吉有攸往夙吉利西南與來復吉夙吉亦是卦有此象義而西南來復夙皆處解之道也西南來復夙皆中道也看至此則聖人繫易可一笑只是此理逐卦逐爻因時與事而發之耳中庸可以盡之三往居四而入坤體利西南之象也二居其所而得中來復之象也卦無有攸往夙吉之象聖人以義言之大抵解之後或有未解而尚當解之者貴於夙耳不夙則為害不細也既解便當平易安靜來復其所漢髙入關約法三章光武燒棄文書令反側子得以自安裴度入蔡州言蔡人則吾人皆平易來復之義也若既解之後無中生有過求細小久為煩瑣則難復生矣天地解而雷雨作雷雨作而百果草木皆甲拆天地亦解之義也天地閉塞賢人隱則反乎解矣赦過宥罪體解之義法天地好生之德也天地間一治一亂一善一惡一得一失皆解之義也君子省之使有治無亂有得無失有善無惡則善於用解者矣初六之應九四可也隂陽相應未得其正故言善於補過而未有美詞以與之也九二上應六五當解之任者也難之未解以小人害之也有以去之即得中直之道矣二可謂無愧於委任者矣六三負且乘致寇至寇之至也三之致也天乎人也亦何尤也九四解去小人則能反正而有君子之志向矣朋不至而相孚者未之有也六五之君子惟有解則吉也所當解者信小人而用之也聖人懼五為羣小所惑而任九二之不専故特戒之於九二則以去羣隂而許其得中直於六五則欲去羣隂之惑亂可謂丁寧切至矣五柔暗之主難於任君子而易於信小人若陽剛則無事於戒矣上六處卦之終備解之道也當解之極則解之易也可謂藏其用而以時發之也據上六之才德未能如此蓋其處終則養之有素當害之將解而衆皆欲解之故成功之易也兊下艮上損有孚元吉無咎可貞利有攸往曷之用二簋可用享損而有孚如茅茨土階菲飲食惡衣服卑宫室損之事也忘勢禮賢役己利物亦損之義也損所當損而皆出於誠心則盛德至善可大可久施之天下國家無所往而不當矣二簋用享以祭之一事當損者而言亦凶年用下牲之義也損下益上其道上行乃上自伐其本根不自知其為損而反以為益矣鹿臺之財巨橋之粟乃所以速其亡也損何大焉猶曰其道上行在下者不可謂非事上之道焉此君民之義也聖人一繫詞而警戒之切名義之嚴盡之矣然悅而止則自足自怠亦損之義也卦之得名以上下之體相遇而言詞則直言損之義也二簋應有時損剛益柔有時損益盈虛與時偕行有孚也君子損益非有意也循天理而已矣懲忿窒欲謂之損可也謂之益亦可也聖人特以克己而言則理之復者非益乎消一分人欲則長一分天理初九所當益者六四也已事遄往盡巳之誠以益之也然有上下之分隂陽之别說止之體焉故戒以酌損之此處己處人之道也九二所不足者貞也又說體而易有過動之失故利貞而戒其征凶固守其貞即可以成人之善若失已徇人則相率而陷於惡矣六三之損所以為益免於雜亂而成其相應之専在人事固有如此者六四之疾多矣初九乃已疾之藥石也聖人於初九微示以不可則止之意於六四則欲其虛心求善痛自遷改而與道同歸矣君之所當寶者善也當損下益上之時人固欲以善進矣而五又虛中以應之則進善無窮而其益無方矣上九弗損益之得居上益下之體也非小補之益而人之應之者衆矣故象曰大得志也震下巽上益利有攸往利涉大川益之道損上益下民說無疆自上下下其道大光以此大光之道而得民說之無疆何所往而不利何險之不可濟乎二五中正之道固可以有慶矣中正之道大光之道也木道乃行程子作益道理或然也動而不以巽躁於動者也有損而已動而巽所以日進於無疆也天施地生其益無方上之益下亦猶是也凡益之道與時偕行則益之所施當其可矣先王益下井田學校封建肉刑舉一世而甄陶之功業之盛上下與天地同流豈小補之哉見善則遷進善無窮有過則改可至於無過此作聖之功也初九當益下之時受上之益厚矣不為大作不足以報之上之益初亦欲其大作也故曰利用陽剛之才亦足以為大作而致元吉矣六二居中而有應上之益下必自益賢以及之共天位治天職食天祿而及於二者自不能已而二亦弗克辭之也爻位皆隂或不能固守而少誠實也故戒以永貞吉守正而不為富貴所淫則吉也曰王用享于帝吉盡誠心以事上而不有其身則吉也六三不中不正當益下之時受上之益者凶事也上之益下窮乏者周給之賢能者任使之不肖者懲戒之聖人無棄物王者重絶人豈可遽棄六三而不求其遷改乎若三格則承之庸之否則威之矣三處動體之極非止於惡而不進者也故得無咎又期以有孚中行望其所得者深矣告公必用圭公始信之三之所以告公而得其信在有孚中行而已六四居上之下所不足者亦中行也行未得中而能盡益下之道未之有也故戒以中行則告公以益下之志而公從之矣卦爻之義有因其所不能而戒之者有據其所巳能而與之者有慮其所必至而防之者有即其所可至而勉之者國依於民者也中行益下得民之心而用以遷國則民無不從大王遷岐而民從之如歸市即其事也國未必皆遷特即得民心而可以有為言之耳九五以有孚惠下則下以有孚而惠上以德矣未有上好仁而下不好義者也五之益下有德有位有時矣戴之為元后親之如父母其生也榮其死也哀皆有乎惠我德之義也初與二三受上之益者也四五益下者也上九居卦之上處益之極而未有益下之任乃自益者也若以道義自益則安貧樂道之逸民也聖人用以戒貪人故以為求自豐殖之賤夫而斥之也立心勿恆喪其所守其義凶也乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往揚于王庭孚號告自邑不即戎有攸往皆夬之用也健而說决而和夬之德也柔乘五剛治亂安危基於此矣安得不揚于王庭乎斯時也君子不特以去就决之如貴戚之臣與國同休戚者雖死生以之亦不為過孚號有厲必盡吾决之誠與决之道也成敗不必論而其道可謂光明矣不告自邑而徒即戎小人得以藉口而君子反為所制自速其窮而已矣剛長乃終時則可决而幾不可以自失也唐之五王昧於此義相繼就死而宗社之危幾不救可為鑒也陳蕃竇武則又下於此者施祿及下當賞而賞無所吝也取其流通潤澤之義居德則忌取其淵深廣大之義忌敬之意也敬德之輿不敬則德不可居矣初九壯于前趾往不勝咎也在下不當進者而進又先之以疏逺未信之小臣欲去君側之惡而又先焉躁動之甚也安能有濟九二有能决之才有能决之德終日乾乾夕惕若之心也謹慎周密之至而真可以當决之任矣意外之患不足慮也九三過剛不中以决小人是用壯而見於頄凶之義而非君子决所當决之道也君子夬夬决其所當决而已行其所無事而吾無加惡焉健而說决而和是也三若得此道焉則善用其决矣雖合於上六之小人如獨行遇雨若濡終則知其可愠而愠之亦無咎矣此因其所不足而戒之也臀無膚不决則不安行次且往决則不進持兩端以觀望公私交戰之機也何以至此以九居四而處說體失其陽剛之德致悔之道也若撁挽衆陽合力以决則可以亡其悔而又不以為然焉處天下事智仁勇三德缺一不可四之所以卒失也九五切近上六乃其所親昵者也若但知小人之當去忘私順道决其所當决不以私昵之故而失其果斷之德則合於中行而無咎矣下而衆陽處之各盡其道則上六無號終有凶矣若知其窮極變為君子而以國與民為心則聖人未嘗不與也巽下乾上姤女壯勿用取女以一小人敢於犯天下之公議與衆君子敵則壯之甚也君子宜謹於防慮而求所以逺之焉一隂猶可制之故言勿用取女若至二隂生則有遁而巳矣一隂生為姤一陽生為復主客之義也三隂生則成否始於用娶也四隂生則為觀變其名義以抑揚之剝之君子得輿亦此義也雖世運之常亦有可回之理而轉移之機在我矣天地相遇品物咸章天地之常道遇而已剛遇中正天下大行聖人德與位遇而化行於天下矣盈天地間皆遇之義也而聖人制以相遇之禮焉如五品人倫之相與一事一物之裁制君子遇之以道小人遇之以非道富貴貧賤死生患難之在人亦遇也而亦有遇之之道焉非其道則妄而巳矣遇之之道所以巳天下之亂也施命誥四方取其風行天下之義也初六繫于金柅貞吉有所往見凶聖人不以小人不可變而絶望於善焉故啓反正之機在君子不可以惡未著而易之故警之以羸豕孚蹢躅張柬之以武三思為几上肉而卒為其所害昧於羸豕蹢躅之訓也二處初之上初之惡尚微二猶可以制之而使不得以肆其毒二剛而得中善於處初者也而初在其所處之下故聖人深以制初之惡望之焉九三過剛不中下無所遇故臀無膚上無所遇故其行次且孤立無助故厲逺於汙邪故無大咎言無大咎則小出入有之由於過剛不中也若以剛中而無所遇則為幽人之貞矣自九二視初六則為害治之邪而欲其逺之自九四視初六則為所御之民而欲其近之易惟變所適而不可為典要如此若取名卦之義則四近五而居不得正下應柔邪罪莫大焉不取此者居上位而澤不下究使民轉而望救於他人亦足以為世戒矣九五有德有位治初六之柔邪若甚易也而聖人特慎之而欲含章焉蓋小人變詐百出而易以惑衆淺謀躁動為所窺見則乘間抵隙眩人之耳目亂人之心志而使莫知適從矣惟時其動勿使有妄密其機勿使或露則處得其道而治可以常保矣上九過剛而居卦之上角之象也知剛而不知柔視中和之德逺矣而莫與羣焉吝之道也然剛善也終不為欲所動故無咎坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往此順而彼說剛中而有應皆聚之義也若未順而得說非剛中而致應則聚不以道矣王假有廟王者聚道之大而亦所以聚天下也利見大人亨非有君長臨之則不能相正以生矣而何以致亨通聚不以正則茍合而豈聚之道哉聚之時用大牲有所往皆理之正故為順天命也豐年用上牲得其所聚仁之愛之之道不可已也天地萬物之情聚而已天施地生乾坤交泰聚之義也五品人倫恩義相篤亦聚之義也飛潛動植類聚羣分亦聚之義也盈天地之間者聚而已但以道則得非道則失升降消長治亂安危胥此焉基膺宰治之責者默識而操之以道可也除戎器戒不虞乃處聚之一道而致其常聚也兵非聖人之得已而為德化之輔不可廢也處萃之道知仁勇三德缺一不可初六知及之而仁不能守故有孚不終乃亂乃萃初之本心不自昧而萃非其所在初終不能以自安也故又號呼而為衆所笑惟勿恤流俗往從正應則無咎大抵聚之時易至於茍聚或以逺近或以難易或制於强力而不能自振君子審於逆順公私而已矣馬援舍公孫而就光武萃之正也張瑛從宦官而攻陳竇其失甚矣臧洪不憚殺身而應張超得往無咎之義矣六二應九五而雜於二隂必引吉乃得無咎引謂心懸於五而有以感招之也感招之道誠而已矣故又曰孚乃利用禴禴祭之儉薄之義盡其誠則雖儀物不足而可以通其志於五矣人臣有孤忠為讒慝所間而君或未諒者惟積誠以感之而已矣三所乘者二而二則萃於五矣所比者四而四則萃於初矣已以不中不正人莫與萃求萃不得則嗟如而已亦何所利哉惟往從上六求與之萃則無咎上雖非陽當萃之時固有以類相聚者所應之義可略也雖與上六兩隂相聚亦無大益差勝於無所與聚而已故小吝三惟不中正故嗟如若以剛陽之德處斯時則為獨立不懼而五與二之外皆不屑與之相萃也九四處位不當必大吉始得無咎非大吉不足以補過人臣有進不以正而位非所當得者必攄忠誠以大建明始可以掩前愆矣九五以剛陽當萃之時而居尊位德可以稱其位固無咎矣或有未孚則亦修其元之德而已元為四德之首君德也君子體仁足以長人元之德至於常永貞固則君德備而萬邦作孚悔可以亡矣悔謂德未盛而人未孚也謂其志未光也蓋兊體柔說而非純粹於剛陽中正者也上六無應處萃之終衆之萃皆已定矣而已無所萃人之云亡邦國殄瘁之時也故始焉齎咨而終至於涕洟不能一朝自安也其求萃之心切矣故無咎杕杜之詩近之故曰彼君子兮逝肯適我求之可謂誠矣君欲得臣以用其道臣欲資君而行其義朋友之以道德相須皆此義也巽下坤上升元亨用見大人勿恤南征吉柔以時升升也地中生木亦升也巽而順亦升也巽而順則德尊業廣日進未已亦升之義也若自賢自用過於髙亢日下而已安能升升之時向治之時也巽順於理以制事變則所以應天下之故而圖於幾微者亦精且密矣有剛中之臣而得柔中之君以應之皆致元亨之道也六五應九二有見大人之象如卦之才以見大人相與大有為則何處不遂何行不得故南征吉成湯三聘伊尹十一征而無敵於天下先主三顧孔明而成霸業用此道也順修其德而積小以成髙大士希賢賢希聖亦升之義也初六居二陽之下九二上應六五剛而得中九三居下之上剛而得正其心皆欲以人事君也初六有巽德而與同體其志相合故允升大吉九二輔六五以致升者也九三剛而得正六四柔而得正一時之賢俊而履已之上二雖剛中然以陽居隂而得善猶有可議焉若疑忌之心生則於開誠心廣忠益之道有未盡而五亦疏之矣故盡其誠心則雖儀物不足而可以達其志於五矣九三以剛正之才居下之上前臨於坤無所疑礙得升而行其志可謂才與時合矣六四坤體而有順德王用亨于岐山用其誠而已用其誠以輔君順人臣之道以為其所事也不言升者六四近君位已髙矣患於尸位而無以報稱故勉之以誠六五以隂居尊所不足者貞也故言能貞則吉而如升階之易五之所升世底於極治也惇典庸禮命德討罪本於天命人心之正而已無與焉貞之義也能如此則世臻隆平而君道盡矣故大得志上六冥升孜孜於為惡而惟日不足也聖人設言以誘其入善言以此惟日不足之心而用之於貞則為君子矣其啓人遷善之意至矣以隂柔居升極馴習為茍賤流為汚穢患得患失無所不至於君德民生則忘之久矣才一也用之以為惡則惡無不至用之以為善則善亦無不至矣上六得至於升之極非無才者也用其才於為惡而已故聖人勉以不息之貞升六四王用亨于岐山吉無咎象曰王用亨于岐山順事也王大王也六四居上卦之下坤為土為有土諸侯之象正大王之謂也坤之德為順上順天命下順人心邠人從遷于岐山國勢亨通而日升於强大王業肇基正大王之事業也故吉而且無咎事固有吉而不免於咎者亦有無咎而未能吉者王業肇基國勢昌大吉也順天命人心而非有覬覦之私則無咎也孔子恐人疑大王亨于岐山有僥幸茍得之心故發明其義曰順事也順之一字足以破千古之惑與隨上六相類彼為文王之事三分天下有其二以服事殷隨道之極也出羑里之囚則誕受天命享于西山也象言上窮者窮極而後亨也西山盡周西土而言氣象故大於岐山矣本義之誤自見坎下兊上困亨貞大人吉無咎有言不信困亨險以說困而不喪其所守是身困而道則亨處困之正理君子之能事固可以得吉而無咎若隕穫於困厄僥幸以求免則失其所以處之之道而咎多矣含蓄晦默靜以待之不可尚口益取困窮方在困中一身一心不為所信而況於言乎有言適所以招尤取辱也兊為口舌巧言求免以冀茍脫豈處困之道哉故又以尚口為戒困之時非實有所見實有所得不能處也聖人安土敦仁而皆自得賢者决於義命而可泰然實有所見實有所得則言語動止死生處之如一盡言語之道則能盡動止之道盡動止之道則能盡死生之道言語動止死生皆理之常事有大小道無二致見其為一則能與天地萬物同流而無所謂困矣致命遂志則不但處困能亨處死亦亨矣初六當困之時上無所庇下不能以自安臀困於株木之象也昧所以自處之道入于幽谷三嵗不覿之象也不能自安人品之卑也昧自處之道識見之暗也如初六者未足與之處困也酒食人之所欲九二有剛中之德可欲之善也當困之時反以此可欲之善而自困焉大凡有德之君子必以國與民為心而憂時慨世之心為獨切欲轉移之則又勢方殷盛力所未能而心不能以自已適見其困而已矣藴仁義之道懷經濟之術躋一世於平康者舍斯人無與歸上之人方委以拯困之責任而朱紱方來矣惟盡我之誠一念忠貞可以感神明而無間察其機㑹而徐處之乃為利也若遽欲征行則時方甚難而反凶矣九五為困之主未能出困而有劓刖之傷在九二則主憂臣辱主辱臣死之時也故雖凶而於義則無咎矣當困之時君子固為小人所困而亦思所以去小人矣六三不中不正處九四之下而不能動乎四困于石也履九二之上而不能自安據于蒺藜也上有難動之人下無自安之地則死亡無日矣故入于其宫不見其妻凶初六九四之正應初六方困於下九四處位不當不能濟物又為九二所間而濟之緩在九四亦可吝矣春秋之法救而書次則為貶畏於强梗而為義不果來徐徐吝之道也齊桓公一為陽穀之㑹楚人滅黃而不能救處位不當不能濟物之義也九四說體恤小事大睦以與人之意多雖履險之上而已出於險之外故終有濟於初六惜齊桓不能自强而無終也九五上為柔所掩下為剛所挾是上下俱傷矣赤紱賞德之服也以赤紱賞柔說之邪而使履已之上賞不中正之剛而使之迫近於巳賞之未當故上下俱傷困於赤紱也善惡在人未有久而不定者也況五有中直之德故久則得其道而可以濟天下之困而志遂矣乃徐有說之義賞善去惡以拯一世之困誠而已未有誠而不動者也未有誠而弗能成功也故利用祭祀則可以獲福矣人君之福在天下免於困厄而躋於康泰也五何以未盡道待勉乎亦萃有位未光之義也上六困于葛藟纒綿不能脫之義也于臲卼則動輒顛危而不可動也處說之上暗之甚而又當困極之時也妄說昏暗困其所失而固拯則有可濟之幾曰更端之辭故更端而告之曰若於動而有悔之時即能悔其既往之失而勉於善則行合於道而得吉矣悔自凶而向吉故有獲吉之理周易辨録卷三
