body:
  text: 周易辯録卷一明楊爵撰乾下乾上乾元亨利貞乾卦擬天純陽不已之義也元亨利貞乾之徳也分而言之有四合而言之一元而已氣始動為元流行為亨以變則變以化則化為利機藏於靜其動而為元亨利者皆具於此為貞乾之四徳一誠可以盡之矣易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占然必尚辭尚變尚象而後可以語尚占也故筮者易中之一義必配之以道而後可用也繫辭曰吉㐫者得失之象也自坤而至未濟雖情偽萬變莫不以合此天道而為得為吉戾此天道而為失為㓙也悔吝无咎亦即其得失淺深而言之也大哉乾元為萬物所資以始匪特資之以始也非乾元則不能有終矣故亨也者亨此元也利也者利此元也貞也者貞此元也一理流行而用各不同隨其所至之善而名之耳在人則為仁義禮智而仁則无所不包𤼵而為惻隠羞惡辭讓是非而惻隠則无所不貫雲行雨施品物流形天命之不已而所以為亨也上天之載无聲无臭雲雨品物顯於聲臭形而下之器也必有形而上之道焉大明終始㑹乾道之一本也六位時成識乾道之萬殊也生而知之也時乗六龍以御天非行六龍由六龍行安而行之也聖人窮理盡性以至於命乾卦性命之理畫前之易聖人先得之矣乾道變化由動極而向於靜之始利之義也萬物各得其性命之正而保合太和為靜之極貞之義也聖人之徳首出庶物以神道設教於上猶乾道變化也萬國咸寧猶萬物各正性命而保合太和也元亨者顯諸仁也利貞者藏諸用也聖人過化存神上下與天地同流者也故配合而迭言之兩乾相繼天行健之象也君子法天行健之象而以自強不息焉以義理勝私邪而能要之以有終也所謂仁以為己任死而後已非天下之至強其孰能與於此即孔子嘆所未見之剛者也為私邪所制而間隔其義理之心則懦夫而已矣自強不息君子入聖之功也勉勉循循持之以敬畏假之以嵗月勿忘助之不已則與至誠无息之聖同歸矣此欲從末由之際功夫也初九以乾剛得正處最下草澤中居仁由義之俊傑為龍之潛藏而未見之象也在國曰市井之臣在野曰草莽之臣皆謂庶人徳未上孚人未見知而欲求用則失身而无以正天下君子不為也故勿用舜之側㣲伊尹耕莘說築傅巖孔子待價孟子不見諸侯皆此道也乾之時固不可以言否而在君子一時一事未能遂所願則亦否之義也象曰潛龍勿用陽在下也陽言龍而下言勿用之義也九二乾剛得中善莫善於此徳也位初九之上則離於潛隠而名實顯著聞其風而興起者宜亦多矣始脫深藏之迹未履明顯之位為龍見在田而光澤耀世之象也以此徳而處此地君未嘗不欲其輔己以有為也民未嘗不望其興道以致治也天之生此民也使先知覺後知使先覺覺後覺九二天民之先覺者也以斯道而覺斯民乃其責任也故利見九五之大人相與有為而成正大光明之業則性分之理盡而事天之道得矣九三乾剛得正之君子也知義理之所在而慷慨以為之者也以其過剛不中強毅果敢之氣有餘而從容委曲之風不足能以義為質而於禮行遜出之道或未盡也然質本乾剛識未嘗不明也力未嘗不強也知其性質之偏而勇於克勵者又其所能也故終日乾乾而夕猶惕若幾於自強不息矣下不在田則或疑於田矣上不在天則或疑於天矣好剛自是一念之差而不自克則或流於剛惡不自知所處之地所稟之資皆危厲之階也而致曲之功罔敢自怠故得无咎惟其為九三也故不能无過惟其不安於九三也故能補過象言反復道无終食之間違仁造次必於是顛沛必於是也文言曰行事則无事而不乾乾也曰與時偕行則无時而不乾乾也用力之實則忠信以進徳修辭立誠以居業也不能先知之則未有能行之者也故曰知至至之可與幾也知終終之可與存義也知義理之至而求以至之則察之極其精故可與幾所謂始條理者智之事也知義理之終而求以終之則措之无不當故可與存義所謂終條理者聖之事也即大學格物致知誠意正心中庸明善誠身堯舜禹惟精惟一允執厥中也千古聖賢之學問聖人於此爻𤼵之盡矣龍之在淵時未可出則蟄以潛身時可以出則躍而向天九四以乾剛之徳離下乾之上處上乾之下是龍不逺乎淵而出于淵矣未至於天而向乎天矣攝九五之事而未履其位可以躍而不遽躍故為或躍處躍之道四已曲盡之矣其以剛處柔而善用其剛矣象言進无咎以其能或而於進之之道為无咎也文言曰自試也試猶考騐也驗之於天而天與之驗之於人而人歸之非聖人先有姑試之心以天人交與驗己於天位終不容以固辭也進无咎言其道之盡善也自試言其心之无私也乾道乃革言離下而上改革之際變而通之之時也義理所在順適而一之辭一芥而不知其為小為輕受天位而不知其為大為重无意必固我之心也惟其下不在田中不在人故進而上亦可也惟其上不在天故退而下亦可也所以上下无常者非干天位而有覬覦之邪心也所以進退无恒者非欲離羣類而出乎其上也葢君子進徳修業預察於義理之至精而所處契於時中之道也改革之際間不容髮精㣲之極非聖人不能盡也舜避堯之子禹避舜之子皆或之義也舜禹之進斯无咎矣否則居其宫而逼其子為突如來如焚如死如而无所容矣咎孰大焉不欲遽進而終不能以不進事天之外无容心也或之一言所以立君臣之大防而為萬世之慮深逺矣九五以乾剛中正之徳居上卦之中是聖人位乎天位因時立制以化成天下知龍飛于天騰雲雨以澤潤下土之象也其曰利見大人則闢四門明四目達四聰君道之作用勢莫急於此矣聖人垂訓之意逺矣哉堯以不得舜為己憂舜以不得禹臯陶為己憂皆是心也九二在下修身而見於世之大人也雖徳施巳普所過必化而未為時用九五見之而𢎞治化乃其利也人主以論相為職必虚巳忘勢而君子始樂為所用也否則謂人莫巳若而不足以有為矣上九徳則乾之極也位則上之極也以此徳而處此地則過於上而不能下龍之亢飛于上而不知蟄以潛身之象也昧於消息盈虚之理進退存亡之道時已極而不知變則與時偕極矣盈滿既久窮災不免顛覆之㓙其将至矣故有悔悔自吉而向㓙也伊尹曰臣罔以寵利居成功周公曰兹予其明農哉知進退存亡而處之以道矣用九六陽皆變而為陰也首者先之義也陽剛不為物先則羣龍无首之象也如是而可吉也坤之義地道也臣道也妻道也用九之義天道也君道也夫道也特事有可以用柔者而乃為善用其剛也聖人以天下之才徳為才徳以天下之聰明為聰明其才徳聰明始高出於億兆人之上矣以堯舜之至聖而用人施政必咨於四岳九官而舍己從人以為徳天道下際而光明必如是始合於天則而天下治矣否則自有肺腸自獨俾臧自蔽其耳目而妄行以治亂矣元為善之長亨為嘉之㑹利為義之和貞為事之幹天命之謂性也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事率性之謂道也命與性一也降自天為命具於人為性性與道一也綂於心為性見於行為道體用一原顯㣲无間也乾之元於時為春於人為仁而為衆善之長仁義禮智皆善也而仁綂乎義禮智長之義也亨於時為夏於人為禮而為衆美之㑹一事一節之合道可以言嘉而不可以言嘉之㑹禮則品節文章燦然秩然衆理聚㑹而无不備說卦以離為南方之卦萬物皆相見亦此義也利於時為秋於人為裁成㫁制所行合宜而從容中節也貞於時為冬至理歸藏隨在各足於人為智知正道而固守之也知正道而固守之智之實豫之義也事豫則立故為事之幹也體仁與天地萬物為一體君徳備矣故足以長人嘉其所㑹好之既篤行之必至故足以合禮嘉猶書言惟予一人汝嘉之義也物各有則因物付物使之各得其所利物也利物則處得時措之宜而於義无所乖矣程子言處物為義者是也不貞固則不能信以成之而不誠无物矣安能立事故貞固足以幹事元亨利貞乾之四徳也非君子體仁義禮智之深者不足以行此四徳君子其可以配天乎故曰乾元亨利貞乾元綂天言元包乎亨利貞也乾元者始而亨言乾元與亨利貞流行而為一矣亨之後為利利之後為貞四徳一理也始而亨亦性情也必於利貞言性情主靜者四徳之義天地萬物之理皆如此復卦以一陽始生見天地之心則動而用也此以利貞為性情則靜而體也其實心與性情貫體用動靜而无不在也一理始動洋洋乎𤼵育萬物是乾始能以美利利天下矣然但言利而不言其何所利言何所利則有限而狹小矣不言所利見其无所不利矣乾始之功大矣哉大哉乾乎剛健中正純粹精也剛健之徳其體不偏不倚其用无過不及則極於中正矣中正則純然粹然而无不精矣非中正之外復有所謂純粹精也七字之義中正二字可以盡之剛健中正純粹精猶言大徳之敦化也六爻𤼵揮猶言小徳之川流也葢時見而見時潛而潛此理也可上而上可下而下亦此理也无時无處而非剛健中正純粹精之作用也其六爻之𤼵揮曲盡而无餘藴矣聖人時中之道與乾道脗合而无二者也其􅁇天出治无非以六陽旁通之理而時出之所謂時乗六龍以御天也雲行雨施而天下平則治化格天而萬國咸寧也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北䘮朋安貞吉坤者順而有常之意操順而冇常之徳以應天下之故安往而不元亨牝馬之貞即順而有常之徳也故以為利君子之有所往也以先則迷能後則得而主乎利焉西南則得朋東北則䘮朋必至於安貞而與道為一斯可矣此皆牝馬貞之意而所以致元亨也故吉元亨者言其通變宜時而應用之不窮也吉則徳盛業廣而事成矣坤之為用贊相乎乾而不自作地道也妻道也臣道也先則踰理失分凌犯於上而為天理所不容迷孰大焉臣无有作福作威玉食者而後則得孟子告滕文公為國之道兼舉三代井田學校之制期以新其國而為王者師答畢戰則告之以分田制禄之法而已主利者臣職之一事地道長養萬物之義也主於利而應用當其可則亦利中之義也西南坤方居易俟命順坤道也東北艮方行險徼倖反坤道也得道者多助故得朋失道者寡助故喪朋先迷後得主利以其職分所當為者而戒勉之也西南得朋東北喪朋以其性分所固有者而致丁寧之意也修其職而未能以義理用事者或有之故戒之勉之極其詳皆詞之不可已者也勉强而未至於安焉者非誠也安貞則順適乎義理之中正而止於至善矣此一節深一節之義也至是則盡性命之理極精微之藴坤道葢自我而出之矣乾道則堯舜禹湯文武盡君道者之作用也坤道則稷契臯䕫伊傅周召盡臣職者之事也引而伸之觸類而長之則凡綂屬之分才質之宜卷舒運用先後緩急之異施无非此道而天下之能事畢矣故曰神而明之存乎其人黙而成之不言而信存乎徳行乾元萬物資始坤元萬物資生此孔子之易也乾元天氣之始坤元地氣之始五行得天之氣而各自以為氣非有二也如鼓之以雷霆潤之以風雨皆乾之事而坤不與焉故大可以包乎至而至則大中之一事以詣其極也乾元易知之始坤元簡能之始施於天者為乾元而承之於地為坤元天地之氣配合而无間也至哉坤元為萬物所資以生非自生也以乾元之知大始順承之而與之生也萬物資生乃順承天是坤厚載物而徳合於无疆矣以厚載物則含𢎞矣徳合无疆則光大矣含𢎞言其體光大言其用此品物所以咸亨也牝馬為地之類則柔順之義也行地无疆則貞之義也柔順而必利於貞乃君子所行也柔順而不能貞則失之不及流於柔惡而无所不至矣豈君子之道哉先之迷以凌分而失道也以先為失道則後為順而得常道矣西南得朋則與君子之類同行而可相與以有為矣持此道以有終則國與民賴之而上下皆有福慶矣東北則反其常道顛亂迷謬為君子所不與而身不能以自保矣此未能有終所致也言此者見遵道有終則有慶矣安貞則與貞為一而非勉强純乎義理而合於坤道之貞矣故曰應地无疆地勢有高卑則重坤之象也重坤則至厚之義也君子體重坤之義而以厚徳載物焉宇宙間事皆吾分内物也民吾同胞物為吾與非仁者不能有此心也伊尹恥君不及堯舜匹夫匹婦不獲其所若已推而納之溝中真能以厚徳載物矣凡君子度量絶人犯而不校之類亦此義也反身而求以至之者惟精察其稟賦之偏蔽而勇克去之則高明廣大可馴致而與天地同體矣初六於履霜之始而即知有堅氷之将至霜與氷同一陰氣之凝也小人一念萌於利而志不在天理之公即不善之道也患得患失馴習不已而至於極則弑奪之禍所由生知微之君子當於霜未至而慎之焉孶孳為善者舜之徒也孳孳為利者蹠之徒也早於辯而用舍之豈特免於堅氷之禍而且无霜之可虞矣六二柔順中正有和而不流之徳存之於心而无私曲則直也措之於行而當於理則方也直其為方之體而方其所以行乎直者也直方而至於大特未化之而下聖人一等矣以此徳而應用焉則宜時通變之機前定於心而弛張盈縮之妙綽乎其有餘不待習於作用而所施自能順利矣此即牝馬之貞後得西南安貞之義也六二之於坤卦可謂克肖之子矣其曰地道光者即安貞之吉應地无疆充實光輝之義也六三爻陰而位則陽陰中有陽為含章之象葢衣錦尚絅闇然日章之義也不言陰不中正者坤有順徳内含章美而将之以順多於陰不中正之義矣據三之才不患其終於不𤼵也患其𤼵之輕易而或流於躁妄也故聖人戒之而使其𤼵之中於機㑹焉𤼵之而中於機㑹則𤼵之以時而斯為貞矣留侯之於高帝招四皓以羽翼太子因沙中之謀教之以平其宿憾而封功臣得此義矣才可作事而自以為功亦徳未純者而其失易至於此也故復以從王事而无成有終致戒焉坤為土三居下之上有土諸侯之象也古者諸侯釋位以間王政不常有也故曰或為王股肱心膂而從其事則鞠躬盡力代王以終其事而於成功則不敢自有而必歸於君上焉葢代天理物者人君之責人臣之道主於賛襄輔弼而已幾微有差則大惡基焉非有光大之智不能識也周公曰孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先予旦以多子越御事篤前人成烈答其師作周孚先召公曰予小臣敢以王之讎民百君子越友民保受王威命明徳王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命凡周召所履皆无成有終之義也六四乗六三陰之不得中者也應初六陰之不得正者也比六五雖以中徳居尊位然陰性易迷柔或不能持久况亦不得其正流而為反覆顛倒不難矣所比所乗所應皆若是而四獨以居陰得正與其間難乎其為處矣若四者衡門之下可以棲遲黙以求容而冀免於刑戮斯可焉以重陰而務晦藏聖人因其才質之宜而教以處身之義也茍輕自漏泄務為譏評撩虺蛇之首踐虎狼之尾殺身不足惜而於世道益難矣此有道君子所深戒也若欲轉移斯世使陽徳漸亨而向於治四雖居正而質陰柔亦非有撥亂反正之才也故无譽六五以柔順之徳而位上卦之中是以中徳而居尊位也以中徳而居尊位則能以身心所得者而化成天下矣為黄裳之象黄也者不偏不倚之體天徳也裳也者无過不及之用王道也天徳王道所謂合内外之道也成功文章燦然秩然而本於心徳之敷措黄裳之義也裳為身之章取𤼵外之義不曰衣而曰裳者上衣下裳為乾坤之象聖人取義之精如此所謂其詞文其言曲而中者此亦一義也凡列爵分土井田學校所以裁成天地之道輔相天地之宜維持之以紀綱涵濡之以禮樂事業之大彌六合而无間者皆自一念之微所𤼵越而亦非有所増益於性分之外也至是則君道盡而代天理物之任无歉矣故元吉上六陰盛之極與陽相搏擊坤為地居卦之終則龍戰于野之象也上六言龍非真龍也特以力强而敵乎龍故稱龍焉初六言堅氷至亦於上六驗之矣當小人類霜之始其勢固甚微也使國有人焉制而去之不難矣及馴習積累而至於盛則假政柄以制君子之去留終於君子盡去小人獨存而成天地閉塞之世至是則亦末如之何矣人之云亡邦國殄瘁未有國无君子而國不亡者也未有國亡而小人能保其富貴者也故君子小人同一傷也而君子則傷於當戰之時小人則傷於既戰之後既戰之後國本已撥小人夷滅之禍即不旋踵而至矣其血𤣥黄聖人不獨示君子以知幾逺害之道而所以喻小人者亦明且切矣初六象言馴致其道上六則曰其道窮也上六已窮之道即初六馴致之道也葢至是則善類已空國勢顛覆小人者雖欲容身保位而謀慮已窮无所施矣觀兩象之詞見聖人扶陽抑隂為天地生民之慮深逺矣用六者六爻之隂皆變而為陽也隂柔之性見之不能明守之不能固變而為陽則愚可至於明柔可至於强而能長久於義理之正矣故利永貞變之之道无他焉博學審問慎思明辨篤行人一能之已百之人十能之已千之斯可矣剝盡為坤純隂之卦於時為消於事為慝天理絶盡之世也然卦之徳為順可以順乎理卦之象為地可以配乎天順理希天可以成大有為之業矣故聖人畧其消慝之迹盡神化鼓舞之道出其意料思慮之外而裁成之其有進善之才者則誘掖之欲其善之進而極於成焉有去惡之心者則防戒之欲其惡之去而至於盡焉不敢以清明之事業而絶望於昏濁之世也葢聖人視天下无不可為之時亦无不可變之人此有教无類之義與人為善之心也所謂化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業也於其用六而復言利永貞見卦與諸爻皆不足於義理之純粹變而為陽始可以進於有為焉則又正本之論也春秋戰國之君不足以擬湯武之聖徳孔孟固已知之矣所以惓惓接引而與相周旋者欲其一變至道而以大終也不然則庸劣蔽錮之深豈可望以三代之治化而孔孟者顧席不暇暖而皇皇終身欲何為哉此皆用六永貞之義也震下坎上屯元亨利貞勿用有攸往利建侯屯者不能伸舒之意坤之初交於乾之初得震剛柔之始交也剛柔始交方欲有為乃遇險而難生焉則不能伸舒矣震動在下坎險在上是能動乎險中矣動乎險中則操縱之機猶在我而不為人所盡制焉故得元亨在險則宜守正正者萬世不易之常道處險處夷皆不可須臾離者在險而有不正焉則所以速其禍而險愈甚矣故尤所當戒雷雨之動滿盈則晦㝠震撼之勢方殷而驅除平定之道誠難措手故勿用有攸徃當此天運草昧之初混亂漫散未有綂一英雄豪傑欲起而救之必利於建侯焉建侯則名分已定而恩威激勸者有其人矣濟屯之道莫先於此自古有為之君當屯難之世披荆棘歴險阻至於不遑寢食而始克有濟焉勿用有攸往則不可輕以有為而建侯則又不可安於无為焉先後緩急固有其幾而不可失也經綸治絲之事君子拯屯順時勢相機宜而為之也初九當屯之初時方難為上應六四則險陷之爻而勢又不可以輕動故有盤桓難進之象當屯初而遇險陷固不可不居貞而初九陽剛得正又有能居貞之象君子行一不義殺一不辜而得天下不為行一不義殺一不辜而得免於死亦不為何所往而可離於正乎以此得正方亨之陽徳而處卦之最下則能以貴下賤得民心而可以濟屯矣故利建侯六二上應九五乃其正應之君也下乗初九乃强暴之寇也當屯之時事方難為五在險中力又不足以援二故二動不能伸舒邅回不進而乗馬班如焉班如但列為班行定處而不能進之象初九非為二之害也求與為婚媾耳二柔順中正女子守貞之象也守貞則不字於初矣至於十年之久則數窮理極而字於五字許嫁為臣服之義也竇融終舍隗囂而歸於光武其時其事皆類此六三陰柔不中不正无濟屯之才徳者也上无應與而切近於險陷其時其勢又難為也於是而不動可也三居動體之極而性又為輕動者也以如此之才徳當如此之時勢而欲輕動以濟屯焉則為逐鹿无虞人以導之而陷入林中之象君子見幾舍之勿逐可也若往而逐之屢舉而屢无成徒取羞吝而已殷浩北伐有類此爻六四居隂得正上承九五當濟屯之責任者也隂柔才弱不能獨濟為乗馬班如之象下應初九陽剛得正有過人之才徳者也求親斯人與之同往則吉而无不利矣得人者昌失人者亡四知求初相與有為可謂明也已矣坎為水有膏澤之象九五坎體而陷於險中為屯其膏澤而不得下於民者也五之所為於道或未盡焉若能惇典庸禮命徳討罪允合乎天命人心之正則一徳所及逺近協服小人安能陷之而使屯其膏乎故象言其施未光葢深不足於五也當是時若小貞之則可得吉若大貞之則㓙立至矣小貞則小有所為而不失其正也大貞則必去小人之陷已而欲大有所為也魯昭公自取出亡則㓙之驗也上六處屯之終險之極屯終則時可濟險極有出險之理若以剛陽之才處之濟之如反掌耳上六隂柔明不足以有見才不足以有為愈見其屯而險也故有乗馬班如泣血連如之象至是而已不能濟必有濟之者矣若上六者将為人所有焉故曰何可長也坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙與明相反蒙昧而不明也山下有險則迷於所向矣險而止則懐險心而怠於問學矣皆所以為蒙也蒙之可亨理義之心開而可以至於明矣此由九二之道可以𤼵人之蒙而所以𤼵之者又得其時之中也九二以剛中之徳與六五之童蒙正相應非二求五乃五求二學者教者之志自相應也求之者其心虚以誠則應之者亦樂以成其美矣凡筮蓍求神其初筮則无有不誠者若再三則輕瀆而失其誠矣五之求二有初筮之誠二則告之再三則為瀆瀆則二不告矣求之者其心專應之者當其可二之𤼵蒙可謂得時中之道矣此蒙之所以亨也二可謂誨人不倦之聖賢五亦有希賢希聖之志者矣教之而不以正則所知所行差之毫釐謬以千里非聖賢以人事天之學問也堯舜之精一孔門之擇善固執格致誠正程朱之居敬窮理知行並進皆聖賢大中至正之道也當童蒙之時而養之以正則可以至於聖人矣故為作聖之功山下出泉未有所歸亦蒙之象也泉之出必放乎四海君子之果行似之必盈科而後進君子之育徳似之初六以隂居下稟賦之昏弱人品之卑下則蒙之甚而不可不𤼵也又當𤼵蒙之初法不可以不正故利用刑人用刑人書所謂扑作教刑也又當暫止其刑而涵育優柔使以漸而入於善焉為用說桎梏桎梏固刑之類也用刑之嚴而過於束縛亦桎梏之象也用說之則立法固為甚嚴而用法則又濟之以寛使學之者既有嚴憚恐懼之心而又有樂於進修之志可謂善𤼵蒙矣若一於嚴則情所難堪聒之以明之所難知驅之以力之所難行為教之失其道而无益於蒙者矣故往吝九二當𤼵蒙之任剛而得中為包容衆蒙之象包容之則往者不追來者不拒以是心至斯受之而已隨才成就而不過求皆在其中矣以陽應隂來為納婦吉以下任上事為子克家爻具此象關於世教之大故聖人歴言之凡卦爻取象善可為訓者則詳言之而畧其所次焉六三以隂不中正而應上九不正之陽剛是女之見金夫而不有其身之象也上九以不正居上是无徳善而徒以財自右者也為金夫之象女之從之則亷恥之道䘮而同人類於禽獸矣天下之至蒙莫甚於此而可以為戒者也何利之有六四以隂居隂重隂而又不中則為蒙之甚矣下不應於二上不應於上遠於陽剛而无以𤼵其蒙為困於蒙矣自是其愚蒙而不親近君子以開啓之可吝之甚也聖人以困蒙之吝為獨遠實謂非其資稟之下而由其遠賢以自棄也以見人性皆善聖人可學雖昏愚之至而善反之至於知之成功而為一焉則與生知安行者同歸矣其垂訓之意遠矣哉六五虚中以應九二之陽剛是純真之本質未散而委心聽順受教於君子也書所謂能自得師者也希賢希聖希天皆其所優為者也故吉上九以陽剛居上治蒙過剛為擊搏於蒙之象進人不顧其安使人不顧其誠其施之悖求之拂反為害矣教者不利如此為寇但禦學者之寇可也凡外誘之私蔽其明而亂其真皆寇也為去其私而使全其善禦寇之義也學之教之固多術而皆所以禦寇也上九非能禦寇者聖人以其失在於為寇故以此義訓之以此剛而禦寇則教者學者皆得其道而順矣乾下坎上需有孚光亨貞吉利涉大川需須也待之義也坎險在前乾以剛健臨之剛健則事有定見處有定力不遽進以陷於險待之義也其運用之機在我可不至於困窮矣陷於險中則為困窮需之所貴在於有孚以誠心而需則其心光明而道可亨通心或不誠安得光明何能致亨人之所需固有其心有孚而不得為貞者有孚而貞則誠心為禮而无非禮之禮誠心為義而无非義之義合於犬中至正之道矣如孔子之待價孟子之待招則貞之至也其他沮溺荷蓧之類高尚之過而至於絶人逃世焉心固有孚而貞則未也卦之九五以中正之徳而居天位則徳與位稱道可大行為有孚光亨貞吉之象也需之為用出處之節應機之宜其道廣大精微非時中之君子未能與於斯焉需之以貞則有所不為矣利涉大川可以大有為也孟子言枉已者未有能正人者也况辱已以正天下乎又曰天下溺援之以道子欲手援天下乎此亦貞吉涉川之義也窮理守義之學至則可以用需矣雲上於天亦需之象也待其自雨耳事固有當需者君子自養以待之而已如諸葛孔明隠於南陽非先主三顧之誠則有自養以待時而已此酒食宴樂之義也他事亦有當需者當需而不需焉則為過動不當需而需焉則為怠緩需之道未易言也初九需于郊則遠於險難矣利用恒則終不變其所守矣郭林宗申屠蟠可以當之孔子之歴聘諸國仕止久速應以神化之道人莫之能測莫之能制則需郊用恒之大者也无咎不足言矣九二需于沙沙近水所有之物需于沙去坎險不遠矣人臣以身任國家之利害其迹危厲者似之豈能免於言語譏謗之傷乎二以剛中之道處之以寛裕之誠則可以免於患害而終吉矣唐徳宗欲易太子李泌身當其事雖有危言之及卒能定天下之大計而得免於害此爻似之九三迫近坎水則需于泥之象已及於危難矣其時其地則切比於災而三之過剛不中又所以速其災也至惡者亦可反而為至善矣况三之剛正者乎若能敬慎則善之善者矣何寇之可憂乎三能敬修其徳是以過人之資而潛心於聖賢之學也但可不敗而不能如二之終吉何也時甚難而為力不易者也六四已入于險而身處殺傷之地矣為需于血之象坎之隂爻有穴之象以柔居柔而得其正順而聽之終能免害者也是能出自穴矣四可謂幾死而復得生者也處危難之道以過于剛而速禍君子不為也以過於柔而免禍君子不為也君子守吾之正而已守其正而免於害固其所也不幸而至於殺身焉君子不恤也九五以陽剛中正而居尊位是有君徳而盡君道者也君徳厚而君道盡至是則有自養以待天下之治安而已酒食自養之象也五之所當自養者非以逸豫而已也廣求賢俊布諸左右論思啓沃涵育氣質薰陶徳性而已矣如五之中正若无待於自養矣禹之告舜曰无若丹朱傲惟慢逰是好舜之命其臣亦曰汝亦昌言又曰臣作朕股肱耳目此皆不自聖而汲汲於自養者也若一念怠惰則聖反為狂四海困窮天禄永終矣可不戒哉上六以隂柔居險極无出險之才已陷而入于穴矣不速之客不召之客也三人下三陽也乾三陽本在上之物以見險而需今需極相時而上進矣上六若能敬之則藉君子之拯而可以出險矣故終吉居卦之上无職位者也與九三居下之上為應似為失矣然志在出險而非僥倖以求進也故无大失言未大失則已有失矣君子之處險陷寧身被困辱而不狥人以非禮之恭上六敬之而免禍聖人亦未深許之也坎下乾上訟有孚窒惕中吉終㐫利見大人不利涉大川訟爭辯也以惡逆相及者也堯言其子之惡曰嚚訟則訟為惡逆可知矣卦以坎遇乾上以剛暴制其下下以險機伺其上又已險而彼健皆以惡逆相加者也又内險而外健是習為惡逆者也訟之事或已是而直心不能以自白於是惕然省懼而處之以得中則吉所謂處之以得中者或天理民彞所不可已者則辯明其心迹而已其他所可已者則置之而勿校焉君子以仁禮存心而至於三自反焉横逆之加以禽獸視之而已又何訟焉卦之九二剛來而得中有孚窒惕中之象也若不處之以得中之道則必終極其訟而得㓙矣此反其所為而戒之也上九過剛亦有終極其訟之象九五剛健中正以居尊位有大人之象訟之利見大人或啓其息訟之心或處其所訟之事如以難得者兄弟易求者田土之數言感訟者之流涕相讓則大人真可以利見矣訟之事不可以涉險難而為之要在可止而止矣上剛下險險而健非有涉川之用與涉川之才也天與水違行亦有訟之象作事謀始存仁讓之心而慎守之犯而不較則訟可絶矣初六以隂居下其才其勢皆不能為訟者但明辯其心斯已矣故為不永所事小有言而終吉也訟之事有容徳乃大其次則能忍亦不失為厚也初六能忍者也九二當訟之時與九五訟者也二知五之勢不可敵乃歸而逋竄不復與訟而自潛於三百户之小邑始得免於災眚焉邑人三百户自處卑小之象也二有欲訟之心者以剛而又為險之主也能自卑而免於害以得中也乾之中交於坤之中為坎坤為邑九二居二隂之中潛於小邑之象也二可謂畏天之威以自保者也否則自下訟上而患自掇亡无日矣訟者皆攘奪於人以為己有者也六三隂柔非能訟者但食舊徳安其素分而无外求則可矣然訟之時以强凌弱以衆暴寡者也三雖不能為訟而處强衆凌暴之時雖自能守正而迹亦危矣居下之上有時事之責者也謹敕而免於為惡耳為善而成功則非所能也故從王事則无成九四陽剛本欲訟者然以陽居隂為能濟以柔處上之下為能順上命上之命下何嘗欲其相訟而至於為惡乎四有欲訟之心幾於犯王命矣不克訟則渝變其心安處正道而得吉矣九五當訟之時以陽剛中正之徳而居尊位有中天下而立定四海之民之責與道焉者也匪徒能聽訟而已葢必以道化民使近天子之光而至於无訟者也故元吉不然則區區於折獄之間而治其末亦何足尚哉故象曰訟元吉以中正也謂感之以至徳而民寡過矣上九以剛居訟極而處最上是健訟終吉而能伸者也故有錫之鞶帶之象鞶帶命服之飾上錫下者也以无實之訟至惑上所聽而遂其所欲焉即上之所與也未有得非其道而可常有者也故終朝三褫之終朝之間而至於三禠則辱已甚矣不如无所得之為愈也凡用勢力機巧而倖有所得者亦此類也縱无三褫則亷恥之道喪矣坎下坤上師貞丈人吉无咎師為兵衆本義釋之備矣兵者聖人不得已而用之有應敵之兵有問罪之兵用之以道皆為正否則强暴寇盗而已将在得人老成長者臨事而懼好謀而成有平定安戢之功而无屠城掠地之失𦙍侯之征羲和殱厥渠魁脇從罔治舊染汙俗咸與維新丈人所為葢如此漢之趙充國宋之曹彬皆其人也師出以正又得老成之人用之則吉而无咎彖以師貞合而釋之故曰師衆也貞正也能以衆正可以王矣此湯武之師也齊桓公責楚包茅不貢王祭不供未為不正假之而已九二有剛中之徳上有六五之應是剛中而應也居坎之中上下五隂順之為行險而順也将以剛中則威克厥愛有應焉則欽承天子威命也戰危事行險也東面而征西夷怨南面而征北狄怨曰奚為後我則人心之順也毒天下毒其所當毒者除殘去暴是也地中有水亦衆之象也容民保民也所保之民即所畜之兵也无事則為服牛乗馬之順民有事則皆披堅執銳之勇士矣初六未取於隂陽應與而取其在師之初之義也出師之初在謹其律如嚴部伍禁侵掠皆是也以律行師之法當然而未必其吉也否臧則㐫即至矣如孔明伐魏戎陣整齊號令嚴明合於以律之義馬謖街亭之敗違亮節制則以否臧而㐫矣九二有剛中之徳上為五所應所謂王者遣将跪而推轂曰閫以内寡人制之閫以外将軍制之任之専而委之重故九二得以盡其才徳而成功焉後世進止遲速率由中制之雖有賢将安能有為九二在師而得中道用師之貞出師以律皆是也故吉而无咎師有吉而有咎者冇无咎而未能得吉者吉且无咎善之善矣将能成功則王有報賞之典錫命至三寵賚之者至矣所以録其懐柔萬邦之功而嘉之也六三不中不正居險之極非有為将之才徳而欲僥倖以成功者也故師或輿尸而㐫将不知兵以其君與敵也君不擇将以其國與敵也㐫孰甚焉六四以隂居隂柔而得正是能整兵慎戰而不輕進者也雖无克敵之功得以全師而歸故无咎春秋伐楚而書次者以次為善師六四无咎之義也六五柔順而得中柔順則自不為兵端得中則侵暴之兵加於巳亦必起而應之是田有禽而利於搏執之也言語辭禽鹿豕之類所以害田者也又以其隂柔或不能専任君子而使小人參之則是使之輿尸而歸雖應敵之正兵而亦不免於㓙矣長子謂九二凡才徳為君子之類者皆是也弟子凡次於九二而為小人之類者皆是也上六用師之終天下大難皆已定矣則論功行賞之時也功之大者聞之以有國而為諸侯功之次者承之以有家而為大夫坤為邑有國與家之象焉軍旅之際有謀有勇皆能成功而未必皆君子也若賞以國邑是使肆其毒以虐民也故戒其勿用大君以爵賞正人功之大小而復用小人則禍基於此而邦必亂矣坤下坎上比吉原筮元永貞无咎不寧方來後夫㐫比自有得吉之理比輔也輔則下順從之義也安有下順從以輔之而不獲於吉乎當此比輔之時必推原考筮已有元永貞之徳然後可以當其比輔而无咎否則或以力驅之而已安得免於咎乎元者善之長君徳也君徳至於永貞則純乎天矣不寧者不遑寧處有憂勤惕厲之心者也天之立君以一人治天下而勞之非以天下奉一人而逸之也君人者頃刻謹畏之不存則怠忽之所自起毫髪幾微之不察則禍患之所自生有此不寧之心則下之比輔方感而來矣九五以剛中之徳居尊位而上下應之是有君徳存敬畏之心而得民之歸赴之象也夫者丈夫之稱左傳曰是謂我非夫也後如先事後得之後怠緩之也於君子而怠緩之則賢者退處小人類進而人将離叛而不輔矣則道窮而㐫矣地上有水比之象也建立萬國之諸侯而定巡述之禮以親之先王所以盡比之道也初六居下順體是能比上者也比上而有信實之徳則終始无間而免於咎矣若有孚至於盈缶則不但无咎而已且有他吉也有孚盈缶則信之至也草澤之間有懷至信之徳者安能久在下乎此他吉也六二上比九五也柔順中正則比之自内得正而吉矣内取由中之義事君以道而出於中心之誠也所謂責難於君謂之恭陳善閉邪謂之敬非堯舜之道不敢陳於王前者皆是也如此則僅可以免過而不自失也臣道之難盡也如此六三隂柔不中正處已非其道也君子小人類聚群分而所比皆非其人矣六四位在九五之下比之時皆以下比上也四柔而得正以是而比五則能以柔濟其剛都俞吁咈皆以道而不離於正也則有引君當道志於仁之忠矣故吉九五陽剛中正以居尊位用大中至正之道而顯以比天下者也如孟子所言王道皆為顯比建萬國親諸侯以其一端也先王托股肱耳目於臣下以次承宣而達諸天下則為顯比霸者用其私智小小補塞則晻昧而非顯比也王者田獵用三驅之網去其一面不盡取之取其不用命而入者舜之班師振旅誕敷文徳而冇苗來格是也失前禽邑人不誡邑人之心亦上之心也知其以徳化民而不以威驅之也皆吉之道也上六居卦之上為首之象當比之時下无應與為比之无首之象比已終矣而獨无所比則死亡无日矣故㓙乾下巽上小畜亨密雲不雨自我西郊小隂也畜止之也六四以隂居隂為柔得位柔不得位則不能畜陽柔既得位則有以致上下之應而為其所畜矣小人而无才无位者亦安能制君子哉以巽畜乾亦為小畜又以隂畜陽亦不能大有所畜小人畜君子畜其不能用世耳於其道則无如之何所畜者區區之微末耳小畜之時陽猶可亨卦之内健外巽二五以剛得中而志猶得行君子之作用亦未盡為小人者所畜也故亨小人未能盡制君子之作用則所畜尚未遂也故有密雲不雨自我西郊之象雲為雨氣隂物也陽氣上升而雲密畜之則相持為雨而下畜之未極則氣猶騰往而不雨矣天地間東南為陽西北為隂凡陽唱則陽畜隂隂和而成雨隂唱則隂畜陽陽不和而不雨密雲之不雨亦自我西郊之義也无小畜則无所謂密雲无所謂西郊有小畜則有密雲西郊之象不能遂其所畜則有不雨之象不雨與亨之義相反君子小人勢不能以俱盛也若以為善言之凡臣不能止君之欲子不能止父之過皆此義也畜有止之之義有聚之之義止則聚矣風行天上則氣即散往而不能聚有小畜之象君子以懿美其文徳而已美在其中為畜之大威儀文詞之間而致其美則所畜者小矣小人畜君子必制之使不得遂其所為畜之未極則君子猶得以安其位而行其志君子者始焉若将失其所矣而終得以復其所此小畜之初二皆以復為言也初九乾剛得正雖與四為正應去之尚遠不為所畜猶得進而上行則復之自道矣守正不變而卒得復則復自道矣若非禮求進則復不以道而為以邪媚干澤矣自道而復則无咎而可以行所學以益世其義自當獲吉也九二漸近於隂若将為其所畜矣以所處得中而不自失又與初同體皆陽剛之君子也相資相援進而有為則牽復之象而吉也葢初九結綬則九二彈冠其出與處同一道也九三迫近於四以過剛不中處之失當為四所畜而不能自行為輿說輻之象輻者輿之所以行者也說之則不能行矣夫謂三妻謂四四畜三使不得上進三不受其畜而與之爭情不相得則夫妻反目之象也大丈夫處人而不為人所處非四之能畜三也乃三不能處乎四也故象言夫妻反目不能正室所以責君子不能自盡其處小人之道也處之之道何如謹於自治而不陷於失使小人无得以議之至誠以與之恭遜以接之彼小人者大則革心小則革面矣何能畜於君子乎六四為畜之主以畜道為尚者也柔得其正位近九五是能以誠心而畜五者也所謂以柔濟剛以可濟否者四之心也直道難容若四者懐恐懼之心而幾不免於傷害也九五剛得中而又巽體於四之畜已見其為忠直而不見其為乖忤知求之以道不以非道而罪之焉故四得免於傷害憂懼為血去惕出之象而无咎也象謂上合志言其與九五相合也事君數斯辱矣六四之尚畜道比之以道事君不可則止者則有間矣故僅可无咎而未獲吉九五居尊爵賞刑誅皆其所有人以實心效力而為巳用如以手把物攣固而不可解己之勢力足以驅人而使為用如以富而以其鄰則其鄰孰不樂趨以為用乎九五之君臣同心如身之使臂如臂之使指投之所向无不如意者也然不言吉㐫者未知其同心同徳而施之於畜道者何所用也若用之於畜小人畜己之私欲而不自肆則同心為善而元吉可致反是則流於惡而㐫至矣小畜之時多小人畜君子而四之畜五則又用之於為善也九五勢其所有法其自用而下无應與用其力以為惡未可知也陽剛中正而又巽體才亦足以為善矣故聖人但言其力足以有為而畧其善惡與吉㐫直不欲以小人待九五其垂戒之意深矣上九以巽體居小畜之極巽順於以隂畜陽積之以漸至於其極則畜道成而隂陽和矣為既雨既處之象以隂畜陽小人自以為徳而尚之以至於積滿矣至是則諸陽與之相抗者或茍說富貴或僅期免禍而聽其命矣以隂畜陽小人制君子婦人乗其夫皆此義也婦若貞固守此則危道也月隂象幾望而抗陽将至自食而反傷矣安有小人畜君子而天下不亂者乎亂則小人豈能保其富貴哉此皆切戒小人之詞也君子至是亦不可行行則㓙矣此又喻君子以自處之道也易為君子謀不為小人謀可見矣兌下乾上履虎尾不咥人亨以兌遇乾和說以躡剛強之後和說有恭遜之義剛強有果確之義恭遜果確則嚴而泰禮也禮為人所當履故卦名履以和說履剛強則處已處人之道盡而不為所傷有履虎尾不咥人之象而可以致亨和說為處剛強之道非倖福免禍而為流蕩者也九五以剛中正履帝位而不疚其徳光明人之所履當如此也人之所履宜隨其分而修其所當為故上天下澤則上下之分定而為履也君子觀此象則辯上下定民志民志未定由上下之分未辯也上下之分既辯則民安其所而不妄求其志定矣初九陽剛得正居履之初是以素所修者而為履之始格致誠正之學措而為治平之用未為物誘而變其所守者也執此道以往則无咎矣人之修己所願者在行所學以治人也初九素履之往可謂不失所志而獨行願也九二陽剛得中上无應與有道君子未為世用而不求人知者也為履道坦坦之象坦坦平易也兌有和說之徳平易之義也幽隠守高之人能如此則正而吉矣眇不能視而強欲視跛不能履而強欲履才不足以有為而強欲為也六三隂不中正而處乎陽故有此象是才柔而志剛也以此履剛強之乾必見傷害為履虎尾咥人之象而㐫也又以志剛而居下之上有武人為于大君之象武人无徳肆其剛暴以強力而為大君安能久乎以兌遇乾則乾為虎而兌有履虎尾之象四近五則五為虎而四亦有履虎尾之象九四剛而能柔者也是常存戒懼之心者也以此徳而履五之下則剛不至於取禍柔不至於取辱輔徳納誨之志行于五而得終吉也以堯舜之聰明聖智君道之盡宜若易為矣然求賢任官必勤咨於下而不自専九五以乾剛居尊下以兌說應之有順從而无矯拂則任意裁决而无留難為果决其履之象天位惟艱一念不謹或貽生民无窮之害而天禄永終矣守此夬履以為正則危之甚也上九以陽剛乾體而居履之終是所謂終日乾乾夕惕若履善道而能有終者也葢乾剛則以仁為己任有終則死而後巳曽子易簀而殁是也視其如此之履而考其所宜獲之祥則周旋皆得元吉矣其旋元吉言无適而非元吉也斯人也進則有益於君徳退則有益於風俗盛徳大業人未易及故曰元吉在上大有慶也周易辯録卷一
