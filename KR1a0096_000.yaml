body:
  text: 周易辨録易類提要臣等謹案周易辨録四卷明楊爵撰爵字伯修富平人嘉靖己丑進士官至山東道監察御史以上疏極論符瑞下詔獄繫七年始得釋事迹具明史本傳其書前有自序題嘉靖二十四年乙巳蓋即其與周怡劉魁等在獄中講論所作故取繫辭困德之辨一語為名明史本傳作周易辨說其名小異然藝文志仍作周易辨録蓋刊本字誤也所釋惟六十四卦每卦惟載上下經卦辭然其訓解則六爻及彖傳象傳皆兼及之特不列其文耳其說多以人事為主頗剴切著明蓋以正直之操處杌􅑾之㑹幽居遠念寄托良深有未可以經生常義律之者然自始至終無一字之怨尤其所以為純臣歟乾隆四十四年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易辨録原序豫久蒙幽繫自以負罪深重憂患驚惕之念即夙夜而恆存也困病中日讀周易以自排遣愚昧管窺或有所得則隨筆之以備遺忘嵗月既久六十四卦之說略具矣因名曰周易辨録繫辭曰困德之辨也吾以驗吾心之所安力之所勝何如耳若以為實有所見而求法於古人焉則吾死罪之餘萬萬所不敢也楊爵書
