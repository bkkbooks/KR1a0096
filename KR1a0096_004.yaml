body:
  text: 周易辨録卷四明楊爵撰巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶君子立身可貴可賤可榮可辱可生可殺而不可使為不義進則澤被於生民退則道傳於來世改邑不改井無喪無得往來井井之義也若中道而廢則前功盡棄凶矣九卦言井德之地改邑不改井無喪無得之義也井不動而及物則往來井井之義也又謂井以辨義則井之能事也於井卦見立身之義蓋成已成物之道也木上有水汲而上行井之象也勞來斯民而勸相之相左右之義皆養民之道也初六以隂居下既無陽剛之泉自無及物之功非世故舍初而在初無可用之才之德也地風為升初六則允升大吉水風為井初六則舊井無禽何也蓋升之時主於上進之義九二九三皆得時行道之君子初固可藉之以允升矣井之義主於自立而九二九三之君子己不為世用矣而况初之久下於人者乎又升之德巽而順善之善者井則巽而險柔而害物之義也諸賢生於其時則難乎其效力矣聖人卦辭取其大者而不及於此九二有剛中之德上無應與下比初六為井谷射鮒之象谷初之象鮒谷之所有也泉下谷則注於鮒而置之無用之地矣甕敝漏亦取此義九三剛而得正井泄之象而不為人所食者所應者無位之隂爻又處險之極則隂險之意多三未可以得志也若三者孰不望其興道致治哉故為我心惻而可用汲若明王在上則三可得志而天下並受其福矣九三伊尹太公之儔也有商湯周文則功被於一世矣六四井甃之象可以無咎而已水生於陽者也隂柔則無泉矣居隂得正則自修飾而為謹厚之類耳匡世之略非其所有九五陽剛中正以居尊位澤被生民而志行矣是井冽寒泉而為人所食也亦可謂善矣而無美詞以發揚之何也或者以其為險之主君子未必樂為用而五有自賢自用之小乎若五者好臣其所教而不好臣其所受教者也不然則九三不心惻九二不射鮒衆賢和於朝萬物和於野德業之盛上下與天地同流矣豈區區一己之寒泉而為人所食乎上六隂柔本非泉也然居井之上則井之口泉在下矣上又恆開不掩為井收勿幕之象德澤及物而無間之義也故有孚元吉井道之成視九五則逺過之離下兊上革已日乃孚元亨利貞悔亡樂因循而憚改革茍目前而忘逺大衆人之情也故已日乃孚人心既孚隨其推放無所不凖一時之敷理可為永久之宏規而大亨通矣人之變革不無違道干譽拂人從已之失故利於正則可以亡悔聖王因時立政順天命之正合人心之公而行其所無事也夫豈容私於其間哉有以時之弊而理其時者有以法之弊而更其法者皆革之大要也內有文明之德則在已所以察之者精外有和説之氣則在人所以從之者易革之所以能貞致亨而得人心之孚矣天地革而四時成天地革之大德也湯武革命順乎天而應乎人湯武革之大用也聖人序書則録湯武誓師之辭繫易則贊其為順天應人拯一時之屯溺古今之通義也稱夷齊為求仁而得仁存君臣之義立萬世之防天地之常經也他事有因有革惟治厯明時則専於革而已治厯所以明時明時所以子民也天之立君所以為民欲以一人理天下而勞之非以天下奉一人而逸之矣聖王裁成天地之道輔相天地之宜皆治厯明時之大用而所以左右斯民也初九居革之初上無正應其時其勢皆未可革當以中順自守而不可以有為也守常不革則為中順否則非中非順矣六二文明之主有應於上有能革之德而又有當革之權則可革矣必己日乃革則往吉而無咎己日乃革徐察詳審而使動無不當非時當革而姑緩之也若事為民害或係國安危當如救焚拯溺不暇食以革之矣姑緩之説為害不細九三居離之極過剛不中離極則過察剛極則過動以是而革則征凶雖事為當革而處之不善亦危矣必三令五申以明己之志則可以有孚矣九三德之衰也固不能無言而使人自信也盤庚遷都心本為民而民不從至勤三篇誥命始能有濟革言三就有孚之謂也大凡忠信不足而尚辭命衰世之意也九四近五贊五以改革之命播諸下又剛柔不偏善處乎革之道也事當革而未革則有悔善處而革之則悔可亡人信其改命而得吉矣陸贄為唐德宗作奉天詔書山東父老為之感泣有孚改命之謂也九五以陽剛中正之德當革之時而居尊位下有六二文明中正之臣以應之同寅協恭建制立法以革天下而至於禮樂興也文章制度炳乎一世革道大成不待占而有孚矣上六處革之極君子至於豹變而其文蔚然小人革面而順以從君皆已有以致之也若以聖人處之則必世而仁矣上六隂柔之才固不能變小人之心其力之所至效之所應止於如此而已安其如此而已等而上之之功業以俟能者則正而吉若過於有為則不量其力徒取煩擾而得凶矣巽下離上鼎元吉亨卦之體鼎之象也以木巽火烹飪鼎之用也聖人烹以享上帝而大烹以養聖賢事天之仁養賢之禮具於此巽而耳目聰明則察事理之幾而制之以道也柔進而上行得中而應乎剛以離明得中之君而下應九二之賢則上下之相與而都俞吁咈者皆以道焉所以致元亨也正位表正之義也履尊位而有以表正天下則天命凝固而可以常主器矣初六居鼎之下鼎趾之象也上應九四則趾上而鼎顛矣鼎之初未有美實所有者否惡之積耳因其顛而出之則為利矣在四以上顛之則為大惡在初顛之則為成功初知有顛而不知有出否出否得於意外之幸也鼎之否亦不待必顛而後可出未顛亦可以出之一有顛則所損者多矣聖人特據其象而示人以既顛之後所處之道也事固有因敗以為功以不幸而反為大幸殷憂啓聖多難興邦者類如此得妾以其子亦然顛趾得妾皆過也因出否得子則為善補過矣九二剛中之德鼎有實之象也下比初六己之仇也仇者配耦之義隂陽相比配耦之象也初有邪惡之疾二能嚴其自守之常初之疾不能反於二焉韋忠不就裴頠康侯之逺秦檜得此義矣九三以剛正之才舍五不應則道不行於當世鼎耳革其行塞之象也五為文明之主柔而得中非不能任賢禮士者三不此應則過剛不中而失其義矣道之不行誰之尤哉以賈生之才不能為漢文所用而有長沙之行亦生自處之過也豈以五之明終有棄於三之剛正哉三之才終當為五所用焉方雨虧悔而終吉矣使賈生不死而假之以年則通達國體之實才文帝不能舍之矣九四近六五五之於四其爵賞之可謂厚矣委任之可謂専矣屬望而責成之可謂不淺矣四不能進賢報國乃下應初六引用柔邪以為善類之禍以基天下之亂則上負君德下負蒼生誤國誤民之罪安可逭哉故其形渥凶六五在鼎為耳而有中德則黃耳之象也下應九二資此陽剛得中之賢輔己以盡君道則為黃耳金鉉矣五之於二內之而不外二之於五得以已之剛而濟其柔金鉉貫黃耳舉移之義也五於二當終始委任而不間以險邪則為貞而國與民之利也五體柔所不足者貞而已聖人慮其任君子而有二焉故以利貞勉之上九為鼎鉉之象居五之上在鼎之終師保之位調和鼎鼐輔養君德之任也以陽居隂剛而能柔玉鉉之象一容顔威儀之感召而有潛消默奪之機其功用多矣故大吉無不利伊川程先生謂經筵須得范忠宣其溫厚之德自有感動人主處震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯震有能動之意有震驚恐懼之義能動之亨以轉移作用之機在我而不在人則可以得亨矣震驚恐懼之亨乃處多凶多懼之地雖赫然臨之有死有生在於頃刻心不為少變志不為少屈刀鋸鼎鑊之在前而平生之所守則自如亦亨之義也又內卦為動外卦亦為動則為動所當動而動以天亦自有得亨之理焉危者安其位者也亡者保其存者也亂者有其治者也此震來虩虩笑言啞啞之義也雷之震止於百里震之象為雷故以震驚百里為言震驚百里震之之勢亦盛矣而不喪匕鬯君子之心豈以震之逺近而為所守之難易乎震有足為千萬里之驚者有足為千萬世之驚者君子以義理為主而吉凶禍福未嘗介念視其震驚若無與於己也若戒謹恐懼以保成業者則又一義焉商書曰兹朕未知獲戾於上下若將隕于深淵湯之所以能為宗廟社稷之主也凡諸侯大夫不敢縱逸而能保其國與家者皆在其中洊雷震君子以恐懼修省所以體震之義然君子恐懼修省不但可以謂其得之於震謂其得之於六十四卦三百八十四爻皆無不可特於震之義為切又洊雷則恐懼修省之心無時而可間也初九爻詞與卦詞同者蓋一陽動於二隂之下卦之所以為震者取於初爻之義而此爻獨得一卦全體之義焉故其詞無異聖人之心如天而筆則如化工焉天之道因物以付物也聖人寫其卦爻所具之理而已無與焉耳六二乘初九之剛初以剛逼二而動於下在二則危之甚也初肆其橫逆而動者也其勢非遂其所欲不自止二度初之來己必喪其貨貝躋于九陵之上而待之焉九陵髙之義也初以剛動而二以柔制之初以邪動而二以正克之待之之道髙出乎初之上躋于九陵之象也貨悖而入者亦悖而出初以非道迫二而使喪其貝不能為己有而二終當得之勿逐七日得之象也卦有六爻至於七則終而復始數窮理極之義也七日來復亦如此六三當震之來渙散自失至於蘇蘇焉則奪其心褫其魄矣蓋以不中不正怵於利害而不能以義理為主故至於此揚子雲之投閣李梲之膝行似之若因震之來而能行以去其不正則可以無眚矣三未必能如此聖人以疢疾憂患可以堅人之志熟人之仁故以此勉之其啓人遷善之意至矣九四以處不得正之陽介於不正之二隂之間己既不能以道義自樹立而相與處者又不能激發成就而使之歸於正焉故當震之來遂不能振奮而至於滯溺焉陽剛本有為之才由處不得正而流為委靡之甚焉聖人蓋傷之而以為未光也若以正自克則光明俊偉而可以自奮矣六五以隂柔當震之時而居尊位則往來皆厲無適而非厲也蓋其中無定主為震所怵而不能有以處之也如宋真宗澶淵之事非有寇凖髙瓊則王欽若輩遂定南遷之䇿其危甚矣髙宗播蕩伏竄國勢削弱而終不能振又其下者然處之之道惟在籌度思慮不喪其所有之事則心有定見事有定處而可免於往來之厲矣五所有之事中是也中為人君酬酢斯世之道也得其道則何震之不可處而安有危厲之可言乎若髙宗有卧薪嘗膽之志選賢任能以復不共戴天之讐乃其所有之事而大不可喪也上六以隂柔居震之極故當震之來則索索視則矍矍耳目無所加手足無所措惶懼惆悵之甚也以是而行則凶可知矣若於震不于其躬于其鄰之時而圖之則無咎矣蓋事先有備以逸待勞以靜制動其機在我而可以處乎震矣陽動於下迫近於五而未及於上亦有于其鄰不于其躬之象庸人識見昏淺不能慮逺而憂深但救之於已然不能防之於將然反以智者之思患而預防者為非是故不免於婚媾之有言也艮下艮上艮其背不獲其身行其庭不見其人無咎艮止也背指所當止之處而言有無私係之意亦有無偏向之義聖人之取象精矣言人之日用應酬無巨無細必求其義理精當之處而止之絶無私係偏向之意焉即大學之止於至善也不獲其身不知有己也庭除乃有人之處行其庭不見其人不知有人也不知有己焉不知有人焉惟知有義理之至當而己所以得無咎也此即君子義以為質義以為尚義之與比之作用也聖人盡之而神化不測賢者勉於此而不敢怠堯舜禹湯文武周公孔孟相傳之道也如孔子之仕止久速各當其可孟子於齊王餽兼金不受於宋薛則受禹稷過門不入顔子之在陋巷曾子之逺害子思之死難此皆艮其背之義也又如為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信亦艮其背之義惡知有己惡知有人時止則止時行則行動靜不失其時即艮其背之義其道純乎義理而光明矣思而出位則有私係偏向之意而非行其所無事也艮其背之義精矣逺矣引而伸之觸類而長之天下之理盡於此矣初六艮其趾趾在下為初之象用之以行者也艮其趾則不行矣當艮之初居下無應宜於守靜則可無咎以隂柔恐其不能固守故戒其利永貞若動於欲而不終止則失之矣艮以人身取象趾之上為腓則二之象亦用以行者二中正宜止而止艮其腓也三居二之上隂必隨陽九三乃二所隨者而過剛不中二欲拯之而三不退聽視其所隨之流於惡而不能救故二之心有不快焉以在已拯之之道或有未盡者焉非以尤人而不快也凡子不能諫父之過臣不能止君之欲朋友之以道義規正而不以為是皆此義也九三當限之處限身上下之際身因之以屈伸者也止其限則不得屈伸而上下判隔如列其夤矣九三過剛不中失己失人動無所成非自安之道也六四艮其身居隂得正宜止而止得處艮之道矣故無咎四雖得正而才隂柔又當艮之時而能自止可謂量己量時者矣唐之鄭綮似之凡不揣其分而拯時之厄以自取顛覆者不如六四逺矣六五當輔之處輔出言者也艮其輔則言所當言而言有序亦可以文身矣故悔亡若以居尊言則播綸綍以諭下而得其當之義也以言感人淺事也僅可以亡其悔而成功則非所望焉况言有未善而欲人從之者乎艮之時當止之時也上九以陽剛居艮之終乃終於止而確乎其不可拔敦厚於止者也若所守未終而欲動焉則失之躁妄非敦厚之道也貞不絶俗隱不違親天子不得臣諸侯不得友郭林宗可以當之艮下巽上漸女歸吉利貞漸進而不遽之義女歸如是則吉也婚禮備而貞女始行歸以漸之義也又利於貞漸歸亦有貞之義焉獨取於女歸者閨門萬化之原廉恥之道風俗所關於義尤重如漸之義而進女歸則吉也進而得位則可以行所學而澤被於下為往有功也必人君致敬盡禮而後進為進以禮有漸之義進以正也進以正則可以正邦矣若枉己失道未有能正人者也而况於正邦乎擇主量時之義亦在其中矣以卦體之有位者言則九五以剛自下進居上卦之中有得中道之象為進得位往有功之大者也止而巽亦進有漸而得正之義也故動可以不窮若急迫用壯而進則未為得正動取窮厄而不可以有為矣居賢德與善俗必以漸始能有成居者有而安之之義欲德之有於己而與之相安必優遊厭飫之久而後可得善風俗雖王者亦必世而後仁德盛者固感之必應矣然欲不識不知歸其有極而禮樂興此非積久曷能有成當漸之時凡懷明德新民之具者進而益世為理所當然初六在下固為當進居止之初是能以禮義自節而不遽進進為有漸鴻漸于干之象也載贄以出而其地與人皆未定則進身之權度在我矣小子之智能見近小而不能見逺大以其上無應與故以為危厲而有言焉不知君子體用之學豈可絶人逃世而終與鳥獸同羣哉於君子則無咎矣若與人以為厲而有言焉則其言為可信初六宜止而不宜進矣六二中正而有應則德與位稱而不為尸位祿以功受而不為素餐為鴻漸于磐飲食衎衎之象而吉如六二者可謂遇其時矣九三過剛不中居止之極過剛則必躁進止極則欲速進不暇擇其所事而進之不得其所矣為鴻漸于陸之象鴻水鳥陸地非其所安也羣類離已而孤立無助夫征不復也所為失道而不能有成婦孕不育也凶莫甚焉惟利於禦寇寇者切害之名指人之私欲而言私欲者心德之害也故以為寇以此極剛而用之於克己則能拔去病根而且甚速乃為利也聖人欲變三之剛惡而歸之於剛善焉故以此啓之六四所乘者過剛不中之九三為進之不得其所而未安矣鴻漸于木之象木非鴻之可安也然以柔得其正而又巽體善處乎九三者也於未得所安之地而有自安之道焉為或得其桷之象而得無咎四可謂善處乎九三矣九五陽剛當漸之時而居尊位為鴻漸于陵之象六二已之正應而為九三所間隔則二無所用其才而功未建為婦三嵗不孕之象以柔中而應剛中理之正也九三之邪豈能終間故莫之勝而五得吉矣九五巽體而道未光故遲久而始得所願焉幾於危矣若以純粹之剛中正處之則賢不肖可以立辨而進退之矣豈待三嵗之久哉上九以陽剛居漸之上進之極髙而出乎人位之上為鴻漸于逵之象逵雲路言其極髙而人不可就焉斯人也天子不得臣諸侯不得友嚴光周黨之儔可以當之其清風髙節使聞之者起敬誠足廉頑而立懦焉助成人材之盛風化之美為世道之益亦足多矣有其羽可用為儀之象而吉矣視富貴如浮雲而志超乎萬物之外孰得而亂其所守哉兑下震上歸妹征凶無攸利歸妹為天地之大義者天地交而萬物興亦歸妹之義也有夫婦然後有父子生死始終之理具於此無歸妹安有始無始安有終故歸妹為人之終始也説以動則動不以道徇人欲以滅天理固有凶而無利矣位不當則征凶天地翻覆冠屨倒置賢不肖之榮寵擯斥相去逺甚盈天地間皆非人道矣至是而欲行則凶立至矣柔乘剛則柔用事而剛為所屈君子無所利矣未至如位不當之甚也不有君子其何能國小人亦何所利哉雷動澤隨非歸妹其惟動是隨而不以道亦如歸妹之義也人之所從所與不可不慎或沉溺其所有或怵惕於其可畏變平生之所守而輕從之則合之不以道而失其義矣要其終豈無敝乎君子所以戒謹恐懼而不茍於其始也初九陽剛在下女子賢正而處卑微娣之象也未有合二姓之好以為宗廟社稷之主之責焉而成助乎女君跛之能履其履幾何亦深可惜矣然道行於女君而有常焉則女君之能進婦道即初九之道也故得吉有開誠心布公道集衆思廣忠益之意諸葛孔明君子未必不樂為所用而廖立李平之徒至於痛哭而奮死焉九二陽剛得中女子之賢善多矣上有正應而反隂柔此德此善將焉用之眇之能視其視幾何衡門考槃之賢者髙出千古之上君子尚當企及焉五雖應二而道未可以大行幽人之貞必道行天下而後行之固不屑於眇之能視也張華之委身晉惠雖江左粗安所成幾何而竟取殺身之禍昧於幽人貞之戒也六三歸妹以須此輩宜束之髙閣待其既格然後徐議其任耳反歸為娣李文靖言丁謂顧其為人可使之在人上乎當是時雖竄逐林莽亦不為過而使其竟成君子之禍文靖所處亦未盡善九四陽剛在上而下無應賢女擇配而不輕從人為愆期遲歸之象非不歸也待時而己若無其時亦終不歸矣子貢問有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也伊尹不遇商湯太公不遇周文則莘野之耕夫磻溪之釣叟終焉而己六五以隂居尊下應九二之陽為帝乙歸妹其君之袂不如其娣之袂良之象女德至此盛之至也為月幾望之象不曰望而曰幾望望則已滿矣六五虛己下應非自滿者也何彼穠矣棠棣之華曷不肅雍王姬之車得此義矣凡君人者忘其崇髙富貴之勢尊德樂義虛己下賢期於成君德而盡君道者亦此義也上六居歸妹之終而無應者也女承筐無實女無實應於士者也士刲羊無血士無實求於女者也亦何所利哉有道君子老於林下而時未可為則終焉而己雖然所不利者天下國家也在君子則道未嘗不亨於此心此身無不利矣孟軻氏於平公似之而所不利者魯之宗廟社稷也孟子曰天未欲平治天下也如欲平治當今之世舍我其誰處之固泰然矣奚以不利言哉離下震上豐亨王假之勿憂宜日中察之極其精處之極其當則惟動丕應徯志為盛大之勢亨之道也家國與天下皆然若以極大者言則惟王者可以當之如舜之覃敷文德至於四方風動禹之祇台德先不距朕行至於東漸西被朔南暨此亨之極也故曰王假之尚大也盛極則衰氣運之常聖人以天自處則有回氣運之道焉故勉之以勿憂宜日中也宜日中宜守中道之義也日中則照無不遍未中與過中照或有不及者焉聖人以仁義禮樂化天下舉一世而甄陶之通其變使民不倦神而化之使民宜之則何盛極之衰之可憂哉故曰宜日中宜照天下也日中則昃而夕矣月盈則食而缺矣天地盈虛且與時消息而有盛有衰矣况於人况於鬼神而可無盛衰乎天地之盈虛消息以其有常者而言也如五百年元氣積厚生聖人而成治化則盈而息也自此則漸虛而消矣鬼神則自其屈伸往來變化不測者而言如熱極則風生亢極則雨生潦極則陽生凡一日之間隂晴不常變態不測此皆鬼神之理也只以連日雨觀之熱氣盛則雨之候雨驟則又不能久人之一身之老少及家國天下之廢興存亡則又易見者也君子盡其在人者而已本於天者則順受之雷電皆至亦豐之象也折獄致刑取於雷電威照之義非威則照無所用而適足以長姦慝非照則威為暴虐而或至於殺無辜初九遇其配主雖旬無咎陽與陽本不相應初九為離之體有明者也九四為震之主能動者也非九四則初九無所用其明焉非初九則九四無以措其動焉配主謂其才德與己相配而可相主矣雖旬則無咎焉相與往則足以成功矣故可尚也古人有謀斷相資者類於此六二得中得正為離之主有明德之君子可以益國與民者也六五當豐之時以隂柔居尊位沉溺於富貴崇髙則昏暗之甚者也六二有明德而五不能用為豐其蔀厚其障蔽而明不得外見也日中明也見斗則夜而昏矣己則明而遇人之昏之象也五何以至此哉晏安之溺人或剛立者不能保其有終而况柔懦者乎以唐玄宗之才智討平韋武之亂委任姚崇宋璟以致富庶開元之際可謂豐矣內耽女寵外信小人十九年養成天下之亂竄身巴蜀幾至亡國此其明驗也張九齡以直言往而遂得罪其疑疾不亦甚乎惟當積其至誠以感動之則可以得吉至誠而不動者未之有也誠之至則可以發其志而有轉移之理焉周公之於成王是也故曰我之弗辟我無以告我先王公可謂極於忠誠矣故風雷彰變而成王至於感泣焉誠之至與不至則責之二五之悟與不悟則委之天九三豐其沛日中見沫亦以明德而遇昏暗之時之象也沫小星見沫則暗之甚矣右肱便於作用者也折其右肱終不可用也九三剛正離體有明德而不為世所用為折其右肱之象君子用則行其道於天下不用則奉身而隱於丘園有何不可若三者明足以察乎事之幾剛足以致其退之速故無咎九四近六五者六二應六五者故取象同豐其蔀日中見斗六五為之也遇其夷主與初應也夷等夷也初以四為配主四以初為夷主相下相資而期以行其志也初在下未敢以成功望於初故但言往有尚若四得初之明以施其動有旋乾轉坤之功焉故得吉豐之時多賢才焉初九九三皆剛而得正九四以剛居柔而動不躁六二以柔得中正而為明之主其志其才皆一時成章之士也六五若能來而致之布諸列位使輔己盡君道以答天休焉則為善守成業之主有慶譽而吉矣五隂柔其才未必能若是焉聖人以世未嘗無君子憫其柔暗而不能用則無以保豐大之業故設此以啓之其垂教萬世之意深矣或五居動體亦有可轉移之理焉上六以隂柔居豐之極是憸夫壬人志於富貴而自封殖其家者也為豐其屋蔀其家之象斯人也於事之是非人之賢否則懵乎其無見焉為窺其户閴其無人三嵗不覿之象焉户非無人以昏暗之甚而不能見也小人亡身殖貨上而攘奪於君下而刻剝於民周之皇父作都于向擇三有事亶侯多藏擇有車馬以居徂向而周遂以亡豈特小人一身一家之凶而已哉艮下離上旅小亨旅貞吉山上有火旅之象也止而相離亦旅之義也六五以柔得中於外而順乎上下之二陽善用柔道而又得剛陽以依之止而麗於明於所止之處而用明德焉此皆處旅之正道旅之所以小亨而得吉由於此也此即旅之時義也時義若此之大以羇旅之際故但可以致小亨周襄王出居于鄭自謂不榖不德而藉晉侯以復國得處旅之道矣昭公不聽子家之言而客死於乾侯失而又失也是道也用之以處夷狄患難皆無不可折獄致刑取山上有火照能及逺之義不留獄則去而不有之義也賁之火在山下明不及逺故但明庶政而無敢折獄則旅之火在山上者自有折獄致刑之用焉初六當旅之時以隂柔處下旅之最下者也其志瑣瑣然計錙銖之利失人心而自取窮極災也當旅之時所賴以安身者次舍也所賴以裕用者資財也所賴以給役者童僕之貞也三者皆旅之不可無者也六二柔順中正善處乎旅者也其才其德皆可以致此吉不待言而可知矣旅焚其次則處身者無其所矣喪其童僕之貞則給役者無其人矣九三過剛不中居下之上驕亢而不能下人人莫與以相親不能一朝存其身者也危莫甚焉三近於離故取焚次之象九四旅于處未得旅之次舍也以其陽而居隂也以陽居隂則剛而能柔處上之下則上而能下剛而能柔上而能下則防身有其具而災不及焉是於于處之地而得所資以防身之斧也然所乘者過剛不中之九三又與己異體而不相得焉所應者瑣瑣取災之初六未可相與以有為焉若四者僅可藉之以免禍而已故其心有不快也子家子不能於意如之強戾叔孫昭子之才又不能為已之助知有亡而己矣此爻似之六五為離之主有文明之德雉之象也以柔處旅之時而又居非其正則事多委曲求濟而未有直遂之意焉有文明之德而少直遂之意為射雉一矢亡之象也德以文明為大五具此則所善者多矣故終以譽命為上所聞五可謂得而有失失而終得者也上九處旅之上離為雉鳥之巢也髙而不下失其所與而無以自安為鳥焚其巢之象在旅人則方自以為得也而終至於無以容其身先笑而後號咷也易輕易也離性躁動故以輕易而喪其順德焉輕易與順德自相反有此則彼喪矣順德喪則焚巢號咷固不免矣上可謂自取災咎者矣巽下巽上巽小亨利有攸往利見大人剛巽乎中正而志行九五以陽剛居中正之位而其志可行所謂中天下而立定四海之民也初六順乎九二六四順乎九五則柔皆順乎剛用事者為陽剛君子之類而隂柔之小人歸於從伏之下而不得行其志故可以小亨而利有攸往利見大人其不能大亨者何也凡陽剛之才之作用可以大有為而致大亨巽體本隂而重巽則巽之巽隂之隂者也固不能大有為而致大亨也治道不能如三代者僅為小康而已施為不法乎三代者溺於陋習而已如漢唐之治皆為小亨小康而己其利有攸往亦不出乎雜霸雜夷之作用也比於三代聖王井田封建學校之制對時育物舉一世而甄陶之則如天地之相懸矣九五以剛陽居尊有大人之象見之而得以行其所學亦君子所願也此亦巽之大人也比之與天地合德之大人則有間矣如漢文帝唐太宗亦可謂當時之大人矣然德未至於盛則治未至於極效止庶富而禮樂不興可以當此之小亨也重巽言申命隨風則言申命行事申命皆取重巽隨風之義申命後必有所事也申者丁寧告喻之也或以己之所行諭民知之而後行之或命民以所當行之事既命之後即令民行之上之人視其所行之勤惰而勸懲之亦行事之義也初六當巽之時以隂居下過於柔懦而不能振拔者也事多失之不及為或進或退而不能果決之象利於武人之貞焉武人而非貞則血氣之強而已矣惟能貞也則凡剛毅果斷而振奮有為者皆純於義理之正而為君子所尚矣初非能此聖人因其柔之甚而激勵之使志於治也古人有以性緩而佩弦者類此九二巽在牀下過於巽者也史巫之紛若所以逹誠意於神明也用史巫紛若用其誠也能用其誠則凡過於巽者皆真德實意而非足恭之虛貌則可以得吉矣二有剛中之德其巽可以合於道故聖人勉之以用誠焉非誠則其巽為象恭行詐之小人而君子之所羞見者也九三剛正居下之上巽本可以得正也然處六四之下四隂柔其性務入而近於五是夤緣鑽刺得時得志之小人也三居其下朵頥於其勢而數巽焉可羞之甚也所得者富貴所喪者名節廉恥之不修而其志亦窮矣六四以柔居柔為得其正當巽之時近於五能巽於五者也位在一人之下萬人之上而能巽於五庶幾乎夔夔然存敬畏之心者也如此則道可行於五而功被於上下矣為田獲三品大有功之象其過巽之悔至是可以亡之矣自九三視六四則四為容悅諂諛之小人所以戒三之逺乎四也至是則又以四為虔恭寅畏之大臣所以勉四之忠於五也或抑或揚取各有所指九五以巽體居尊位所不足者貞而己故勉之以能貞則可以得吉於柔懦不能自立之悔可以亡之而所為無不利矣有悔是無初也以能貞而亡之是有終也然所謂貞者不過於惇典庸禮命德討罪合於天理當於人心而不參以私意於其間則貞之至也是道也毫忽幾微之不察則流於失而不自知矣故必丁寧揆度詳審周密而戒之至則動無過舉可以得其當而吉矣先庚三日後庚三日即貞之義也上九居巽之極為過巽之甚巽在牀下之象也陽剛本能斷者也而過於巽焉則失其剛斷之德為喪其資斧之象也其為害誠不細矣雖為所當為而以優柔不斷處之亦必凶况所不當為者乎蓋無適而非凶也執狐疑之心持不斷之謀者上九之謂也所以來讒慝之口啓羣枉之門者皆由於此故象言其正乎凶君子可以深戒矣兊下兊上兊亨利貞兊一隂見於二陽之上和柔之氣外見者也故其德為説剛中而柔外有致亨之理有能貞之才若一於柔外而無剛德以為之主處君臣則為諂媚處朋友則為善柔在父子則或阿意曲從而陷親於不義矣何以致亨而為利哉利貞據卦中所有之才而欲人體之非以其不足而勉之也剛中柔外如臯陶所謂柔而立者也説以利貞則所説者皆天命人心之正理故為順乎天而應乎人以當勞之事而説以先民則民忘其勞所謂以佚道使民雖勞不怨是也以可犯之難而説以犯之則民忘其死所謂以生道殺民雖死不怨殺者也説道之大而民勸矣哉説道之大不外乎正而已矣説之義或説其道而學之或説其事而為之或説其人而與之此皆説之用也而有邪正焉如陳相之説許行説之可謂深矣然流於邪妄而非正也為身心家國天下之害甚大也何以致亨乎説又有能亨而不得為正者亦有得正而不能以致亨者如孔明説先主而事之則為正矣終不能興復漢室荀彧之事曹操十分天下而有其八所為雖亨而事未得正然孔明君臣正大光明事雖不就而道實亨荀彧不擇所主而自取殺身之禍其厄而不通亦甚矣君子於説道之用貴於窮理而慎守之也麗澤為兊兩澤相麗互相浸潤朋友相資其益甚大初九陽剛得正處説體居下而上無應與君子以道德禮義文其身而不求聞達者也其德則喜怒哀樂發而中節和而不至於同不溺於流者也凡聖賢處不得志之時而安貧樂道者可以當之以道殉身貞而不諒卷舒運用與時偕行何可疑也九二有剛中之德上無應與其志在自信其德而自説者也萬物皆備於我反身而誠則樂莫大焉富貴利達視若浮雲亦何與於心哉其必由強恕求仁而至此乎故有悔而可以亡之以居隂故也二之資質不如初善反之則天地之性存焉而無歉矣故亦足以自説焉六三以隂居陽不中不正欲以其術説五而五不應故來二陽而求其與己相説焉二陽者一則剛正一則剛中雖上無應與而自有其説獨行之君子也六三居下之上頗得時任又兊為口舌見二君子不為世用乃肆其邪説以蠱惑之欲二陽舍其正而從已之邪此則無恥之甚凶之道也三非能説於二陽欲變二陽而使之説己也若為説二陽之道則逃其邪而歸於正力善自反者也在二陽則歸斯受之而己不可言凶也九四上承九五則剛而得中之君也下比六三則柔而不正之邪也四則商其所説而未能有定焉懿德固人所同好而邪術亦足以惑衆况四知之未真而守之未固宜其至於此也蓋其以剛陽居柔失其介然之操而不自知矣若能堅持其介知三為可疾而疾之則必知五為可説而説之道行於君而澤被生民何喜如之四非卓然自立者也聖人以其剛德尚在故勉而進之也九五孚于上六剝已之隂柔則有厲矣五切近上六上六居説之極是欲售其邪術以説五而竊取富貴者也如蘇秦張儀馳騁口辨而一時諸侯靡然從之邪正不容並立信此讒邪則任賢不専終於君子盡去小人獨存邦家之覆可以立待危之甚也聖人之戒可謂嚴且切矣上六引九五使之説己者也引之而使説己即非君子自重之道矣自九五視上六則為剝己之柔邪而宜逺之自上六言之履九五之上而無位則人君以賔禮遇之而不以臣道畜之者也身之去留亦視其尊己而信之者何如耳合則行不合則止此進退之大節而不可茍者也若枉己求合曲為牽引使之説己而求以行其志豈聖賢光明之心哉聖人示人以出處之有義而枉己者不可以正人以上六之引兊謂君子或亦有是失而直不欲以小人待之也坎下巽上渙亨王假有廟利涉大川利貞渙之時自有收合混一之理可以得亨九自三來而居二為剛來而不窮居三則過剛過剛則濟渙易至於窮來而居二則剛而得中自能相時與幾隨其先後緩急之𫝑而措其經略之具操縱施為之機在我而可不窮矣六四以柔得位於外而同於五輔五以濟一世之渙也五為濟渙之主六四運籌幃幄九二則經營四方何渙之不能濟故有得亨之理王假有廟王者至於祖廟盡其誠敬以聚祖考已散之精神而享之亦處渙之一事也坎水在下巽木在上有舟楫之象如卦之才以涉大川亦足以為利矣大抵時之渙非中人之識見才力所能察而濟之也周公東征雖父老之敬事者皆以為難而憚於行唐憲宗之討淮西惟裴度力主之而卒以成功識見作用之過於尋常者雖當險阻艱難之際若未可以措手者而彼則灼知其為事之不可已而功之必可成也若樂因循而憚危難適足以自亡而已矣光武昆陽之役獨當敵營之堅卒能摧破王尋以成大功亦一驗也又必利於正當天下渙散之時而所為不正則失人心而不足以有為矣如劉先主言操以詐吾以誠操以暴吾以仁則事乃可成不欲以小利而失信義於天下此其濟渙之正也渙卦亦有利見大人之象九五九二各以陽剛之德而當君臣之位五推誠以任乎二二效力以忠於五則時渙可濟如鄧禹仗䇿於軍門先主三顧於草廬不如是不足以有為也聖人不繫以此辭者能涉川利貞則濟渙之規模根本己略具矣風行水上渙之象也享帝立廟先王盡仁孝之誠而己事則為合其渙初六用之以拯渙者有壯馬也當天下離披解散之時英雄豪傑孰不欲樹尺寸以益世乎初六以隂居下非有濟渙之才其志不自己也位近於九二故藉二之才德而與之有為初之所謂壯馬者二也二可為有千里駿驥之足矣初能順之則初亦可謂能量已而量人者矣如是則二之才亦初之才二之功亦初之功也渙之時可相與以措其經世之略矣故得吉九二當渙之時自三變而來居於二為奔其機彖所謂剛來而不窮是也機為人所安身之具奔其機則得所願矣居三則過剛不中亦非可以有為之責任奔於二則陽剛得中而又為五所信任才以奔而為有為之才位以奔而為可為之位以陽居隂之悔可亡矣士之經歷變故熟仁堅志而可當大任者類此六三隂柔不中正居下之上當天下渙散之時有一身之私而無四方之志者也志在金帛爭用威力以取朝夕之快而已如此則不足以拯時之渙而悔及之矣若渙其躬而以天下為心則亦忘私秉公舍小而就大矣何有於悔漢髙帝入咸陽欲居秦宫室以張良諫而還軍霸上渙其躬也六四上承九五當濟渙之任者也居得其正下無應與為渙其羣之象大臣膺爵位之隆委任之専心知有君而不立朋黨家相之才德也善孰大焉故元吉四以渙其羣而為所處之髙而見超於一世焉渙有丘匪夷所思之義也丘取髙義六四所處之髙似之九五為濟渙之主當天下渙散之時必有大號令以收合人心又散其居積以周窮乏此皆濟渙之大用也周之大誥多士多方諸篇皆所以合天下之渙也散鹿臺之財發巨橋之粟渙王居也徒有大號而不渙王居則口惠而實不至何以得天下之心乎凡山林川澤之利分土授民之制有以處之而使民樂其樂而利其利亦渙王居之義也號令惟君所當布居積惟君所當有皆非人臣之事人臣則贊助之而已故曰王居無咎正位也五獨取此者巽為風有號令之象渙王居則號令之後不可已也上九當渙之時履乎人位之外獨無濟渙之責耳天下之渙亦不及於己焉凡一時投機會趨功名以拯渙者己皆不屑知有全身逺害而已傷害憂惕判不相加隱迹逃名僅可自保故無咎沮溺荷蓧之流似之兊下坎上節亨苦節不可貞能節則可以致亨失其節而得亨者未之有也雖求無不遂而滿其所欲然道塞而不足以言亨矣剛柔分而剛得中説以行險當位以節中正以通皆卦之所有能節而致亨者也苦節不可貞則又因以戒之焉三隂三陽剛柔平分二五之剛皆得其中無過與不及則中節而得亨矣若至於苦則過於義理之當而為人情所難堪不可守以為常矣惡能亨哉説以行險則其節至於死生之際而不可奪道固無不亨矣九五以節當尊位能以中正之道而通變宜時焉則節之大而亨不足道矣天地節而四時成天地非有心於節也一氣流行以成化育之功判而為寒暑分而為四時詳而為二十四氣極而為七十二候皆聖人順其理而裁成之耳節以制度則度為中正不至於傷財害民焉財者民之所資以生者也傷財則至於害民矣民者國之所賴以立者也害民則自伐其國矣制度無節則徇人欲滅天理無所不至豈恤民保國之道哉先王之制度也所以養乎民後世之制度也適以戕乎民公私之間而已矣澤上有水亦節之象也制數度則儀文品級順性命之理達時措之宜而别親踈貴賤之等議德行則不至於過與不及皆節之用也初九當節之時以陽居下上應六四為隂柔陷險之爻小人近君竊其權柄以進退天下之士稍不如意則誅殺隨之唐之李林甫是也草茅之士懷才抱德於斯時而欲行其志難矣哉此許謹禮之徒所以甘心逸民而與鳥獸同羣也初九之不出户庭可謂善節出處之道者而象許其為知通塞也九二與九五雖皆陽剛而處相應之位五之當位以節中正以通者自可以用二焉二以陽居隂而處之未得其當徒以其非所當應而不為所用焉有不出門庭之象失時可謂極矣故有凶段干木踰垣而避之泄栁閉門而不納此爻似之六三隂柔不中不正又為説體外示和説中藏巧詐處己待人皆不以誠而戾於節矣是不節若矣人不我與事不可成則又嗟若焉身敗名毁皆己所招又誰咎也聖人以無所歸咎而警之欲人之謹於初而已矣六四以隂居隂柔得其正上承九五以陽剛中正節天下君道君德皆無不備四能承其道而廣之於下書所謂保受王威命明德者也是自然有節而得亨矣若四者上宜於君下宜於民身與名俱顯矣不言吉者臣道也成功則歸之於五漢之張安世庶幾焉所謂以道事君不可則止之義四則猶有所不足焉耳同一四也自其應初九而言則為隂險之小人自其承九五而言則為安順之君子易之尚變而取象不同如此九五以陽剛中正居尊位是能以中正變通而節天下者也隨事因時順應不窮故謂之甘節而可以得吉焉甘節之吉與苦節之窮正相戾也苦節不可守以為常甘節則達之天下施之後世而無不宜矣故往有尚上六處節之極節至於窮極而不可行則變而通之可矣上以隂居隂非有剛明達權之才識有見於近而無見於逺知有守常而不知通變謂之苦節焉苦節不可貞以為貞而守之則凶恭世子不忍明驪姬之讒譖伋壽殺身而陷父於惡與此相類雖過於自信而於中道未合其心自以為安矣故悔亡比於父子兄弟之相賊者則何如悲夫兊下巽上中孚豚魚吉利涉大川利貞中孚信之由於中者也信由於中則為至信至信所及雖豚魚亦可以感動故吉而利涉大川至信可以感豚魚而况於人乎感人而人心悅服則何險之不可涉何難之不可濟乎然必利於正所信不正則邪妄之小術而已非聖人大中至正之道也以一卦之體言則柔在內而中虛中虛則無物以二卦之體言則剛得中而中實中實則理得皆所以為信也説而巽亦由中之誠也至誠之道誠可以化邦國矣古之人所以惟動丕應徯志至於四方風動者無他焉一誠之感有餘用矣物類之有知覺而人不可昧見天機之運充滿而無間也人心之信固可及於豚魚焉卦有乘木舟虛之象涉川之用也取義之深固不在此聖人發以示人乃德政不可偏廢之義也中孚以利貞道始合於天矣人道必本於天道天道之外無所謂人道也率性之謂道而性則命於天天人合一之理也人固有信之極於篤而不得為正者矣如尾生之信其信白公之信其直楊子自信其為我墨子自信其兼愛以至堅白同異之説牢不可破其自信非不深也由其察理不精則流於異端小術而不自知矣天之道至正而已中孚以利貞則所以嚴其事天者至矣議獄欲得其情緩死則恐明不足而誤殺無辜已死者不可復生矣非至誠在中安得如此古之人所以得其情而哀矜者亦存乎誠而已初九陽剛得正居中孚之初其心純一而未變者也故勉以度其當信而信之則吉或人所當親或道所當學信其所當親則終身資之以為宗信其所當學則終身用之而不窮反是則非自安之道也所謂自安非但安身亦安其心而已矣初之所當信者四也四以柔得其正求剛正之賢以助己乃四之心故初九所當信者舍六四未見其可也九二乃人臣有賢善之德而為君所當親信者也二之所自信者在正君德以善民俗者也五之所自信者在誠心任賢以盡事天之道者也故二得諫行言聽而膏澤下於民焉二能信乎道則五自信於二焉二非曲學阿世以求之也知道之所當守而誠心以守之也五非徒信於二知道之所當重而誠心以重之也君子欲行道濟世亦勉於自重而已矣六三所應者上九也上九巽體居信之極不知擇六三之可否而與之相應六三以隂柔不中正而居説之極其信上九則或鼓焉或罷焉或泣焉或歌焉相信相與而失其常性者也説極則至於樂焉樂極反悲焉無道義為之主而徇情忘反則流之甚矣此爻形容小人相信之情狀可謂盡之矣六四居隂得正位近於五其心之所信者知有五為在己所當忠而已矣五之德未成而政未善乃其夙夜孜孜思所以教誨保護者也其為國為民之德可謂盛矣以其隂居隂故取月幾望之象既望則滿矣六四巽體固不自滿雖做出周召功業其心亦歉然而不自滿足也初九以居下而應四為馬匹之象四乃絶之而上信於五為馬匹亡也大臣之心知有君而不知有私交之黨類無咎之道也九五以剛中正居尊位下應九二陽剛得中之仁賢五知其為可信任則信任之専而小人不得以間之為有孚攣如之象蓋一話一言在於二而不能忘也五何以能此蓋其天德與天位相稱則自知天位之為艱而不敢以易處之知以一人治天下為可憂而不知以天下奉一人為可樂五可謂憂勤惕厲而慎乃在位者矣故無咎上九居信之極信極而至於窮可以變矣以其陽剛自信之過知上而不知下知進而不知退者也為翰音登于天之象翰音非能登天而欲登天凡犯非其分於力之所不能時之所難濟而欲僥幸以成事類此守此道以為常而不變則凶矣故曰何可長也艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉卦體隂多於陽小者過也小人得時行志事可亨通然其惡未出害未及人猶可以為善故戒其利於正正乃小過之時所當行之道也不正則非道而斷乎其不可行矣聖人變惡為善轉移世道之心於此可見卦之二五皆以柔而得中柔有得為之位而無能為之才故可小事使柔未得中則小事亦不可為矣三四以剛失位而不中剛有可為之才而無得為之位况剛之不中又非純以義理用事者也故不可大事聖人既曉君子以可小事而不可大事矣以卦體內實外虛有飛鳥之象故又因以飛鳥之遺音驗之飛鳥遺之音不宜上宜下音之上則逆而下則順則小事順而大事逆可知矣小事順所以可也大事逆所以不可也量其才力酌其時𫝑而處之則大吉山上有雷亦小過之象也事之可小過者惟恭哀儉三者而已三者可以小過而不可以甚過小過之猶不失為善若他事小過之則為惡矣卦之體有飛鳥之象初六以隂居下上應九四如鳥之飛上而不下以凶者以如此所為而致凶也小人而膺以責任榮以祿秩已為過而非宜矣乃欲驟登顯要躐取權柄排善類而使下之則過之甚矣國與民之禍可勝言哉豈小人一身之凶而已乎聖人所以深戒之故曰不可如何也六二柔順中正越九四之陽而應六五之隂是過其祖而遇其妣矣六五以柔而得上之中六二以柔而得下之中六五以震體而能動六二以艮體知有止而已二之才比於五固有所不及矣臣之才過於君則輔君以所不能致之功業臣之才不及君則奔走贊相其所為而已二之於五亦鞠躬盡瘁奔走贊相而已固不能過有所為也安常處順保境息民功業之大以俟能者可謂不失其職而得臣之分矣故為不及其君遇其臣之象量其才能不至犯非分以取凶害無咎之道也小過之時小人過多得志之時也小人不能容君子而恆欲戕之乃其心也九三剛而得正居下之上亦有時事之責任者也處羣小人之中雖過於防間猶恐禍出不測而身不能保三乃自恃其剛任意裁處略無假借委曲之意况過剛不中又不能無可議之失則從此而或有戕之者矣或者莫知其所自來言戕之者衆也三之過防當何如惟立己之嚴處事之正密其機盡其誠憂之於幾微慮之以長逺或可以免於戕矣若事或阻撓則奉身而退又髙處乎過防者也九四位近於六五六五柔中之君若以剛近之則有僣逼之嫌而為咎矣四以陽居隂為能以柔濟其剛而處之善者也故無咎在他卦以剛居柔則或為過在小過之九四則所處不為過而適合乎事理之宜是弗過遇之矣若用剛以往而有所為必欲輔六五以盡去一時之小人為大事矣五以柔而得中可小事四以剛失位而不中不可大事往則小人未必可去而國或隨之以亡有厲而當戒也六五柔暗非有剛明之德四若用永貞之道而動以直遂則隂暗之質動有所疑而猜忌之心生小人亦得以乘其隙而敗之矣故戒以勿用永貞言當委曲以行其正而不可過於直遂也密雲不雨以自我西郊也西郊隂方也雲密可雨矣而不雨焉以自我西郊則隂唱而陽不和也六五居上有公之象求六二之隂以助己是公弋取彼在穴之隂物也二者皆取其純隂而無陽剛以輔之之義也君柔於上臣柔於下因循委靡不能自強於政治而期於有為焉則削弱以趨於亡而已矣上六處隂過之極匪徒不合乎正理而已其過於正理則已逺矣是弗遇過之也初與上皆取飛鳥之象初則飛鳥之在下而欲上者也故言以凶上則飛鳥已過髙而離之甚逺者也故直言凶又戒之曰是謂災眚小人而得非分之榮遇自以為福慶而不知其為災眚自以為可樂而不知其可憂之甚也聖人之戒深矣離下坎上既濟亨小利貞初吉終亂離火在下坎水在上水火相交各得其用既濟之象也亨小本義作小亨蓋既濟之世可以小亨而不可大亨也凡立法更制大其因革順乎風氣之宜盡於人文之極以成大亨通之治化者恆在於方濟之始若既濟之時其習尚趨向之已定耳目心志之相安固不能大有所更張但隨時補綴僅保其小康而已卦之六爻之位各得其正固有利貞之象聖人繫辭不専於卦之法象而有取於既濟之義焉大抵正之一言雖死生存亡之際皆不可以須臾離然既濟之世人主多溺晏安以快意肆情之事娛樂其耳目惑亂其心志而多不能以正自克甚至於保養姦回過於骨肉殘害忠良有如寇讐此皆不正之大者也有一於此則國之亂亡可以立待唐虞三代之世治化隆盛可謂極矣然君臣上下交相警戒如臨深淵如履薄氷者亦勉勉於正而已故利貞之繫於既濟者尤為警切既濟矣故初吉柔得中而當下卦之中德與時遇亦一義也終止則其道窮矣故至於亂不自止則道不窮道不窮可以保其治於有終矣惟其因循茍且般樂怠傲自止而不能自強則倏焉以至於亂而已止之一言義深逺矣水在火上為既濟思患預防所以保此既濟於有終也與終止相反矣思患預防不可以一端言大抵田里學校以固結人心而使外侮無可乘之隙此其大端也若夫城郭險隘之慎守兵戎儲蓄之有備以防患之不可缺者也車所以行者輪也曳其車之輪則車不前進狐之涉水稍濡其尾則必不濟亦取其不輕進之義也初九以陽剛居下而得其正又為離體有明德者也上應六四隂柔之險爻也初則致其謹而不輕進其所以察於時幾之會者精矣若初可謂有學有守之君子而得出處之宜者矣何咎之有六二有文明中正之德本可以益世者也九五居既濟之時知有崇髙富貴之尊而不能下賢以行六二之道故二有可行之道而不為時所用有婦喪其茀之象茀婦車之蔽喪其茀則婦不能行矣離為中女而二又為離之主故取婦象中正之道終不可廢久則行矣故又有勿逐七日得之象卦有六爻至於七則始而終矣九三與上六為應上六隂爻險體居既濟之極是裔夷小邦恃其險阻而不來王之象也九三剛正明體與之為應明則察其叛服不常係國安危而不可不以時定剛則奮其義理之勇而必欲伐之又離為甲兵有伐之之象鬼方無王者則先叛有王者則後服以髙宗之剛明而伐之正與此爻相類然必三年而後可克既濟之時兵革罕用卒然有事而後動為力亦不易也又以見師老財費所損甚多兵非聖人之得已而不可以輕用焉象所謂憊者是也用師必得君子長者則以平定安戢為事而得逺近之應服小人之屠城掠地肆其殘虐以失人心者當深戒之而勿用也六四當既濟之時位近九五居柔得正有遺大投艱之責有委曲詳審之心是能思患而預防之者也故繻有衣袽是能小心畏懼而不敢縱逸偷安者也故終日戒四之才若不足以有為者而心能如此則人將輕千里而來告之以善矣何既濟之難保乎九五當既濟之時不能任賢修政以保全盛之基業人心天命至此而皆歸於六二矣五縱欲念亂圖存而復自強為力亦不易矣二則不待勞力而可得之蓋天之所佑者德也人之所歸者亦德也二為克堪用德而五則為自棄其德之甚者也天下𫝑而已𫝑輕𫝑重當於其幾而圖之九五欲反二極重之勢而使為己有難矣哉後世人主亦可鑒矣上六居既濟之極將為未濟矣上六隂柔既無見幾之明又無圖幾之才事理昭著而不知悟禍亂及身而不知畏人之涉水而至於濡其首則身沒矣以喻沈溺之深也自以為可久可大之富貴可以保之於無虞而不知土崩之𫝑在於旦暮焉其危甚矣昔人言燕雀處堂而棟宇焚母子嘻嘻而不知懼其上六之謂乎故曰濡其首厲何可久也坎下離上未濟亨小狐汔濟濡其尾無攸利未濟與既濟義反水火不交不相為用則為未濟未濟之時亦有可亨之理事有大變則時有大宜雖當未濟豈無其幾乘之以有為則可以亨通矣六五以柔得中為離之主則能詳審委曲而燭於幾微亦亨之一義也但言柔得中而不言剛應之者何也火之性炎上水之性潤下六五上而不下九二下而不上性相戾而不相為用與他卦隂陽相應者不同若以柔中之君而得剛中之臣以輔之則可以大有為以致大亨通而無未濟之可言矣天下未濟君子以義理濟之則圖幾應變不失其正而功可就小夫淺慮急迫輕動而欲求濟之安能有成是小狐汔濟濡其尾無攸利之義也汔勇敢之意勇敢求濟則以血氣用事而不本於義理故未能出中蓋一於義理則慎之於前要之於後可以有終尚血氣則進鋭退速而智力窮矣安能續終乎如卦之才剛柔雖不當位而於非所當居之位亦相應焉處之而盡其道則得人相與可以致亨而不至於濡尾無攸利矣忠信相與則胡越可以共事猜忌乖離則赤子亦為仇讎前言柔得中而不言剛應戒人君不可自用小而失其臣此言雖不當位而剛柔應示君子以善於處己處人而事可濟辭之抑揚各有其意慎辨物居方如君子在位小人在野大德大賢則居大位小德小賢則居小位亦處未濟之時而求以濟之之道也初六以隂柔居未濟之始事固不易濟而初六亦非有能濟之才才與時正相反者也以居不得正而輕欲濟之如狐之涉水而濡其尾則不能濟矣無益於事而取窮極吝之道也凡非其力之所能堪而鋭意為之動即顛覆而事遂至於不可為者類此未濟之時至於二則有可濟之幾九二陽剛得中又有能濟之才特以六五離性上而不下不能推誠心以求賢能而相與共濟焉故九二曳其輪而不自進非不欲進也懼有枉己之失而不輕進焉天下溺援之以道二可謂以道自重而審於出處之正者矣坎有輪象故言曳輪六三隂柔不中不正當未濟之時以是而行則凶矣安有用其不中正之才以濟時之艱而能免於凶乎利涉大川非其誠意感人而得人心則不能同舟共濟則仇讎一心者以誠相合也故聖人於六三不明言其不中不正不可不改而但欲其利涉大川焉三居坎之上出乎險之外有涉川之象未濟至此則時又可濟而三之才不足以濟之故勉之以積誠動人而可以涉險之事則其不中不正之疾可以潛消而頓革矣既懼之以為惡之凶復歆之以為善之效其轉移六三之機微矣哉非聖人化工之筆不能至此九四以陽居隂是所處不正而其心有悔者也然陽剛之才固可以勵之而使為善也故勉之以能正則可以得吉而悔亡己既變而為正則能以已之正而正人之不正初六以隂居險體之下坎水之性下而不上於所當應者而不之應是未濟之時之鬼方梗化而為治道之害者也四以陽居隂易於失其剛者乃勉以震奮用師以伐之則三年可以成功而有賞于大國焉大國謂五也四居其下當未濟之時能以得正用師之道而事之則可以受寵賚矣必得正而後可以伐鬼方者亦小人勿用之意也六五有文明之德當未濟之時而居尊位然以隂處陽所不足者正也若能修君德以盡君道而巨細微顯一出於正則有吉而無悔矣至是則有君子道德之光充盛宣著而不可掩矣至是則由致曲之功而至於有孚之誠矣書曰惟我文考若日月之照臨光於四方顯于西土則君子之光之謂也又曰亶聰明作元后則有孚之謂也居尊而德與位稱何未濟之可言乎吉而又吉者也上九以剛明當未濟之極未濟之極有可濟之理而上九又有能濟之才聖人以其體離慮其或至於過察而躁動故言但當自信其才與時合事必可濟安以待之而不至於過動可也此有孚飲酒無咎之義也不過於有為者固不失之煩擾而安於無為者則又至於廢弛故又言若安以待之而至於濡其首則過於沈溺而或失其可乘之機會則向之所謂有孚者反為自失而非宜矣以其易至於過為也而戒之復慮其不為也而勉之酬酢斯世之道中為己矣周易辨録卷四
