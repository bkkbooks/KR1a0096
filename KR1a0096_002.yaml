body:
  text: 周易辨録卷二明楊爵撰乾下坤上泰小往大來吉亨泰通也通由於和和則通不和則否閉而不通矣坤為小往而居外乾為大來而居內天道下濟地道上升之義也天地之道如此則為泰而在人事則為吉亨三才同一道也天地交而萬物生息通也上下交而相與以有為其志同也以氣言則內陽而外隂以德言則內健而外順以人言則內君子而外小人君子得志其道長小人不能肆惡而道消也皆所以為泰而吉亨也財成天地之道如厯象日月星辰之類是也輔相天地之宜謂順時以有為因物以制用也先王之道因革損益與時偕行皆所以左右民也左右民所以嚴事天之誠也初九陽剛得正之君子也自宜見用豈獨一身哉凡志同道合而有斯世斯民之心相與並起矣故為拔茅茹以彚之象而行則吉拔初九者必君相也明揚之道得而賢者有帝臣之願矣拔之之道何如求之以禮任之以誠而已否則恭敬而無實者君子不可虛拘九二有剛中之德上應六五當泰之責任者也所謂財成天地之道輔相天地之宜以左右民者九二以身當其事而燮理之矣有包舉宇宙之量有坐定夷險之才有不廢困窮之仁有不私親昵之公是能以中行為尚者也若九二真可謂代天之相矣臯夔稷契伊傅周召之能事也諸葛孔明韓范之徒亦其流亞者也媢嫉求備則與包荒相反天下有事束手無策則與用馮河相反用馮河非勇決之義如周公言在今豫小子旦若遊大川懼不克濟欲與召公共濟之謂有撥亂反正之才也不言涉大川而言馮河馮如馮几之馮取其坐鎮安危之義也抱明德而類微者則忽之與不遐遺相反以天位天祿私親故者與朋亡相反九三泰已極矣至此則將否之時也泰之時為平無有平而不陂者今將陂矣隂往在外無有往而不復者今將復矣可懼哉可懼哉處九三之地而以世道為己責者當有蹈虎尾涉春氷之心可也惟當艱難其心以守正道常思一念不謹禍即起矣一事有失世即亂矣如以千鈞之重投之眇然之躬之上而為之負荷之一有顛蹶則載胥以亡而不可救矣始可謂艱難守正而得無咎矣如孔明相漢躬親細務豈得已哉如此則勿憂所期之孚不我有而君臣上下常得以享其福矣孚所期之信也所期欲常泰而不否也泰之復否率以人謀之不臧而亦天運然也有聖人則可以救之聖人以天自處視天下無不可有為之時亦無不可有為之事故於否則即反為泰泰可以常不否然孔孟有德而無位則亦天之運也六四泰已過中而否至矣四與類皆隂柔小人治平之時皆處之於外者也至是則相率而復於內如鳥之飛翩翩而至言其羣合而且迅疾也小人羣合以害君子而君子亦將盡矣不必用富之力以其鄰而鄰無不從不待相戒而自相信然所以主之者必有其人豈可盡歸於天運哉六五者正所謂主乎泰者也以隂居上以順德而下應九二之陽為帝乙歸妹之象以祉元吉者以此道致福祉而得元吉也五所以者何道也虛已以任賢才以保治安憸邪不得以間其心晏安不能以溺其志五以隂柔處過中之泰多所沈溺而未必能此聖人以其有造命之權而為之則甚易也欲治則治為亂則亂者五也開之以撥亂反治之機而望其大有作為而獲元吉其憂世之心至矣哉以中德而行其所願也君之所願者用賢以保治安也危亂非其本心之所願也為小人所誤而至此耳如徽宗北行泣於道曰王黼誤我至此上六泰已否治已亂矣為城復于隍之象天下方以親小人逺賢臣以致亂而怨上矣又欲毒民命以用師則所以自速其亡而已故勿用師惟當下哀痛之詔反躬自責陳在已致亂之由在於反道敗德喻天下圖存之願必欲遷善改過自其邑之近而達之於逺告之詳而及之遍或可以收人心以延天命焉然此既否之後不得已而圖免於亡之所為也不能謹之於始而守此以為正則可羞之甚也坤下乾上否之匪人不利君子貞大往小來否之時匪人道也天理之在人心者未嘗亡則人道無時而可泯也但在廟堂則治在田野則亂否之時在田野而不在於廟堂矣人道善道也天命有善而無惡人道合於天命者也君子之正道即人道也匪人道則不利君子之正道也乾為大而往居於外坤為小而來居於內則是天地不交萬物之生意閉塞而不通也上下不交天下亂而無邦也以卦言則內隂而外陽內柔而外剛在人則為內小人而外君子小人得志肆惡以號令天下其道長君子則有隱居求志而已此豈人道哉君子雖退處林野小人猶欲害之故當儉德以辟其難儉德者隱晦其迹以潛處也如東漢黨錮皆一時之君子也范滂輩不能潛晦其迹而速禍之慘可傷哉初六小人在下者聯類並起亦拔茅連茹之象然否之初則小人者未至於殘傷君子未至於大壞朝政猶可以改過遷善一變而為君子焉故聖人以貞吉戒勉之其為世道之慮深矣六二當否之時正所謂用事之小人也包承大人非其本心也以公論所在士望所屬而殘害之已亦難乎其為處矣如李林甫於張九齡雖恨猶曲意事之可以保富貴而不及於禍則小人之吉也包承者小人處君子之術也君子豈可為小人所處哉當於否之時求吾之亨道焉以身殉道大人之亨也豈可漫不知否而亂於小人之羣哉六三不中不正居下之上當否之時居髙位而享厚祿者也世之否者任其否漫不知所以處之吾之富貴吾自保之而已胡廣馮道之徒是也豈不可羞之甚哉象言其位不當也以何功何能而得此位乎位者居下之上也九四否已過中氣運漸至於亨通人事漸可以措手天命之否者至此有轉而為泰之幾矣四近九五有轉否為泰之責任者也然以陽居隂處不得正而或不免於過咎焉則非盡人事以答天休者也若能克己為義使所行無咎則一時疇類君子賴其德位皆得行所學以益世而獲福矣不言吉者時未可以得吉而四之才尚有不滿人意者焉九五陽剛中正以居尊位德與位稱道與時合世之否者可一變而為休美矣是大人明德新民之道治隆於上而俗美於下矣故大人吉然又當戒懼於心自以為其亡矣其亡矣再言其亡者言無時無事而不戒懼也凡所施為必詳審安固有久大之圖如繫于苞桑之固可也其亡其亡者有居安思危之心也繫于苞桑者言所處之密也上九以陽剛居否之終能傾時之否者也物之貯於器中者多則漸去之而未可傾少則傾倒而盡去之否至於終則否無幾矣上九以陽剛之才一傾之以收成功焉故先否後喜象言否終則傾何可長也否未終則圖以漸去之終則直可傾之取義精矣離下乾上同人于野亨利涉大川利君子貞同人與人相同之義六二以柔得位得中而應乎乾以柔應剛固有相同之義得位則應之以職分所當為得中則應之以事理所當然應之以職分所當為義理所當然上之人或不能即從或從之而中止亦不足以言同也二之所應者乃九五之乾也乾者至健而無息之義惟其至健也則於二之應乎已者即能行之而不失其幾惟其無息也則行之有常要之以永久而不中止二之與五可謂同之以心同之以理不但形迹之相同而已也不曰應乎上應乎剛而曰應乎乾者上未必皆剛而剛不足以盡乾之義也聖人之筆如化工非但寫其形像而精神盡見矣于野則與人同者曠逺而無私也不狃於崇卑不限於逺近而廓然與同則同人之心度極於廣大無外矣此于野之氣象也如是則天下皆其同心者也古今皆其同心者也豈不足以致亨而涉大川乎卦之以離遇乾為以健而行其所知者也以健而行其所知則所以與人同者剛毅果決不牽於私係不溺於近小而必至於廣大無外之域矣是致亨涉川則由于野而于野之胸次非以乾行者不能也于野則相同者固廣大無私矣然于精微之義或有未盡則所同者亦非君子之正道也君子之正道合於大同之理也時異勢殊或有可同於昔而未可同於今者可同於彼而未可同於此者非精義入神者不能明此理非剛健克己者不能行此道卦之文明則能精義入神而明此理矣以健則能剛健克己而行此道矣如此則能以中正而應非中正則不應而不與之同是所同者皆廣大精微之至理而為君子之正道也未至於文明者則格物致知求明諸心而知所往則雖愚必明矣未至於剛健者則勉強克己而力以求其至則雖柔必強矣天下之事不同而所同者心也天下之心不同而所同者理也君子之心所先得者天下同然之理也得天下同然之理自能通天下之志矣徵諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑此通天下之志而合大同之道也天在上而火炎上亦有同人之義類族則逺近親疏各得其所君子小人各安其分辨物則精粗美惡各得其用皆以類而與同矣初九以剛在下上無應與又當同人之初則所交未私而所志未變為出門同人之象而得無咎初雖陽剛得正卦體本隂處離之下涉於小疵之躁而未會於文明之善特以同人之初未有私主涉世之久用物之多不知身心至此又何如也免於咎而已故不言吉六二雖得中正然有應於上則係於私小而非大同之道也故各卦所論者大同之道六二以中正而與人同則得其道矣爻則以相應相與而有公私廣狹之異故六二在一卦則為善而在本爻則為惡也九三欲同於六二懼九五之見攻而欲與之敵故有伏戎于莽升其髙陵以窺伺之至於三嵗之久不能興勢不相敵故也九三者心欲為惡而力不遂也九四欲攻六二與之同為九三所間二守正不與三墉之象也故四有乘墉之象乘墉則可以攻而有之矣然四以陽居隂能以柔濟剛而不克攻也若四者力足以為惡心能自反而歸於義者也故吉晉人納捷災于邾弗克納趙宣子曰非吾力不能納義實不爾克也合於此爻之義矣九五與六二以剛中柔中而相應焉則理直矣為三四所間而不得同故先號咷五之力足以勝三四故終得同而後笑也五之得同於二以大師克之而後遇也立賢無方君道當然初與三皆剛而得正九四則剛而能柔上九居事之外而不求與世同此九五居尊位而所當延攬者也舍皆不與同之而汲汲以求二則亦狹矣上九以陽剛居同人之終而無應衆皆有同已則無求於世而不與人同孤介自守荒僻寂寞為同人于郊之象既無所同則亦無所係纍故得無悔親師取友則德崇業廣離群索居則孤陋寡聞上九所為非可尚之道也故象言其志未得乾下離上大有元亨大有所有之大也六五以柔得尊位大中而上下應之以天下之大德居天下之大位則人皆尊親之矣故為大有乾之德剛健離之德文明以乾遇離為其德剛健而文明剛健則為善有終文明則照物無遺六五應乾之九二為應乎天而時行典曰天敘禮曰天秩德曰天命罪曰天討君人者應天以時行而已何容心哉聖王德與天合故能因時立制以盡其事天之誠是以元亨火在天上則所照者逺矣所照見者皆其所有矣故為大有之象遏惡討有罪也揚善命有德也討罪命德天之道也故為順天休命此即所謂應乎天而時行為治所有之象之道也初九當大有之時以陽居下上無應與在事之初則事未悖謬未交於害者也若任事之久則耽其寵樂而患得患失之心生事有悖謬而害至矣初九未至於此亦未見其有咎故但曰匪咎者不敢遽以無咎許之也富貴寵利人視之以為喜已則思其有憂者在人視之以為安已則思其有危者在是能艱以處之也如此則於事之可否身之去就皆不敢茍而得無咎矣書曰居寵思危罔不惟畏艱則無咎之義也九二當大有之時陽剛得中上應六五才德足以任天下之重者也五之所欲為者委之於二二足以承之而有為為大車以載之象以其才德輔佐六五綱紀衆事則家相之責盡矣故無咎不言吉者任事在二而成功則歸於五此君臣之分也九三剛而得正當大有之時居下之上位髙德正有方伯連帥之責者也為龍為光蕃屏王室天子之禮樂刑政四達而不悖矣用亨于天子用其才德以亨通天子之威命明德於天下也小人無此德者則不能當此亨于天子之任也無此德而當此任則挾上命以號令天下肆其暴虐而反為民害矣如曹操劉裕之徒征伐四出拜表輒行卒篡漢晉為害多矣爻有過剛不中之嫌故特以小人戒之九四位近六五當公輔之責贊六五以保大有之成業者也以陽居隂剛而能柔為嚴恭寅畏不極其盛之象如召公言我非敢勤惟恭奉幣用供王能祈天永命者是也身勞力瘁則委效於君上功蓋天下則守之以謙虛為恪盡臣道而得無咎矣六五以文明虛中之德而居尊位文明則照物無遺虛中則專於委任推誠心於股肱心膂之寄是其孚心交於下而得臣工以贊助可以保大有之業矣然承平之世率以文教為尚而武備易於廢弛況六五柔中而無剛德威武尤其所不足也故必威如而後吉所謂威如者安不忘危振揚武烈使威德加於天下則可以永保前人之成業如周公召公告成王克詰戎兵張皇六師覲文武之耿光而無壞其寡命者是也人主當大有之世撫盈成之運於事多忽易而無思患預備之心啓之以威如為六五對病之藥也上九以陽剛離體居大有之上是剛有終而明能極者也剛有終則能自振拔而不溺於晏安明能極則用賢使能而不至於混淆善保大有之業者莫過於剛明之德故自天祐之吉無不利繫辭所言又一義也大有上九自天祐之吉無不利象曰大有上九自天祐也繫辭曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利人臣以道事君而成大有之業為成其事上之信也鼎象曰覆公餗信何如也凡臣職未盡而至於誤國誤民則失信矣四時之運功成者去於兼善天下之後奉身而退不以寵利居成功而致顛覆之禍則知進退存亡而處之以道為順矣上九以剛明之才當大有之時是能左右六五以成大業者為履信矣位六五之上為所尊禮而非任事之地為思順矣初九無交害九二大車以載九三亨於天子九四匪其彭則濟濟多士惇大成裕輔六五以成治化而已處無為之地是能推賢讓能使國家復用一畨人才為尚賢矣其卷舒運用始終一於道而不茍焉者也此其所以天人交助獲吉而無不利也象言大有上九自天祐者大有言其時也上九言其所抱之才與所處之地也以此人此德當此時而處此地獲天之祐為所宜也大有初九無交害匪咎艱則無咎象曰大有初九無交害也德不足而行未成未可以涉世也初九以陽剛得正之才而處卦下是負其幼之所學而欲效用於大有之世矣內重而見外之輕也得深而知誘之小也始進而志足以帥氣也迷於欲則入於害矣而履能以道則未與害交而不致咎矣聖人慮其希世取寵之念萌而天理之幾易至於泯滅焉故復以艱則無咎致其戒能知人心操舍之無常而富貴利達易以惑人使之迷謬顛危至於殁齒不自悟自能察於所履而有難進易退之節矣夫何咎象謂大有初九無交害者蓋言大有之時易於害交而處初則心未變為九則志能堅其才其時皆易免咎艮下坤上謙亨君子有終謙者有若無實若虛之意也無為無虛為虛此有恆也已有而處之若無巳實而處之若虛此謙也山之髙者處於地之卑之下外示卑而自掩其髙則謙之象也止於理而不敢或過順於道而從容謹勑則謙之義也未有尚謙德而不亨通者矣謙者君子之美德也有若無終不能掩其有實若虛終不能匿其實有終之謂也天道下濟則天道謙矣下濟而成生物之功則光明也地道卑而處下則地道謙矣承天以有為而時行則上升也光明上升則亨通之義也天道則虧其盈而益其謙寒暑往來日月盈昃是也地道則變其盈而流其謙髙者日頽而下者日平是也鬼神禍盈而福謙作善降之百祥作不善降之百殃是也人道惡盈而好謙去不仁而歸於仁是也居尊位而能謙則盛德至善愈為光顯居卑位而能謙其德之髙而人亦不可踰也此謙德之君子所以有終也地中有山則髙者卑而卑者髙矣裒多益寡所以稱物之多者宜裒寡者宜益以平吾之所施也所施裒之益之而得其當則為平矣此取地中有山之象初六以柔處最下謙而又謙之君子也有是美德則人孰不相與以心乎得人心之與而用以涉險則無難矣故用涉大川吉牧者置身之處所也以卑為置身之處所則動靜語默無不在是矣六二柔順中正柔順則有能謙之質又能使所謙得乎中正合於至當不易之理矣故能以謙德鳴世得正而吉也非其中心有得於至理者能若是乎九三居下之上剛而得正上下賴之其功大矣處止之極而又得正則止於理義道德而不過焉為有功勞而能謙也書曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功功能之實自不可掩則有終而吉也六四位近於五君臣皆有順德贊相輔弼其道大行無不利矣然上承六五柔中之君也下乘九三則有功之大臣也四居柔而得正順體而能下其心若不敢以自安者為撝謙之象撝者施布之意猶言曲盡其謙德也六五有柔中之德而居尊位在上能謙則為衆心所與謙則尚義而不殖貨利上下二隂順而從之為不富而能以其鄰之象艮止在下有止而不服之象又六五謙德之君不尚威武亦或有恃其桀傲而不來庭者則利用侵伐如漢文寬厚吳王不朝賜以几杖使當時有以處之則七國之叛可預消矣居尊能謙則人心所與征伐尚利為之而况於他事有不利乎上六居柔之極為順之至能以謙德有聞於人者也以謙有聞則所與者衆矣亦有恃力而不可以德化者上六之志未得也率其所與之衆而往正之則為利也五君也利用侵伐則無逺近之間上六則可以征其邑國而已坤有國邑之象則上六為民社者也征邑國不得已而用師也非其邑國而征之則肆其侮奪而流於惡矣自四以下皆所以輔五也五則征伐自天子出故利用侵伐上雖屬五而處其上亦有土之君也征其邑國則告于天子請于方伯在其中矣謙雖賢者之事比于剛中之作用則有間焉人之懷德雖有之而畏威則未也故五上皆以征伐為言坤下震上豫利建侯行師豫和樂也以一卦之體言九四以剛德為上下所應而志得行則人心和樂以應九四矣以二卦之德言以坤遇震為順而動上能順理而動則人心和樂以應之矣故卦名豫事莫大於建侯與行師非得人心之和不可以有為建侯即人心和樂以應之人而利建以為侯也行師則率其和樂以應之衆而往正人之罪也如豫之順以動則天地如之天地亦順而應之矣況於建侯行師不可以有為乎天地惟其順理而動也故日月之行有常度而不過四時之運有常候而不忒聖人惟其順理而動也則刑罰不用而民自説服豫之順理而動天地此道聖人亦此道天下古今不可易之道也其時義可謂大矣雷出地而奮其聲則氣和矣故為豫之象先王取其和之義而作樂以崇德樂之用則斟酌飽滿動蕩血脈流通精神養其中和之德而救其氣質之偏者也孔子言成於樂書所謂典樂教胄子者亦崇德之義也殷盛也薦上帝配祖考則用樂之盛也初六與九四為應九四居六五之下而上下應之得時主事者也初六隂柔小人資其勢𦦨以作威福志得意滿不勝其豫而自鳴凶之道也六二當豫之時衆皆溺於豫而已獨以中正自守其節介如石之堅而不可易所謂富貴不能淫貧賤不能移威武不能屈者六二有之事幾之隱而難知者必安靜之君子能察之而躁動者不能識也二之節介如石則自能精義入神不俟終日而見凡事之幾微得正而且吉也六三不中不正位近九四仰視其富貴以豫樂而取悔者也三之悔由其悔之遲所以有悔也隂柔之質無見事之明無決斷之才沈溺於豫而不知速悔所以至於有悔而不可追也自古權臣之敗凡奔走門下而不能早自引決者安能自免九四由豫者天下人心之豫由於四也有能為之才遇可為之時而得以自盡其所為焉大有得也大臣至此必有至誠惻怛之心以憂國憂民則朋類君子合而聚之樂為所用則在已以人事君之道或可以少盡矣四以陽居隂而誠或未至故聖人以勿疑啓之諸葛孔明開誠心布公道集衆賢廣忠益有類此爻六五當豫之時以隂居尊沈溺於豫乘九四之剛衆心歸於四五所處者危地也故為貞疾之象貞疾腹心之疾也以其得中故雖有貞疾而恆不死周赧漢獻似之上六以隂柔處豫之極是昏冥於豫迷於沈溺而不知省悟則禍基成矣若能恍然而悟翻然而改以道義自樹而不安於冥豫之失則無咎矣上六處動之極有能改過遷善之質故聖人期之以有渝無咎而與其進焉震下兌上隨元亨利貞無咎隨相隨之義初九以剛來下柔陽唱而隂必和以震遇兌為動而説説斯隨之皆相從之義也剛來下柔又所以成其為動而説也凡諸卦言剛柔之變程傳謂自乾坤而來易本義則變自他卦此易中之法象於義皆當自乾坤來者其説覺長彼此相從固可以致元亨然利於正則所從可以無咎所從不正則為茍合雖可以致亨而過多矣以相從致大亨貞而無咎則天下隨之矣貞者堯舜禹湯文武周公相傳之正道萬古不易之定理也天下之人心不同而同於此理故貞則天下隨之如所謂一日克己復禮天下歸仁者亦此義也隨之義貞也可謂大矣時當作之澤中有雷雷動而澤隨也嚮晦入宴息取雷藏澤中動而靜隨時休息之義也初九官有渝官主守渝變也未隨則為士已隨則為官膺一事守一職之義也士則隱居求志官則行義達道視士之所尚則變矣然所隨之人不可不擇必信義足以係天下之望者而後隨之如孔明不隨曹孫之輩而隨先主則所隨得其正而可以獲吉矣隨既得其人而所以相交者必以公出門交公之義也從違可否必順天下之公理忘一己之私情則能以道義相與而可以大有為矣故有功所隨必擇其人所交必慎其道此隨之第一步也不可以不謹隨之時易於茍隨六二近於初九之小子為其所係而與之隨則失九五所當隨之丈夫矣即近而忘逺棄正而與邪也書曰逺耆德比頑童正此義也邪正不能以兩隨未有隨邪術而又能隨正道説小人而又能説君子者也故象曰係小子弗兼與也其義深矣六三位近九四之丈夫為其所係而隨之則失於初九同體之小子四居九五之下當時之任者也已既從之則隨其所求而無不獲矣然必利居貞隨之必以正求之必有道內不失已外不失人則為正不然則權門之鷹犬也九四位近九五而權已重下應動體則動而隨乎已也位髙權重而民隨之故求無不獲然勢迫於君而得人心則嫌疑易生貞固守此凶之道也人臣處此惟存其有孚在道之明可也有孚在道所以為明者惻惻然以盡補衮之誠夔夔然以嚴事上之禮勤勞盡瘁四直任之而成功則歸於五使人知恩威出於君而無與於己則為明之至而可無咎矣否則耽寵樂而忘禍機昏昧之徒也九五孚於嘉嘉善也謂六二之中正者也九五六二皆以中正為應則相隨者能以道矣五以剛中正信二之柔中正所謂大亨利貞而天下隨之者也故吉上六居隨之極已能隨人之心人則隨己之動固結而不可解為拘係之又從而維之周王惟其得人心之隨至固結而不可解則亨通于西山而王業之成肇於此矣隨上六拘係之乃從維之王用亨於西山象曰拘係之上窮也上六居隨之終悅之極人心悅己而已終隨人文王以之羑里之囚拘係從維幾至不免而終守天地之義終不改其臣節周之德可謂至德也人心歸之天命與之三分天下有其二是文王以隨之至德而亨于西山也象言上窮文王遭時不臧而至拘係則亦窮矣遭此窮厄而終不改節非文王至德不能也巽下艮上蠱元亨利涉大川先甲三日後甲三日蠱壞亂之義事之壞亂者不可不求以治之故又為有事之義為卦艮剛在上巽柔在下剛柔各止其所而不相交也又為下卑巽則專於詭隨上茍止則不能自強交之不以道也上下不交與交不以道皆足以致壞亂矣蠱之時則亂已極矣亂極復治循環之理故元亨而天下有治之機矣治一世之蠱者不可蹈襲舊弊當有非常之更張宏逺之作用而涉險難以為之故利涉大川為往而有事於治蠱也自古創業之君開國之臣所以撥亂世而反之正者必險阻艱難之備嘗規模施為之先定皆涉川之義也甲取始之義也先甲者原之於始也後甲者要之於終也凡事之為思慮審而至於三則謹之至也先甲三日後甲三日謂凡治蠱之道必原始要終熟思審處而致其慎也書曰慎厥終惟其始終以不困不惟厥終終以困窮此之謂也天運至於蠱之時則向於治矣人之治蠱要之以有終者由慎之於始則維持世運之道盡而合於天之行也人謀之與天運未嘗不相為流通者也山下有風則風回旋而物亂矣故為蠱之象未有風俗不壞而世亂者也世之亂者由於風俗之壞也振起其民而使皆趨於教典所以善風俗也育德則自育其德又所以端風化之本也未有己不正而能正人者也蠱者前人之失故諸爻之治蠱者皆以父母為言初六非有治蠱之才但在事之初蠱未深而為力易故有賢子則能幹父所壞之事而考得無咎父之過即子之過子之功即父之功見父子一體之義也事之成敗存亡所係初六當蠱之時勢已危矣所損未多賴有賢子而急治之故終吉象言意承考也承如書所謂丕承哉之承蓋善繼考之志善述考之事也考以失而致蠱豈無悔悟之心與補愆之志哉初六幹父之蠱乃承其考之志而非以自為也聖人以子之賢善歸於父為訓之義大矣九二以陽剛得中上應六五之隂柔而治其壞為幹母之蠱母既昏暗致蠱子以剛陽之才幹之宜委曲以成其幾而不失於正若伸己之是正彼之非如此而貞則隂暗之主必反見疑而蠱益深矣狄仁傑之於武氏是也始終以姑姪母子配食於廟以啓其心而濟其事或曰仁傑若用貞當何如曰婦人不可居天位也嗣聖不可改為光宅也唐之天下不可革為周也先儒胡氏言當執武氏於唐宗廟前誅之則貞之大者也九三過剛不中而幹前人之蠱或有過於作用而失其幾宜者故小有悔然剛正之才終可以有為而補其愆故無大咎六四以柔居柔為過於柔以此幹蠱則逡巡畏縮不自振拔蹈其因襲之弊以重既往之失而已矣故往則見吝象言往未得也言以寬裕治蠱則蠱不可得而治也六五以柔中居尊下應九二剛中之賢二能承之以德承即意承考之承五之志在得賢治蠱二能以剛中之德承其志而輔之以有為則成功歸於五而有幹蠱之善譽矣上九視一時人才之所為皆其所不屑也故不事王侯而髙尚其事所謂天子不得臣諸侯不得友也隱居以求其志樂堯舜之道而囂囂自得者乃其髙尚之事也其清風髙節足以亷頑而立懦矣故象曰不事王侯志可則也胸次悠然超乎萬物之上而不義之富貴則視之如浮雲者此其志也豈不可以為法乎兌下坤上臨元亨利貞至于八月有凶臨剛臨柔也剛浸而長以消柔也凡臨民者必有以正乎民臨事者必有以處乎事君子臨小人使小人革心向善否則去之此臨之以道也正邪不容並立君子之道日長則小人之道日消臨有元亨之理然臨之不以正則涉於作惡而為血氣之私非君子至公無我之道也卦之以兌遇坤為和悅而順於理此天德也九二剛中而有六五之應此王道也以此臨小人而處之則大亨而得其正矣天道四時行百物生栽培傾覆無有不亨通而得正者故大亨以正為天之道也臨十二月之卦君子之道方盛之時也至於八月為遁卦二隂方長則小人盛而君子有凶矣聖人言此非特以示循環之理也正欲君臣上下於方盛之時即知不久而有凶將至矣庶幾安不忘危存不忘亡憂勤惕厲之心無時而可少懈則可以保其無凶矣故彖言至於八月有凶消不久也則情見乎辭而凛乎其可畏垂戒之意深逺矣澤上有地地臨於澤上臨下之象也君子臨民之道教養兩端而已澤之出於地者無窮君子教民之心而思欲盡之於無窮焉地之載乎物者無疆君子容保民之心亦無疆盡一世之民皆欲教之養之使無一夫不得其所者君子之心也初九陽剛得正有其才矣當臨之時有其時矣才與時合視卦之羣隂皆其所當臨之小人也而初則咸臨之咸之義至為精約詳逺而略近昵親而忽疏皆非咸也無逺近親疏皆以公平之道臨之書所謂無偏黨反側而惟以蕩蕩平平正直為心孔子謂周而不比程子謂廓然而大公物來而順應者皆咸臨之義也初九之臨下不以逺近親踈二三其心而志在於行正正即王道也故吉九二以剛中之德而臨羣隂善莫善於剛中故盡咸臨之道與初九同二應於五奉君命以臨之者也其勢尤便而處之尤易故吉而無不利所以咸臨吉而無不利者以群隂之未順君命也君也者奉天以安民者也臣也者受君之命而奉以行之者也小人所為惟有戕賊善類民之害而已於人君之命有未順也九二上應六五正名其未順命之罪而咸臨之故吉而無不利也六三居下之上有臨民之責者也隂不中正又兌為口舌説見於外為內無所有徒以巧言令色臨民者也臨之而失其道如此則何所利哉臨之時二陽盛長以消諸隂三處二之上則勢已迫而消已及矣亦自知憂之者也既憂之則改過遷善變為君子而無甘臨之失矣何咎之有六四柔而得正下應初九剛而得正剛柔相應而又各以正則相臨者非以面貌而以誠心懇惻切至而樂於相與也君臣朋友之交合吐忠赤而忘忌疑皆此義也如公孫述磬折以恭馬援而援斥之光武岸幘簡易而樂為用得至臨之義也故無咎六五知九二為可用之賢委任之而行其道是能以智臨下而得大君之所宜也五以誠任二二以道事五上下交而德業成矣故吉上六居臨之終以厚道臨民則可持之以有終未有以薄道虐民而可以有終者也上處坤之極坤為地則至順極厚者也故上為以厚道臨民吉而無咎未有厚以臨民而其志不欲得賢才以自輔者也初九之剛正九二之剛中皆賢人之有益於民者也四與初應五與二應而皆能行其道上雖居不相應之地而志未嘗不欲資之以有為也故象曰志在內也位不相應不可言行故但以志為言聖人以上六之道惟欲厚民故度其志在於得賢坤下巽上觀盥而不薦有孚顒若大觀在上以德化下則觀之義也以坤遇巽為順而巽九五以中正居上而四隂仰之順而巽中正以觀天下則君師之道盡而德與位稱為大觀在上觀天下之道誠敬而已矣大祭方承盥而不薦禮文未舉之際誠敬於斯為尤至也以是誠敬之德觀天下則不言而信不怒而威有孚顒若下觀而化所謂篤恭而天下平也天之道隂陽而已隂陽不測則神道也天惟神道以為觀故四時不忒聖人過化存神上下與天地同流民日遷善而不知為之者則以神道設教而天下服矣風行地上鼓動萬物觀之象也先王觀風行地上之象而省方設教以觀天下四方土俗不同人情亦異而先王施教恆因之故省方觀民以設教則四方風動而教無不行矣初六以隂處最下去五逺甚於其陽剛中正觀下之道無所見則童子之所觀愚暗之小人也可使由之不可使知乃其常道若君子志道而所見如此可羞吝也六二雖與五為應然隂暗不能逺見於中正之道倣佛其疑似之迹而無所得為窺觀之象女子者無非無儀惟酒食是議有閨門之修無境外之志能如此斯為正矣而豈丈夫之道哉六三與上九為應故觀我生進退我生上九也古人於學士多以生稱之如文帝於賈誼光武於鄧禹皆目之曰生上九以陽剛居卦之上無時事之責任自三而稱之曰我生我者親之之辭上九進以禮退以義者也三居下之上有民社之責者也若觀上九以為進退則天下有道以道殉身天下無道以身殉道而無以道殉人之失矣惜乎六三不足以語此楊素之於文中子類此爻之義六四居隂得正位近九五九五以陽剛中正之德敷而為禮樂教化光輝發越而四達者也書所謂王道平平王道蕩蕩王道正直者是也四覿其光而有所得為觀國之光也四之與五可謂見而知之者矣以其觀而得之之道為王賔禮任使之乃為利也四於五以上下之分言之則為臣以道德為其所欽崇則曰賔古人於臣下多以賔稱之詩曰我有嘉賔是也象言尚賔尚髙尚之義戒人臣不以承順奔走為恭敬而當以禮義亷恥自樹立也九五切比上九上九以陽剛之德而居無責任之地是塵視金玉銖視軒冕而為尊德樂義之君子也九五觀其德而自成君子之德斯無咎矣上九之德足以膏澤斯民者也五能觀之以自善其身施于有政達於天下而民俗善可謂與人為善之君子矣君仁莫不仁君義莫不義未有君德隆盛而羣黎百姓不遍為爾德者也象言觀我生而直言觀民者見上下之一體而上行下必效也五與三既以上九為我生則上九但當言其生文義可謂至明白矣剛陽之才足以益世而無用世之責巽性務入聖人慮其退處既久而或至失身以求用則所損多矣故戒其反觀於己必道合君子斯無咎也君子者用之則行舍之則藏安於義命而無慕外之心也以六四之隂柔得以觀國之光以六三之隂不中正而居下之上則獨善其身如上九者志必不能平矣嚴於克己而達諸大觀不怨天不尤人則志斯平矣此觀其生之義也聖人期上九造就之意逺矣哉象言觀其生志未平謂爻辭戒以觀其生者為其志未平也平者有定而居之安也戒懼與志不平正相反能戒懼則心存不放而志常平不能戒懼則放逸傾倒喪其志而不平矣如遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔志平之意也孔子曰道之將行也歟命也道之將廢也歟命也公伯寮其如命何孟子曰行或使之止或尼之行止非人之所為吾之不遇魯侯天也臧氏之子焉能使豫不遇哉則志無不平矣凡言志者多君子之類小人不足言志也上九之志達可行於天下而後行之者也聖人恐其動於外物而不能有終故戒之觀者建極於上而足以表正乎下也卦之九五以大德而居尊位為大觀在上所謂大觀者動皆順理且潛隱而形迹之渾化以大中至正之道而觀天下者也觀天下猶書所謂表正萬邦皇建其有極也故卦名觀盥將祭而潔手也薦奉酒食以祭神也盥而不薦有穆穆之容而不假聲色猶所謂篤恭修巳以敬自治威儀而儼若淵默者也如此則人孰不誠心敬仰而歸其極乎故曰有孚顒若下觀而化也天之神道上天之載無聲無臭也而四時之不忒聖人以神道設教則所過者化所存者神上下與天地同流矣故天下服言天與聖人皆有觀之道也風行地上風被於物物隨風靡有觀之象先王觀風行地上之象則嵗時巡狩省其方嶽觀民俗之異宜而因以設教焉亦猶風之及物而物從乎風也卦之觀讀去聲表率之義爻之觀讀平聲觀瞻之義九五為大觀在上所謂神道設教者也自四以下皆觀其道初六居下去五最逺又隂柔不能逺見為童稚之觀小人之道也椎愚細民終身由之而不知聖人之大道乃其常也何咎之有若君子則可羞吝矣君子不待文王而興起者也可以童觀乎六二上應九五為觀九五之道者也隂柔居內而觀乎外為窺觀之象自內觀之而一於從所謂必敬必戒無違夫子者妾婦之道也女子守此以為正則利矣丈夫者當有吞吐宇宙之胸懷有達權通變之作用效妾婦之窺觀而區區以從為道者可醜之甚也六三居下之上柔得正而順之極進退能順天下之正道者也故能觀我生進退我生猶言此生此生者此身也觀我此身作用之通塞合則進不合則退三可謂審於出處之道者矣故象言其未失道也六四所觀之國光謂九五也九五大觀在上順而巽中正以觀天下以其道德為一國之光也四近於五觀之以成其德而可以輔世長民者也故利用賔于王九五居尊位而臣民所賴以作則者也宜自觀其所行者何如耳必其陽剛中正足以表正天下而有君子之德則無咎否則播惡於下而違於奉天子民之道多矣人君德足以範世則羣黎百姓遍為爾德而俗善矣堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之民德之善否係於君道之得失故九五觀我生者當觀於民焉觀我生自觀之也觀其生人觀之也上九以剛陽居一卦之上是道德足以師世範俗而無位者也其清風髙節人未嘗不仰之以為儀刑也必其有君子之德真可以係天下之望者而後無咎焉若過中失正而欺世盜名者何足道哉行道濟時聖賢之心也道不行而徒為國人之矜式豈聖賢之志哉如孔子浮海之嘆孟子之不豫色其志固不能平矣聖人發此正欲為君者尊用賢才不可棄之不用而使人觀其生也震下離上噬嗑亨利用獄頥中有物曰噬嗑為卦上下兩陽而中虛頥口之象九四一陽間於其中必齧頥中有物但可以言間而已卦名噬嗑者物在頥中則不可以不噬噬則必至於嗑噬之以道則嗑嗑則間去而亨通矣噬不以道或能強嗑之亨則未也大抵外藩為中國害小人為君子害異端為正道害凡人心之動於欲而為天理之本則纍者皆間也皆頥中之物也去之則亨通矣噬嗑之義於宇宙間事盡之矣訟獄之事亦治化之間也聽之得其當至於無訟可聽而禮樂興亦噬嗑而亨之義也卦之剛柔分動而明雷電合而章柔得中而上行皆聽獄之才德也故利用獄有雷則有電亦合之義也明罰敕法威明不可偏發也固取雷電之義然罰無不明則法無不正民俗善而治化隆亦噬嗑而亨之義也初上無位為受刑之象中四爻為用刑之象初在卦始罪薄過小有所懲戒而得改焉則小人之福也故無咎上居卦之終有怙終之義則惡極罪大而不可掩故凶初之陽剛得正亦有善反之才上則肆其剛惡而至於極矣若以隂陽上下之義言之初以陽居正而在下為懷刑之良民陽剛居卦之上者則超然於法網之外而免於刑戮矣不取此者易之取義不一小懲者可以大戒惡極者必至殺身於垂世立教之義為大耳六二柔順中正有治獄之才德故治人而人無不服如噬膚之易所治者乃健訟之剛惡則不免於滅鼻焉滅鼻之象因噬膚以及之耳二賢者也但可無咎若以聖人處之則無情者不得盡其辭不怒而民威於鈇鉞其過化存神潛消默奪之用豈特無咎而已哉六三居下之上有用刑之責者也隂不中正而且動體則動於輕躁才德不足以治人而人不服臘肉乃難於噬者遇毒則苦其難而不敢輕噬矣故始小吝而終無咎者以動體則易於更改居陽應陽卒能振拔而不以惡自終焉耳九四之所噬者初九也故為噬乾胏之難四明體且以陽居隂而不過於剛為得金矢之象得剛直之義也不為威屈不為利誘也聖人慮其以徼為智而過於察以陽居隂則又疑於不正焉故戒以艱難守正則吉也不能以明覺為自然而涉於不正則德未光矣六五居尊位而有中德下有九四為剛陽之大臣輔之以噬天下之間者也為噬乾肉得黃金之象黃則已德合中金則九四輔之以剛陽之義也君道以剛中為貴五雖得中而體本柔且以隂居陽疑於不正以滋天下之間而危甚矣故戒以守正而時存危厲之心惟恐一念不謹或以貽四海之憂一日不謹或以致千百年之患如此則無咎矣然以中德離主知正可守而防微杜漸之惟謹亦其才德可以勉而至故曰貞厲無咎得當也離下艮上賁亨小利有攸往坤之中爻交乾之中爻為離成內卦之飾乾之上爻交坤之上爻為艮成外卦之飾他卦固皆物相雜而為文然內卦飾於內而文明外卦飾於外而光輝於賁之義尤切故名賁致飾者亦可以得亨亨其所飾之事也非實德昭著不可大有所為小利有攸往而已柔來文剛故亨以剛為主而濟之以柔則善用其剛矣分剛上而文柔則以柔為主雖濟之以剛終於退歉而已此據卦之才德而言也剛柔交錯天之垂象自然之文也觀之以察時變凡厯象授時裁成輔相皆其事也文明以止人文也六十四卦三百八十四爻此一言可以盡之此如詩之思無邪禮之毋不敬書之允執厥中之類也天文天之道也人文人之道也人道本於天道而天道所以為人道也天敘有典勑我五典五敦哉天秩有禮自我五禮五庸哉天命有德五服五彰哉天討有罪五刑五用哉皆觀人文以化成天下之作用也山下有火物被而生輝亦賁也然不及逺折獄之事非明德逺照者不能故但可以明庶政而已初九以陽剛得正而居下體當賁之時為賁其趾之象賁其趾則能舍非道之車而安於徒步矣伊尹耕於有莘之野而樂堯舜之道非其義也非其道也祿之以天下弗顧也繫馬千駟弗視也此爻可以當之六二賁其須須待也待上之人能用其道而後興起以有為也二有中正之道當賁之時上無應與能以文明中正之道賁其身而不求人知焉初九有長往不反之志二有相時而動之德用之則行舍之則藏二有之矣九三陽剛得正居下之上上比六四居隂得正各以隂陽之正相與為賁也四居上之下為六五所柄用三與之賁無求不得無欲不遂得其賁而至於濡如者也當賁之時君子以質直尚義為賁賁之誠也小人以色厲內荏為賁賁之偽也四雖居正而質隂柔或不能終以道事君而至於徇俗遷就焉三之守或不足而不為所變者鮮矣聖人示以求守正道則吉而終莫之陵其為戒之意深矣六四與初九為正應初九為草野之賢才六四為當位之大臣明揚俊民布列庶位以人事君而盡大臣之職分則四之責也初九守正於下疑四與九三相賁而不屑於自求負道德之髙而不為世用四於此時祿位榮寵有餘而大臣之功業則不足故皤如而不得其賁焉四之與初若白馬翰如求之之急不以為寇仇而以為婚媾之親則人終不得以尤之矣媢疾以惡之而使不能容則視之如寇讐矣人之有技若已有之人之彥聖其心好之此婚媾之心也聖人於六四戒以寇讐而勉以婚媾其垂戒之意逺矣哉六五居尊而位在上九之下能以禮下上九者也丘髙阜艮之象上九所止之處也古者束帛加璧以聘賢者五以禮下上九為賁于丘園束帛戔戔之象戔戔整齊之意初九九三上九皆剛陽之賢才當賁之時未有與五為應者上九猶白賁則五雖以禮下之而未能與之共天位治天職也此由五以隂居尊而質柔弱又艮之德為止有茍止之心安於小康而無大有為之志故賢者未為所用而在五為可吝矣然以求賢之心如此則君子不患不至矣杕杜之詩聖人所以録之也燕昭禮郭隗而樂毅應聘晉睿宗躬詣顧榮賀循而溫嶠卞壼輩皆樂為之用卒能強小燕而保江東則終吉之義也上九以陽剛居賁之極脫然於致飾之外以真德實行檢其身而不假於外求能盡賁道者也故為白賁於立身之道可無愧矣故無咎象言其上得志亦思見有恆之意也賁之六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也六五以柔中之德當賁之時而居尊位比於剛中則有間矣賁之時虛文多於實德也故卦言小利有攸往上九以剛陽之才居卦之上而不在事任艮為山為上是賢者止於丘園之象也六五切比其下而尊事之有以束帛先禮而往見之義為賁於丘園束帛戔戔之象束帛禮賢之物戔戔整齊之意為賁之象也五能如此斯亦可矣然初九以剛得正處卦之下舍車而徒所舍之車即五之車也九三以明體剛正而不與已應雖知尊禮上九而使其白賁不以祿位爵秩飾其躬而為己所用其亦五特致飾於禮文之末而誠意有未至歟不與賢人君子共天位治天職而君人之道猶未足則吝之道也然尊賢好士之心雖不足而於下賢之禮不敢廢其去簡賢棄禮訑訑自足而不足以有為者則逺矣賢者或僅取其長就之以行其志而成小康之事業故終吉云終吉言始雖未吉而終當吉則辭固有斟酌矣五中才之主可以上可以下者也光武之於嚴陵忘勢敘交至與同寢然師保之位子陵不與而僅得白賁鄧禹馮異諸賢與相周旋而卒成東京之治化則終吉有喜之義也坤下艮上剝不利有攸往剝剝而去之也衆隂剝一陽而去之小人欲空人之國而亡之也事至於此君子儉德避難猶恐禍出不測而身不能以自保有攸往則殺身無益而國之危亡不可救矣何利之有以坤遇艮順時而止則觀其象而知所以處之矣君子尚消息盈虛則處剝之德合於天道矣故謂之天行山附於地有頽剝之象然於下則厚矣上能厚下則所居安矣保國之道厚下而已矣厚下之道無他焉所欲與之聚之所惡勿施爾也卦體有牀之象牀者身之所安剝其牀則身不能以自安矣小人剝君子使不能安其身為剝牀之義足處最下人之所以行也初六自下而剝之為剝牀以足之象剝其足則一步不可自行矣為君子者一步不可自行則一朝不能自安矣貞者扶持宇宙奠安國家之正道蔑之則上敗君德下賊民生引用凶險排擯中正凡國之所恃以為國者舉毫末而掃除之則蔑貞之義也至是則國亡而小人亦安能獨保其富貴哉如朱晦庵蔡西山真德秀魏了翁諸賢禁錮擯斥不少輕貸宋之國勢不可為而韓托胄賈似道之徒終不免於殺身焉聖人以凶為小人之自禍其垂訓之義至為明著而萬世所當深戒也辨牀上下之際取此象者亦有分辨限隔之義焉雖當群隂剝陽之時而有分辨限隔之不同焉自二以下皆剝君子以蔑貞三則不與其黨而反為君子之助焉象言其未有與則辨之義而凶亦為小人之自禍也六二未有與則六三為剝之無咎矣三處羣隂之中上不與剝牀以膚之六四下不與蔑貞之初二獨與上九之陽剛為應去邪黨而從君子卓然以獨善自立而於處身之道為無咎矣三可謂善擇所與矣而不言吉者剝之時羣狡洶洶國勢消索而難於措手之際也上九為支將傾大厦之一木而三則羣梟中之孤鳳也免於殺身之禍亦幸矣而何吉之敢望乎六四近於上九上九為蹤迹孤危之君子而六四則得時得志之小人也剝床而及於人之肌膚則為切近之災而國勢至此亦決不可為矣裴延齡李林甫基李唐無窮之禍而張九齡陸贄輩知有退處貶竄而已呶呶然痛哭叫號如陽城者欲何為哉以五隂自相順次言之為貫魚之象以衆隂在下一陽在上言之為宫人承事夫主之象五本率衆隂以剝一陽而切近之災比之六四則尤甚焉者也聖人憂之深而慮之逺於是略其稔惡之罪而開其遷善之幾即其本心之所甚欲者告之謂小人剝君子求以利已而已不知君子盡去則國不可保而小人之禍亦不旋踵而至矣則何利之有若能飭心改行以憂國憂民為志而與君子同趨向則為君子所與如以宫人而受寵於夫主焉如此則亂而復治危而復安國可長保而凡效一旦之微勞者皆得與國咸休而無不利矣聖人於群邪破其肆欲之深蔽而歆以天理自然之利其扶世立教之心至深切矣故曰聖人之情見乎辭剝之將盡一陽獨存於上且能復生為碩果不食之象至是則君子之危如一髮之引千鈞焉此一碩果天命之去留人心之離合世道之升降消長又一機會也亂極思治衆心願載於君子欲倚之以活生靈而拯將傾之國勢則上九君子有得輿之象焉群小人必欲剝極於上而盡去之一陽居上覆庇於下有廬之象剝而去之為自剝其廬焉剝其廬則無所覆庇而身亦不能自存矣至是則小人之賊君子不惟禍及人之國亦自賊其身而已象言民所載而終不可用亦三年欲為東周之意也震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往復陽復生於下也本其固有非自外至特為隂所掩消而至此復見耳故謂之復天道之盈虛消息人物之生化盛衰凡人心肆惡之極而後天理復萌皆此義也天德為主而義理用事自有可亨之理震之德為動坤之德為順以震遇坤為動而以順行也動而以順行則動以天矣動以天則丕應徯志民之説之猶解倒懸而出入自無疾之者矣道義感招凡懷明德新民之學而欲樹尺寸以益世者孰不氣求聲應而相與以有為乎朋類之來為從所當從而非私比何咎之有自姤卦一隂始生消而蝕之至此更七爻而復見為反復其道七日來復而聖人欣幸之情溢於辭外矣陽德方亨而向於治亦天運之循環耳凡壞亂之極君子無所用其道而至於不能自免者乃元氣衰薄而未克有定耳非天欲使之亂也以純王之心善純王之政以新天下之耳目一天下之心志此其時也故利有攸往湯之纘舊服武之政由舊合此義矣商周而下皆以弊易弊茍且徇俗而不能復二帝三王之善政昧於利有攸往之義也生長收藏無非天地之心化工之妙無間可停息大而一氣之運小而一物之微莫不皆然特於藏諸用之終顯諸仁之始為易見耳惻隱羞惡辭讓是非皆人之心特於見孺子入井而怵惕者為易見耳天人一理更不分别雷在地中亦有復之象先王以至日閉關商旅不行后不省方以靜為主也動而以靜為主則動以天而動無不當矣亦人心之復之義也初九一陽復生在卦之初為不逺復之義失之逺而始復之則成其心之悔矣未逺而復可以不至於悔焉耳庶無罪悔文王所以同乎天有過不二顔子所以幾於聖故元吉斯義也以之修身則自此而可全乎天德以之立政則自此而可純於王道人品不同略有四等聖人無復者上也不逺而復者次也失之逺而後復之又其次也流於惡而不復者民斯為下矣人之稟賦不同剛德勝者多君子之類柔德勝者或流於憸邪而不自知矣六二有柔順中正之德於復道固為休美矣然言吉而不及於元比於初九則有間矣休復之吉亦近於初九薰其德而善焉者也否則二之立身未可知也孔子答子貢曰居是邦也事其大夫之賢者友其士之仁者亦此爻休復之義也六三隂不中正當復之時上比六四則中行獨復者也下近六二則休復下仁者也三居其間獨無激勸思善之心乎蓋知或及之而仁不能守之數有所失而數有所復質本動體動而為善則復之時居多焉去其不中正而卒歸於中正則頻復也此幾於從欲惟危而與愚不肖同歸矣故厲過而能改終立於無過之地焉故無咎無咎者善補過也六四位未得中而言中行得正可以求中矣下應初九以剛正而濟已之柔正當復之時志復於道可無偏倚之失四於中行為獨復矣言獨復者異於六三之頻復也氣運初轉陽德尚微撥亂世而反之正非有陽剛之才不能也四坤體純隂守身從道則有之而功業益世則未可必故不言吉上比六五不言同復而言獨復五君位四臣職不敢以類相比擬嚴君臣之分也六五以柔中居尊當復之時無陽剛之應相與以大有所為故反之於中而自考焉量其才德而不敢過於施為敦厚於復而可以無悔矣漢文帝謙讓於禮樂光武以柔道理天下身求寡過俗期小康志成兩漢之事業而已比於三代聖王以天德達王道富而教之躋一世於仁義禮樂之盛而與天下同復於道者則大相逺矣上六迷復所謂安其危而利其災樂其所以亡也蓋隂暗無察理之智柔懦無體道之仁天德滅息而至於盡矣當復之極則復道已矣蔽固之深而自省自新之念不復萌動矣故凶有災眚逮其身而無自全之理矣以斯人而行師則終有大敗以其國君凶所謂君不擇將以其國與敵也坤為衆有師之象此爻居上有統衆之象國之大事在戎而尤不可以不慎焉賈似道江上一敗宋人航海而至於亡聖人之戒明有驗矣至於十年不克征則貽國無窮之禍終不可救矣震下乾上無妄元亨利貞其匪正有眚不利有攸往真實之德合於天道而無間斷無妄之謂也乾之初交於坤之初得震為剛自外來而為主於內則真實之德在我矣以震遇乾為動而健能不為私邪所間而要之以有終焉所謂仁以為己任死而後已者也九五剛中而下有六二之應以柔中正應剛中正為應所當應而非私比剛自外來而為主於內則體無不具動而健剛中而應則用無不當兼體用合內外而極於盛則無妄之義也有此實德舉而措之則何往而不大亨乎然必利於正焉正者天命人心之則時中至善之道無妄之本體也其或依稀於義理之倣佛似是而實非者為匪正於無妄之德相逺矣故有眚而不利有攸往人道必本於天道而天道所以為人道也大亨以正天之道也匪正則反乎天道天不佑之故不可以有行也天下雷行天理時見所謂鼓之以雷霆潤之以風雨日月運行一寒一暑四時行百物生皆無妄之道也先王法此大其建明對時育物代天理物之責盡而參天地贊化育亦無妄之義也初九陽剛得正於無妄之德體用具矣以是而往則合天而動者也故吉上則可以得君下則可以得民內則順乎親外則信乎友此象言得志之謂也六二柔順中正順適乎無妄之道者也於耕之時而即求穫於災之時而即求畬則有私意期望之心矣不於耕之時而求穫不耕穫也不於災之時而求畬不災畬也為所當為而無計利之心先難後獲先事後得正其義不謀其利明其道不計其功此仁者之作用也故利有攸往象言未富則至明白矣六三當無妄之時失無妄之德而有意外之災為無妄之災此如或繫之牛為行人所得而邑人反被災害矣三居下之上有民社之責為邑之象六二有順德居三之下而上應九五則牛繫於邑為行人所得之象二以三不中正而應於五賢人君子舍已之近而逺附於人在三為失道者寡助寡助之至親戚畔之此其災也象言行人得牛邑人災者言行人既得牛則邑人不能無災行人自有得牛之理邑人自有失牛之理此歸咎邑人失牛之由而災為三所自取矣九四陽剛居不得正可與為善而亦易於為惡者也當無妄之時心之所存身之所行毫釐有差則流於妄而不自知矣上比九五以乾剛之資而勉勵於中正之道固其所能焉下比六三以陽不中正而茍同於隂不中正亦為甚易也聖人蓋慮之故勉之以心之所存身之所行可一於貞正之理而不易焉如此則無咎矣貞正之理我自有之非由外鑠反而求之即此而在象言固有之亦道不逺人我欲仁斯仁至之意也九五乾剛中正以居尊位德與位稱道與時合無妄之至也此而有疾為無妄之疾焉九四以剛不中正六三以柔不中正一則列上之下一則居下之上肆其偏惡而妨政害治皆九五之疾也唐虞之歡兜共工三苗即其事也但知人安民之道兼舉而至於盡則何憂何痊而自消化矣禹班師振旅舜誕敷文德而有苗格勿藥有喜之驗也上九以陽不得位而居剛之極下應六三以隂不中正而居動之極當無妄之時以剛而至於動之極以動而至於剛之極皆窮之道而災其所自招也君子度德而進量時而動則機括在我而進退施為有餘裕矣乾下艮上大畜利貞不家食吉利涉大川剛健篤實輝光則有諸已矣故為大畜乾體剛健艮體篤實剛健則能力善而不屈於物欲篤實則不輕外而要之以有終實德內藴光輝外著美大聖神可馴致矣故為大畜上九以剛居上其德為止止其所而不為勢位所動移自處之道上而不下有壁立萬仞之氣象非有聖賢大正之德不能也六五居其下是能以禮下君子者也非君德大正亦安能知有賢德而尚之乎如孟子所言則上九為不召之臣六五為大有為之君而就之者也書曰王訪于箕子非箕子之賢不能致武王之訪而武王非大正之元后亦安能降禮於亡國之臣乎漢光武嚴子陵亦庶幾此道矣健為天下之大害止之以德而不以力成湯十一征而無敵于天下文武一怒而安天下之民皆大正之德也大畜者必利於正不正則邪謀小道而非大畜矣明德新民具體用之學當以天下事為己任而不家食則吉六五下於上九亦有養賢之象有大畜者必利於大有為一才一德則各有所就而已以涉大川非所利也六五下應九二之乾為應乎天其德為止應天而安所止則以義理用事而有保天下之氣象自足以了一世之事務而成萬世之規模矣天在山中有大畜之象多識前言往行以畜其德君子所以大畜也前言往行之理即吾心之理也多識之所以畜吾心之德也多識而不畜德則所識者資口耳之陋而無實用矣故非多識不足以畜德而多識者又不可以不畜德也先明諸心知所往然後力行以求至焉格物致知誠意正心修身以為齊家治國平天下之本聖學功用之全即此一言盡之矣初九乾體得正鋭於上進六四在上以隂得位為竊位之匹夫妨賢病國者也初之乾剛鋭進謂功業可立就者則有厲矣於是而能已焉則伸縮運用機在我而動不窮斯為利矣不言不利往而言利己者不利往則終不可往矣利己者以己為利而未遽巳也蓋乾剛非在下之物大畜無終畜之理尺蠖之屈以求伸也龍蛇之蟄以存身也初九之利己所以為不巳之地也九二乾剛得中才德足以任天下之重者也上應六五當大畜之時隂陽以非類而相畜五隂柔茍止不能任賢圖治以成逺大之事業二有剛中之道不行於世為輿説輹之象輿任重致逺之物説其輹則不能行矣二欲以天下事為己任而五不能用則過在五矣於二之中德何尤焉二當何如以處之以身殉道卷而懷之有義有命斯可矣九三以乾剛居健之極健極則鋭於進矣上九以陽剛居畜之極畜極則無所畜矣又畜之時以異類則相畜而以同類則相從焉故上九率之於前九三隨之於後志同道合相與有為為良馬逐之象焉如九三者不患其不能為也患其恃才力之健過於有為而謂天下無難為之事如此則非義理用事而為害反不細矣故戒其利於艱難守正而日間輿衛焉艱難守正則常存不敢輕易之心日間輿衛則熟其足以有為之才慎之於始要之於終相幾而動行其所無事焉則利有攸往矣記曰推而放諸東海而準推而放諸西海而準推而放諸南海而準推而放諸北海而準此爻利有攸往之義也內卦為外卦所畜主內卦乾體之剛健而言為以不喜而畜其善也主外卦艮體之篤實而言為以善而畜不善也義係賔主詞固各有攸歸矣一則勉人為善一則戒人為惡易之不可以為典要者如此六四所畜者初九也初處最下未動於惡四以柔正即止之為童牛之牿之象也天下之事圖之於微則為力易待其著則難矣古人所以制治於未亂保邦於未危也止於未惡則無惡可止矣故元吉在人則心過未萌而戒懼之亦此義也豕之牙剛而為害者豶之以敗其勢則牙雖剛而不為害矣九二之惡已著矣六五以柔中居尊治之得其要而有以潛消其惡焉則豶豕之牙之象也孟子曰君子反經而已經正則庶民興庶民興斯無邪慝矣先王止天下之惡導之而生養遂教之而倫理明膏澤浸漬民日遷善而不知為之者皆此義也消一分惡則長一分善惡盡消則善之本體全矣故吉而象言有慶見君道之所施者廣矣上九以陽德艮體當大畜之極為大有所畜而盛德止於至善者也位一卦之上而下無所畜則道可大行而無所阻礙矣天衢天之路也何天之衢訝其得志有為之詞而亨可知伊傅周召之際遇可以當之矣震下艮上頥貞吉觀頥自求口實卦體上下二陽內含四隂為外實內虛震動艮止為下動上止皆頥之象養之義也養道得正則體無不具用無不行故吉觀頥觀其所養所養必以王道則所養為得正矣自求口實觀其自養自養必以天德則自養為得正矣如分人以財教人以善為天下得人皆所養之道自小德之謹至大德不踰間皆為自養也以大學之序言之自養為格物致知誠意正心修身而所養則齊家治國平天下之謂也內聖外王之學觀頥自求口實盡之矣天地養萬物養道也聖人在天子之位尊賢使能俊傑在位膏澤下及於民亦養道也盡養之道者天地聖人也天地無心而成化聖人有心而無為養之時其道大矣哉山下有雷動而各止其所養之義也君子慎言語則不妄發節飲食則不貪欲亦存心養性之一端也初九陽剛得正修善之君子也上應六四四以隂得位居上之下以祿位權柄籠羅天下之士者也初乃喪其陽剛之德而與之為應是舍爾之靈龜觀我而朵頥矣我據四而言靈龜不食之物喻初九剛正之德足以自養之義也朵頥口動欲食之意舍其可貴之天爵而求人爵焉則以富貴為心而無所不至矣故凶如華歆初志隱居不仕固一世之髙士也後為曹操所用賊殺母后安為逆黨而不自知人心惟危之可畏有如此象言亦不足貴所以深為初九惜也當頥之時隂必資陽以自養此天地君民之義也六二求養於初九則以上而求養於下為顛頥顛頥則拂經常之理而不可為矣往求於上九之丘以非其應而不相與則往得凶矣初上皆不與應則二之行為失其類矣失其類則群離索居而進德修業無所賴矣為二者當何如哉求養於人則不足求養於己則有餘性吾所本善道吾所固有以柔順中正之德而自勉焉則為陽所與而合於養道矣養之道陽剛中正而必本於靜焉六三隂不中正而居動體動以暗昧而不中正於養道大相背矣為拂頥吉凶者得失之應也三之失甚矣凶為所自取而宜有焉為貞凶十年勿用終不可用也無攸利無所往而利矣三可謂自暴自棄者矣六四居隂得正處上之下則大臣之位也下應初九陽剛得正則草野之賢才也為大臣者尊賢禮士取其才德輔已有為以上善君德下善民俗則以人事君之道盡而得吉矣四隂性聖人慮其無剛立之德或為富貴所淫而怠於求士焉故勉之以虎視耽耽其欲逐逐則無咎虎下視四應初之義也耽耽專而不為憸邪所間奪逐逐則要之以有終而未敢怠夫然則天下之才皆其才天下之德皆其德可謂恪慎厥職矣僅能補過而無咎焉臣道之難盡有如此書曰自一話一言我則末惟成德之彥以乂我受民亦虎視耽耽其欲逐逐之義也六五以隂居尊無剛明之德不能任賢圖治使德下於民天德不足王道未行於經常之道有拂焉者也貞者萬世不易之常道即五所拂之經也若能反其所為惇典庸禮命德討罪本於天命合於人心於萬世不易之常道而安處之則為居貞而得吉矣象言順以從上者五本不正而欲歸於正非有尊德樂道取善自輔之心不能也上九以剛居五上則師保之職正道所由出而五之所當從焉者也太甲成王之進德皆伊周啓沃訓道之功也爻辭勉五以居貞吉象則推及其居貞之所由而申勉之也君不及臣不可輔之以大有為宋髙宗欲建中興之業李綱以英哲全德日勉勵終不能復大讐而反疆土以身殉國區區效忠如嶽武穆者卒不免於禍焉則不可涉大川之驗也上九養六五之君德以及於人盡養之道者六五也輔五以盡之者上九也位髙責重而五又非英明者疑間猜忌之易生此其時也必常存危厲之心盡責難陳善之道使威福豫奪出自五而已不專焉則為善處寵利而獲吉矣居師保之位負陽剛之才得時行道必自任以重而大其建明斯可矣論道經邦燮理隂陽皆其分內事也周公相成王制禮作樂諸葛武侯事後主必欲興復漢室還于舊都不如是不足以盡人臣之職而答委任之重也據五之才德而言則不可涉大川見天下之本在於一人而臣之事君有量而後入之義焉即上九受五委任而言則利涉大川見臣道不可不盡而吾君不能則謂之賊矣象言大有慶者上九固有天民之才德而身之所履又足以使萬物各得其所矣巽下兊上大過棟橈利有攸往亨大陽也四陽居中而過於多大者過也四陽自下而盛長者為大壯居中而過多者為大過大壯不可無大過不可有也卦名大過體有棟撓之象棟屈撓則室不能安且久矣以本末弱也君不足以得民民無所庇而不知有其君則危之道也魯之有三家齊之有田氏豈久安長治之理哉此大過之棟橈也陽雖過多二五皆以剛而得中君臣同德相與有為猶可以拯極弊而歸於治安焉則利有攸往而得亨矣孔子為魯司寇攝行相事墮三都以強公室而魯國治得輔剛中之君而假之以嵗月則東周之事業猶反手耳大過之時極弊而難於措手之際也非有撥亂世而反之於治之才德不能釐舉而正之焉君以剛中之德而出治於上臣以剛中之德而輔治於下君臣同心如元首股肱之相資皆以天德之盛形而為王道之大何弊之不可救何治之不可成則濟大過之時之才德可謂大矣哉澤水之盛而至於滅木焉則其勢可謂大過矣君子之蹈履知有理而已理茍可行雖舉世皆欲止之而吾行焉理茍可止雖舉世皆欲行之而吾止焉死生禍福紛迭於前而吾無有焉遁世無悶則所見所得者皆性分之全體窮居不足損而樂有餘此皆浩然獨存而為天下第一流人物矣故為大過人之行初六以柔居下當大過之時過於敬慎者也為藉物不錯諸地而用白茅焉戒慎乎其所不睹恐懼乎其所不聞臨事而懼好謀而成皆藉用白茅之義也諸葛孔明巍然三代之佐其自省惟曰謹慎周密而已書所謂慎終于始者初六有焉慎斯術也以往其無所失矣故無咎九二與初六大過之時非其相應而相比焉為過於相與也二為始過之陽未甚過也濟以初六之柔則過而不過矣過而不過不失為剛中之德而猶足以有為也枯楊生梯則榮枝幹老夫得女妻能成生育之功皆才德足以有為之義也偏才不可大用而剛中足以任重大過之時內輕不能馭外之重身弱不能運尾之強弊之不易救者也二之才足以正之而使歸於均分焉故無不利九三居下之上有時事之責任者也剛不中正才不足以救大過之弊而反為害焉所謂德薄而位尊力小而任重不能勝其責任猶棟之屈撓而不能勝其任屋之重也天下之事當與天下之賢才共之而非一人之手所能成有與人為善之心則天下之善皆其善也三以惡德而任君國子民之責則人不與輔危亂之禍成而凶至矣樂正子聞識智慮皆不足而能好善則優於天下也若三者訑訑之聲音顔色拒人於千里之外士止於千里之外則讒諂面諛之人至而國危矣書曰邦之杌隉由一人其九三之謂也九四位九五之下當輔弼之任者也以陽居隂剛而能柔則過而不過者也才足以拯偏重之患而成一世之治則棟之隆然上起而不撓乎下者也上成君德下善民俗正直剛柔之用無施而不當焉四可謂善於其職矣故吉剛而濟之以柔斯可矣下應初六亦隂柔也居柔而應亦柔則過於柔而不足以有為矣四巽體無剛立之德聖人慮其為憸邪所間而流於惡故言有它則吝而不可以不戒言吝自吉而向凶也九五以陽過極之時則枯楊也近於上六之隂而過以相與焉則枯楊生華也枯楊生華則徒能華而不能實矣據上六過極之隂而得九五則老婦得其士夫也以老相與而不能成生育之功腐朽迂流才德不足當難為之時不能樹尺寸以益世之義也以正相與於過之時而有無過者存故無咎功業不足而茍免於身禍焉故無譽上六當大過之極時事之不易為也以隂得正而履窮極之地才不足而節有餘也能以一身犯天下之患而不自恤為過於涉水不量淺深而至於滅沒其頂焉則殺身成仁舍生取義之君子也雖凶而於義為無咎矣叔孫婼以意如食言而至於死荀息豫讓張巡許逺輩皆足以當之不有君子其能國乎節義為世道之益大矣故象言其不可咎也坎下坎上習坎有孚維心亨行有尚習重也坎險也內外皆坎為習坎習坎重險也處重險之道有孚盡之矣有孚則自能無所愧怍無所憂懼而心亨矣以有孚心亨行而處險可尚之道也孔子告子張曰言忠信行篤敬雖蠻貊之邦行矣周公遭流言之變上則成王猜疑下則人心搖動公惟自盡其忠誠而已故曰我之弗辟我無以告我先王詩曰公孫碩膚赤舄几几則有孚心亨之氣象可想見矣卒之風雷兆變而王感悟則行有尚之驗也卦惟一陽居中陽實隂虛則有孚也其象為水取內明外暗之義水之流但平而不盈焉在君子則居易俟命順理而動不踰間也水之行險不失其平而不盈之信在君子則臨大節而不可奪國無道至死不變也彖者言乎象者也水流而不盈行險而不失其信則坎之象而為有孚之義也故即以有孚為處重險之道然而處平康處富貴皆此道而不可須臾離也處險而有孚心亨則盡吾處之之義也以義處險則有出險之理故可尚而往有功免於險則正也不能免則有命存焉君子以義安命天之險不可升也地之險則山川丘陵也王公設險如疆域之限隔城郭之保障皆固國之道也至於尊卑分限嚴之以等威彰之以物采凡可以杜絶陵僣而使歸於安順者亦體險之道而險之為用可謂大矣水之性險洊至則重險也故為習坎常德行修己也習教事治人也習者三令五申之意皆漸涵浸漬而後可成此取水洊至之義也初六處重險之下為習坎則所遭之時也於重險之中又入於深陷之穴而陷益甚則以隂柔不正失處險之道而自取窮迫也若初者其所遭所處無自全之理而凶必至矣象言失道凶者聖人咎初六於難處之時而不能盡善處之道也茍盡其道而死焉則雖凶而無咎矣九二立險陷之中而未能出則坎有險也以剛居柔而得其中盡處難之道而猶有自全之理為有所求而尚可以小得焉不以過剛不中而速禍即求小得也若大得則免於險矣非二之才不能出乎險也險陷方深而上無正應則時之難也六三處二坎之間來則有下卦之坎之往也往則有上卦之坎為來之坎坎坎在下而以足履之則為險坎在上而以首著之則為枕窞陷中之穴展轉凶危而陷益深當時勢極難而隂不中正又無善處之才德故也三居下之上有時事之責任者也聖人慮其用斯人以濟險則險益甚矣故戒以勿用用之終不能以濟險而有功矣無功則凶害可知矣六四柔而得正切近九五君臣同處險難之象也百圍之木膏液內涸然後風始得而拔之以人君之尊而在險中必膏澤素絶於民人心離叛姦雄乘間而禍亂所由生始不免於難矣四與五剛柔相際受其股肱心膂之託者也必樽酒簋以盡輔相之道斯可矣樽酒簋飲食之具坎水之象膏澤之義也二輔相之道也責難陳善使君之膏澤日下於民于以收人心答天戒而求免於險難焉則樽酒簋二之義也險之時易生猜忌四欲盡樽酒簋二之道必竭在已之忠誠以感動之則用缶也因君心之所明而開道之則納約自牖也能如是則臣道庶幾其可而君得免於險難矣主憂臣辱主辱臣死五之險難四之責也出險則終無咎矣云終無咎則始有咎之詞也以道事君不可則止人臣處身之義也四能盡臣道以事五五不可陷於險難矣陷於險難四必不與同陷矣此其咎也卒有以濟之故云終無咎無咎者善補過也九五以剛中正之德而居尊位於險將濟之時而未出險則坎不盈也有此濟險之才而適當易濟之時則成功可以立待為祗既平矣既平則坎盈而無險矣無險則於致險之過為善補而無咎矣不言吉者五雖中德充實而未至於光輝故象言其中未大也有中德而至於大則大賢以上之作用不為人所陷而無險之可出矣氣化之盛衰本於人事之得失道體無窮而終日乾乾之心不可已也上六以隂柔處險之終履險之上為極險也極險而以君子濟之則易於成功極險而以小人壞之則易於覆敗上六無陽剛之德有行險之心以若人而求以濟險則險益甚矣為係用徽纆置于叢棘之象徽纆叢棘皆處險之上而困縛不能展轉之義至於三嵗之久而不能免則凶甚矣離下離上離利貞亨畜牝牛吉離麗也依附之義也一隂麗於二陽之間隂不能自立必依附於陽焉故為離如日月之麗乎天百穀草木麗乎土皆依附之義也所麗貴於得正如體常道親有德皆麗於正也離為日為火取外光之義二五得中正則重明以麗乎正也君臣皆以天德行王道則宇內遍為其德矣此即柔麗乎中正也中正者禮之用以柔麗之則有和平之意樂在其中矣能立必本於禮至於蕩滌邪穢消融渣滓和順於道德而為功用之大成者則屬之樂焉故利貞亨而畜牝牛則吉吉者得之象也畜牝牛則所以自得者深矣孟子告齊王於其好勇好貨好色好世俗之樂不直拒之必委曲開道欲與聖哲同歸焉則所好不足以為病而為王道矣此皆畜牝牛之義為善用易之一端也明兩作有相麗之義大人繼明照四方則作之於前述之於後皆以明德而相麗也堯舜之重華文武之重光由離而行者也泰和所以在唐虞成周宇宙間也初九陽剛居下上無正應未得所麗者也離性躁動不能安土敦仁步履交錯而不自寧時不當動而欲動者也故勉之以持敬而審處焉能敬則以靜制動以義安命相時研幾可無錯然之失乃所以辟咎也六二為離之主居離之中知之盡仁之至不賴勇而裕如者舒卷運用曲盡時宜此孔孟之事也離為日九三前離垂盡為日昃之離於人則大命將傾之際也缶常用之器也當生而生當死而死常道也見危授命以常道處之則鼓缶而歌之義也不能如此則以死生為重拂理亂義無所不至矣故凶三過剛不中樂天知命非其所能故聖人勉以視死如歸之義焉九四以剛不中正而繼前離之將盡欲強逼而速得之此楚商臣隋煬帝負篡逆之罪天道之不容神人所共忿也突然而來惡已甚矣故焚死而與衆共棄之人人得而誅之也六五以柔中居尊而無正應麗王公之位而為天下所麗也離明之主足以知君道之難盡而無人之可憂故出涕至於沱若而憂戚至於嗟若焉恐不能一朝保其負荷之重也危者安其位者也亡者保其存者也亂者有其治者也五有憂懼之心則賢人君子樂與為用而終至於無可憂懼焉故吉離有甲兵之象上九以剛德明體處卦之上於麗天下之道威命明德兼舉而不偏廢為王用出征正邦國之不正而有嘉也剛德故能折其首惡明極故能獲匪其醜皆有嘉之義也罪其所當罪宥其所當宥征伐所至有如時雨則所以寧天下而盡天吏之職非以利已為也何咎之有上經首乾坤而終於坎離天地者萬物之父母隂陽不可相無也一陽居二隂之間為坎所以著小人之罪也一隂居二陽之間為離所以彰君子之德也此扶陽抑隂之義也又坎剛中而離柔中中者萬世不易之常道而亦可以終乾坤之義一則天命之性一則率性之道也上經首乾坤則立天之道曰隂與陽立地之道曰柔與剛也下經首咸恆則立人之道曰仁與義也首乾坤者終於坎離之别首咸恆者終於坎離之交天地人之道中而已易之全體大用可識矣周易辨録卷二
